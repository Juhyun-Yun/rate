                  <span className="font-display text-stone-700" style={{ fontSize: '2.8rem' }}>:</span>
                  <span className="inline-flex items-center justify-center bg-lime-500 text-white rounded-2xl font-display border-b-4 border-lime-700 shadow-lg" style={{ width: '4.2rem', height: '4.2rem', fontSize: '2.8rem' }}>{b}</span>
                </div>

                {/* 활동 1,2: 클릭해서 보기 / 활동 3: 직접 쓰기 */}
                {practiceStep !== 2 ? (
                  <>
                    <p className="font-body text-stone-600 mt-2 mb-1.5" style={{ fontSize: '1.25rem' }}>👇 클릭해서 4가지로 읽어 봐요</p>
                    <div className="space-y-1.5">
                      <button onClick={() => toggleRead(1)}
                        className={`w-full rounded-lg py-2 px-3 border-2 transition-all font-display ${readsShown[1] ? 'bg-orange-100 border-orange-400 text-orange-800' : 'bg-white border-orange-200 text-stone-500 hover:bg-orange-50'}`}
                        style={{ fontSize: '1.45rem' }}>
                        {readsShown[1] ? `① ${koNum[a]} 대 ${koNum[b]}` : '① ___ 대 ___ (클릭)'}
                      </button>
                      <button onClick={() => toggleRead(2)}
                        className={`w-full rounded-lg py-2 px-3 border-2 transition-all font-display ${readsShown[2] ? 'bg-emerald-100 border-emerald-400 text-emerald-800' : 'bg-white border-emerald-200 text-stone-500 hover:bg-emerald-50'}`}
                        style={{ fontSize: '1.45rem' }}>
                        {readsShown[2] ? `② ${a}과 ${b}의 비` : '② ___과 ___의 비 (클릭)'}
                      </button>
                      <button onClick={() => toggleRead(3)}
                        className={`w-full rounded-lg py-2 px-3 border-2 transition-all font-display ${readsShown[3] ? 'bg-amber-100 border-amber-400 text-amber-800' : 'bg-white border-amber-200 text-stone-500 hover:bg-amber-50'}`}
                        style={{ fontSize: '1.45rem' }}>
                        {readsShown[3] ? `③ ${a}의 ${b}에 대한 비` : '③ ___의 ___에 대한 비 (클릭)'}
                      </button>
                      <button onClick={() => toggleRead(4)}
                        className={`w-full rounded-lg py-2 px-3 border-2 transition-all font-display ${readsShown[4] ? 'bg-rose-100 border-rose-400 text-rose-800' : 'bg-white border-rose-200 text-stone-500 hover:bg-rose-50'}`}
                        style={{ fontSize: '1.45rem' }}>
                        {readsShown[4] ? `④ ${b}에 대한 ${a}의 비` : '④ ___에 대한 ___의 비 (클릭)'}
                      </button>
                    </div>
                  </>
                ) : (
                  <>
                    <p className="font-body text-stone-600 mt-2 mb-1" style={{ fontSize: '1.2rem' }}>✏️ 빈칸에 알맞은 수를 직접 써 보세요</p>
                    {[
                      { idx: '①', expectA: a, expectB: b, ka: 'r1a', kb: 'r1b', tpl: (xa, xb) => <>{xa} 대 {xb}</> },
                      { idx: '②', expectA: a, expectB: b, ka: 'r2a', kb: 'r2b', tpl: (xa, xb) => <>{xa}과 {xb}의 비</> },
                      { idx: '③', expectA: a, expectB: b, ka: 'r3a', kb: 'r3b', tpl: (xa, xb) => <>{xa}의 {xb}에 대한 비</> },
                      { idx: '④', expectA: b, expectB: a, ka: 'r4a', kb: 'r4b', tpl: (xa, xb) => <>{xa}에 대한 {xb}의 비</> },
                    ].map((r, i) => {
                      const okA = readsCheckedAt > 0 ? readsChecks[r.ka] : null;
                      const okB = readsCheckedAt > 0 ? readsChecks[r.kb] : null;
                      const inA = (
                        <input type="text" value={readsInput[r.ka] || ''} onChange={(e) => setRI(r.ka, e.target.value)}
                          className={`w-14 text-center font-display border-2 border-b-4 rounded-lg outline-none mx-1 ${okA === null ? 'border-amber-300 focus:border-amber-500' : okA ? 'border-emerald-400 bg-emerald-50' : 'border-rose-400 bg-rose-50'}`}
                          style={{ fontSize: '1.3rem' }} placeholder="?" />
                      );
                      const inB = (
                        <input type="text" value={readsInput[r.kb] || ''} onChange={(e) => setRI(r.kb, e.target.value)}
                          className={`w-14 text-center font-display border-2 border-b-4 rounded-lg outline-none mx-1 ${okB === null ? 'border-amber-300 focus:border-amber-500' : okB ? 'border-emerald-400 bg-emerald-50' : 'border-rose-400 bg-rose-50'}`}
                          style={{ fontSize: '1.3rem' }} placeholder="?" />
                      );
                      return (
                        <div key={i} className="bg-white rounded-lg py-1.5 px-3 border-2 border-amber-200 flex items-center gap-2 font-display text-stone-700 mb-1.5" style={{ fontSize: '1.35rem' }}>
                          <span className="text-amber-700">{r.idx}</span>
                          <span className="flex items-center">{r.tpl(inA, inB)}</span>
                        </div>
                      );
                    })}
                    <div className="mt-2 flex items-center justify-center gap-3">
                      <Button onClick={() => setReadsCheckedAt(t => t + 1)}>정답 확인 ✨</Button>
                      {readsCheckedAt > 0 && (allReadsCorrect ?
                        <span className="font-display text-emerald-700" style={{ fontSize: '1.4rem' }}>🎉 모두 정답!</span> :
                        <span className="font-display text-rose-700" style={{ fontSize: '1.2rem' }}>빨간칸을 다시 살펴봐요</span>
                      )}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>

        <div className="flex justify-between items-center mt-3">
          {practiceStep > 0 ? (
            <Button onClick={() => { resetActivity(); setPracticeStep(0); }} variant="soft">← 활동 1로</Button>
          ) : <span />}
          {showResult && (
            <Button onClick={goNextActivity}>
              {isLast ? '퀴즈 풀러 가기' : `활동 ${practiceStep + 2}로`} <ArrowRight size={22} className="inline ml-1" />
            </Button>
          )}
        </div>
      </div>
    );
  };
  const startQuiz = (size) => {
    const shuffled = [...quizPool].sort(() => Math.random() - 0.5).slice(0, size);
    setSelectedQuestions(shuffled);
    setQuizSize(size);
    setQIndex(0);
    setQAnswers([]);
    setAttempts(0);
    setFeedback(null);
  };

  const renderQuizSelect = () => (
    <div className="animate-fade-up h-full flex flex-col items-center justify-center px-12 gap-5">
      <div className="animate-bounce-soft mb-1"><Squirrel size={150} mood="happy" /></div>
      <h2 className="font-display text-6xl text-amber-900 leading-none">몇 문제 풀어볼까요?</h2>
      <p className="font-body text-stone-700 text-3xl">원하는 문제 수를 골라봐요!</p>
      <div className="flex gap-6 mt-3">
        {[
          { n: 3, color: 'bg-emerald-400 hover:bg-emerald-500 border-emerald-600', label: '쉬움' },
          { n: 5, color: 'bg-orange-400 hover:bg-orange-500 border-orange-600', label: '보통' },
          { n: 10, color: 'bg-rose-400 hover:bg-rose-500 border-rose-600', label: '도전!' },
        ].map(({ n, color, label }) => (
          <button key={n} onClick={() => startQuiz(n)}
            className={`${color} text-white rounded-3xl border-b-8 btn-shadow px-12 py-7 flex flex-col items-center gap-1`}>
            <span className="font-display leading-none" style={{ fontSize: '5rem' }}>{n}</span>
            <span className="font-display text-3xl">문제</span>
            <span className="font-body text-xl opacity-90">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );

  const advanceToNext = (correct) => {
    const newAnswers = [...qAnswers, correct];
    setQAnswers(newAnswers);
    setFeedback(null);
    setAttempts(0);
    if (qIndex + 1 < selectedQuestions.length) {
      setQIndex(qIndex + 1);
    } else {
      const total = selectedQuestions.length;
      const correctCount = newAnswers.filter(Boolean).length;
      const r = correctCount / total;
      const finalStars = r >= 0.95 ? 3 : r >= 0.6 ? 2 : r > 0 ? 1 : 0;
      onComplete(finalStars);
      setShowConfetti(true);
      setStep(5);
      setTimeout(() => setShowConfetti(false), 4000);
    }
  };

  const tryAgain = () => {
    setFeedback(null);
    setAttempts(attempts + 1);
  };

  const goRelearn = () => {
    setFeedback(null);
    setAttempts(0);
    setQuizSize(null);
    setSelectedQuestions([]);
    setQIndex(0);
    setQAnswers([]);
    setStep(0);
  };

  const colorizeText = (text) => {
    if (typeof text !== 'string') return text;
    const regex = /(도토리\s*\d+\s*개?|풋사과\s*\d+\s*개?|도토리|풋사과)/g;
    const result = [];
    let lastIdx = 0;
    let key = 0;
    let m;
    while ((m = regex.exec(text)) !== null) {
      if (m.index > lastIdx) result.push(<React.Fragment key={'t' + key++}>{text.slice(lastIdx, m.index)}</React.Fragment>);
      const txt = m[0];
      if (txt.startsWith('도토리')) result.push(<b key={'a' + key++} className="text-orange-600">{txt}</b>);
      else if (txt.startsWith('풋사과')) result.push(<b key={'w' + key++} className="text-stone-800">{txt}</b>);
      lastIdx = m.index + txt.length;
    }
    if (lastIdx < text.length) result.push(<React.Fragment key={'t' + key++}>{text.slice(lastIdx)}</React.Fragment>);
    return <>{result}</>;
  };

  // ============ 실생활 퀴즈 (4문제) ============
  const realQuizProblems = [
    {
      scenario: '교실에 남학생이 12명, 여학생이 13명 있어요.',
      question: '남학생 수와 여학생 수의 비를 써 보세요.',
      a: 12, b: 13,
      method: '"A 대 B" 방식',
      reading: '12 대 13',
      readingParts: ['12', ' 대 ', '13'],
      base: 13, baseIdx: 2, // 13 is at part index 2
    },
    {
      scenario: '바구니에 빨간 구슬 3개와 파란 구슬 8개가 있어요.',
      question: '빨간 구슬 수와 파란 구슬 수의 비를 써 보세요.',
      a: 3, b: 8,
      method: '"A와 B의 비" 방식',
      reading: '3과 8의 비',
      readingParts: ['3', '과 ', '8', '의 비'],
      base: 8, baseIdx: 2,
    },
    {
      scenario: '축구공이 6개, 농구공이 4개 있어요.',
      question: '축구공 수의 농구공 수에 대한 비를 써 보세요.',
      a: 6, b: 4,
      method: '"A의 B에 대한 비" 방식',
      reading: '6의 4에 대한 비',
      readingParts: ['6', '의 ', '4', '에 대한 비'],
      base: 4, baseIdx: 2,
    },
    {
      scenario: '어린이가 3명, 어른이 7명 있어요.',
      question: '어른 수에 대한 어린이 수의 비를 써 보세요.',
      a: 3, b: 7,
      method: '"B에 대한 A의 비" 방식',
      reading: '7에 대한 3의 비',
      readingParts: ['7', '에 대한 ', '3', '의 비'],
      base: 7, baseIdx: 0,
    },
  ];

  const renderRealQuiz = () => {
    const idx = realQuizIdx;
    const prob = realQuizProblems[idx];
    const state = realQuizState[idx];

    // 모든 문제 완료 → 결과 화면 (자동으로 step 4로 이동)
    if (!prob) {
      return null;
    }

    const inputA = parseInt(state.a, 10);
    const inputB = parseInt(state.b, 10);
    const ratioOk = inputA === prob.a && inputB === prob.b;
    const baseDone = state.baseClicked === prob.base;
    const allDone = ratioOk && baseDone;

    const updateState = (patch) => {
      setRealQuizState(arr => {
        const copy = [...arr];
        copy[idx] = { ...copy[idx], ...patch };
        return copy;
      });
    };

    const handleBaseClick = (val) => {
      if (!ratioOk) return;
      if (val === prob.base) {
        updateState({ baseClicked: val, correct: true });
        if (onCorrect) onCorrect();
      } else {
        updateState({ baseClicked: val, correct: false });
        setTimeout(() => updateState({ baseClicked: null }), 700);
      }
    };

    const ratioInputCls = (v, ok) => {
      if (!v) return 'border-amber-300 focus:border-amber-500';
      return ok ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50';
    };

    const correctCount = realQuizState.filter(s => s.correct).length;
    const isLast = idx === realQuizProblems.length - 1;

    return (
      <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
        <div className="text-center">
          <h2 className="font-display text-amber-900" style={{ fontSize: '2rem' }}>🌳 실생활 퀴즈 <span className="text-orange-700">{idx + 1}/4</span></h2>
          <p className="font-display text-amber-700" style={{ fontSize: '1.3rem' }}>{prob.method}</p>
        </div>

        <Card className="w-full max-w-6xl !p-4 flex-1 flex flex-col justify-around">
          {/* 시나리오 */}
          <div className="bg-amber-50 rounded-2xl p-4 border-4 border-amber-300">
            <p className="font-body text-stone-800" style={{ fontSize: '1.65rem', lineHeight: '2.4rem' }}>
              📖 {prob.scenario}
            </p>
            <p className="font-display text-purple-800 mt-2" style={{ fontSize: '1.55rem' }}>
              ✏️ {prob.question}
            </p>
          </div>

          {/* 비 입력 */}
          <div className="bg-purple-50 rounded-2xl p-4 border-4 border-purple-200">
            <p className="font-body text-stone-700 text-center mb-2" style={{ fontSize: '1.3rem' }}>① 비를 써 봐요</p>
            <div className="flex items-center justify-center gap-3">
              <input type="text" inputMode="numeric" value={state.a}
                onChange={(e) => updateState({ a: e.target.value })}
                disabled={ratioOk}
                className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${ratioInputCls(state.a, inputA === prob.a)}`}
                style={{ width: '6rem', height: '6rem', fontSize: '4rem' }} placeholder="?" />
              <span className="font-display text-stone-800" style={{ fontSize: '4rem' }}>:</span>
              <input type="text" inputMode="numeric" value={state.b}
                onChange={(e) => updateState({ b: e.target.value })}
                disabled={ratioOk}
                className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${ratioInputCls(state.b, inputB === prob.b)}`}
                style={{ width: '6rem', height: '6rem', fontSize: '4rem' }} placeholder="?" />
            </div>
          </div>

          {/* 읽기 + 기준량 클릭 (비 입력 정답 후 보임) */}
          <div className={`rounded-2xl p-4 border-4 ${ratioOk ? 'bg-emerald-50 border-emerald-300' : 'bg-stone-100 border-stone-200 opacity-60'}`}>
            <p className="font-body text-stone-700 text-center mb-2" style={{ fontSize: '1.3rem' }}>② {ratioOk ? '문장에서 ' : ''}<span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.2rem' }}><b className="text-lime-800">기준량</b></span>{ratioOk ? '의 숫자를 클릭!' : '을 찾아봐요'}</p>
            {ratioOk ? (
              <p className="text-center" style={{ lineHeight: '1' }}>
                {prob.readingParts.map((part, pIdx) => {
                  const isNumber = /^\d+$/.test(part);
                  if (!isNumber) {
                    return <span key={pIdx} className="font-display text-amber-900 align-middle" style={{ fontSize: '2.4rem' }}>{part}</span>;
                  }
                  const val = parseInt(part, 10);
                  const isCorrectBase = pIdx === prob.baseIdx && baseDone;
                  const isWrongClick = state.baseClicked === val && state.baseClicked !== prob.base;
                  return (
                    <button key={pIdx} onClick={() => handleBaseClick(val)} disabled={baseDone}
                      className={`relative inline-flex items-center justify-center font-display text-white rounded-xl border-b-4 shadow-md transition-transform mx-1 align-middle ${isCorrectBase ? 'bg-emerald-500 border-emerald-700 ring-4 ring-lime-300' : isWrongClick ? 'bg-rose-500 border-rose-700 scale-95' : 'bg-amber-500 border-amber-700 hover:scale-110 cursor-pointer'}`}
                      style={{ width: '3rem', height: '3rem', fontSize: '2rem', verticalAlign: 'middle' }}>
                      {part}
                      {isCorrectBase && <span className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ fontSize: '3rem', color: 'rgba(16,185,129,0.9)' }}>○</span>}
                      {isWrongClick && <span className="absolute inset-0 flex items-center justify-center pointer-events-none font-display" style={{ fontSize: '2.3rem', color: 'rgba(225,29,72,0.95)' }}>✕</span>}
                    </button>
                  );
                })}
              </p>
            ) : (
              <p className="font-body text-stone-500 text-center" style={{ fontSize: '1.1rem' }}>👆 먼저 비를 써 보세요</p>
            )}
            {baseDone && (
              <p className="font-display text-emerald-700 text-center mt-2 animate-fade-up" style={{ fontSize: '1.3rem' }}>
                🎉 정답! <b className="text-lime-700">{prob.base}</b>이 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.2rem' }}>기준량</span>이에요
              </p>
            )}
          </div>
        </Card>

        <div className="w-full max-w-6xl flex items-center justify-between gap-3 flex-wrap pr-2">
          <span className="font-display text-stone-600" style={{ fontSize: '1.15rem' }}>맞춘 문제: {correctCount} / 4</span>
          <Button onClick={() => {
            if (isLast) {
              if (onComplete) onComplete(correctCount === 4 ? 3 : correctCount >= 3 ? 2 : correctCount >= 1 ? 1 : 0);
              setStep(4);
            } else {
              setRealQuizIdx(idx + 1);
            }
          }} variant="secondary" disabled={!allDone}>
            {isLast ? '결과 보기' : '다음 문제'} <ArrowRight size={22} className="inline ml-1" />
          </Button>
        </div>
      </div>
    );
  };

  const renderQuiz = () => {
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    const handleAnswer = (i) => {
      const correct = i === q.answer;
      setFeedback({ correct, picked: i });
      if (correct && onCorrect) onCorrect();
    };

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-6 overflow-y-auto py-4">
        <Card className="w-full max-w-6xl p-7">
          <div className="flex justify-between items-center mb-5">
            <span className="font-display text-amber-700 text-3xl">문제 {qIndex + 1} / {quizSize}</span>
            <div className="flex gap-2 flex-wrap max-w-md justify-end">
              {[...Array(quizSize)].map((_, i) => (
                <div key={i} className={`w-5 h-5 rounded-full ${i < qIndex ? 'bg-emerald-400' : i === qIndex ? 'bg-orange-400' : 'bg-amber-200'}`} />
              ))}
            </div>
          </div>

          <p className="font-body text-stone-800 mb-5 leading-snug" style={{ fontSize: '2.8rem', lineHeight: '3.6rem', wordBreak: 'keep-all' }}>{colorizeText(q.q)}</p>

          {q.visual && (
            <div className="bg-amber-50 rounded-2xl p-4 mb-5 border-2 border-amber-200">
              <div className="flex items-center gap-3 flex-wrap mb-3">
                <span className="font-display text-orange-700 text-3xl w-28">도토리</span>
                <span className="font-display text-orange-700" style={{ fontSize: '2.4rem' }}>{q.visual.a}개</span>
                <div className="flex items-center gap-1 flex-wrap ml-2">
                  {[...Array(q.visual.a)].map((_, i) => <Acorn key={i} size={44} />)}
                </div>
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                <span className="font-display text-lime-700 text-3xl w-28">풋사과</span>
                <span className="font-display text-lime-700" style={{ fontSize: '2.4rem' }}>{q.visual.w}개</span>
                <div className="flex items-center gap-1 flex-wrap ml-2">
                  {[...Array(q.visual.w)].map((_, i) => <Walnut key={i} size={44} />)}
                </div>
              </div>
            </div>
          )}

          <div className="grid grid-cols-4 gap-4">
            {q.options.map((opt, i) => {
              const isPicked = feedback?.picked === i;
              const isCorrect = i === q.answer;
              let style = 'bg-white hover:bg-amber-50 border-amber-200 text-stone-800';
              if (feedback) {
                if (isPicked && isCorrect) style = 'bg-emerald-100 border-emerald-400 text-emerald-900';
                else if (isPicked && !isCorrect) style = 'bg-red-100 border-red-400 text-red-900 animate-shake';
                else style = 'bg-white border-amber-200 text-stone-500 opacity-60';
              }
              return (
                <button key={i}
                  onClick={() => !feedback && handleAnswer(i)}
                  disabled={!!feedback}
                  className={`font-display px-3 py-7 rounded-2xl border-2 border-b-4 transition-all ${style}`}
                  style={{ fontSize: '2.6rem' }}>
                  {opt}
                </button>
              );
            })}
          </div>

          <div className="mt-5">
            <ScratchPad key={'s1-q-' + qIndex} />
          </div>
        </Card>
      </div>
    );
  };

  const renderQuizModal = () => {
    if (!feedback || step !== 4) return null;
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    if (feedback.correct) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-10 max-w-2xl w-full card-shadow border-4 border-emerald-300 text-center animate-pop-in">
            <div className="text-9xl mb-3">🎉</div>
            <h3 className="font-display text-emerald-700 mb-3" style={{ fontSize: '5rem' }}>정답이에요!</h3>
            <p className="font-body text-stone-700 text-3xl mb-6">정말 잘했어요!</p>
            <Button onClick={() => advanceToNext(true)} variant="secondary">
              {qIndex + 1 < selectedQuestions.length ? '다음 문제로 →' : '결과 보기 →'}
            </Button>
          </div>
        </div>
      );
    }

    if (attempts === 0) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-8 max-w-3xl w-full card-shadow border-4 border-orange-300 text-center animate-pop-in">
            <div className="text-8xl mb-2">😅</div>
            <h3 className="font-display text-orange-700 mb-3" style={{ fontSize: '4rem' }}>앗, 틀렸어요!</h3>
            <div className="bg-amber-50 rounded-2xl p-5 my-4 border-2 border-amber-200 text-left">
              <p className="font-display text-amber-900 text-3xl mb-2">📖 비 다시 보기</p>
              <p className="font-body text-stone-700 text-2xl leading-relaxed" style={{ wordBreak: 'keep-all' }}>
                {(typeof q.explanation === 'string' ? q.explanation.split(/(?<=[.!?])\s+/) : [q.explanation]).map((s, i) => (
                  <React.Fragment key={i}>
                    {i > 0 ? ' ' : null}
                    <span style={{ display: 'inline-block' }}>{s}</span>
                  </React.Fragment>
                ))}
              </p>
            </div>
            <Button onClick={tryAgain} variant="primary">한 번 더 도전!</Button>
          </div>
        </div>
      );
    }

    return (
      <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
        <div className="bg-white rounded-3xl p-8 max-w-2xl w-full card-shadow border-4 border-rose-300 text-center animate-pop-in">
          <div className="text-8xl mb-2">📚</div>
          <h3 className="font-display text-rose-700 mb-3" style={{ fontSize: '4rem' }}>괜찮아요!</h3>
          <p className="font-body text-stone-700 text-3xl mb-2">처음부터 다시 차근차근 공부하고 와요!</p>
          <p className="font-body text-stone-500 text-2xl mb-6">비를 더 잘 이해하면 쉽게 풀 수 있어요</p>
          <Button onClick={goRelearn} variant="secondary">📚 처음부터 다시 공부하기</Button>
        </div>
      </div>
    );
  };

  const renderDone = () => (
    <div className="animate-fade-up h-full flex items-center justify-center px-16 gap-10">
      <div className="text-center flex-shrink-0">
        <div className="animate-bounce-soft mb-4 inline-block"><Squirrel size={220} mood="happy" /></div>
        <div className="flex justify-center"><StarRow count={stars} size={56} /></div>
      </div>
      <Card className="flex-1 max-w-xl">
        <h2 className="font-display text-amber-900 mb-2" style={{ fontSize: '3.6rem' }}>잘했어요! 🎉</h2>
        <p className="font-body text-stone-700" style={{ fontSize: '1.9rem', lineHeight: '2.6rem' }}>비의 숲을 통과했어요!</p>
        <p className="font-body text-stone-600 mt-2" style={{ fontSize: '1.25rem' }}>{score} / 4 문제 정답</p>
        <div className="bg-amber-50 rounded-2xl p-5 mt-5 border-2 border-amber-200">
          <p className="font-display text-amber-900 mb-3" style={{ fontSize: '1.7rem' }}>📚 오늘 배운 것</p>
          <ul className="font-body text-stone-700 space-y-2" style={{ fontSize: '1.35rem', lineHeight: '2rem' }}>
            <li>• 두 양을 비교할 때 <b>"3 : 5"</b> 처럼 쓴 것을 <b>비</b>라고 해요</li>
            <li>• 기호 <b>":"</b> 를 사용해요</li>
            <li>• "삼 대 오" 또는 "3과 5의 비"라고 읽어요</li>
          </ul>
        </div>
        <div className="text-right mt-5">
          <Button onClick={onHome} variant="soft">지도로 가기</Button>
        </div>
      </Card>
    </div>
  );

  return (
    <div className="w-full h-full app-bg relative flex flex-col overflow-hidden">
      {showConfetti && <Confetti />}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="🌰 비의 숲"
        progress={showOverview ? '목차' : (() => {
          // step 0: intro 3 substeps(1~3) | step 1: lesson 4 substeps(4~7) | step 2: summary 4 substeps(8~11)
          // step 3: real-quiz(12) | step 4: done(13)
          let p = 1;
          if (step === 0) p = 1 + (introStep || 0);
          else if (step === 1) p = 4 + (lessonStep || 0);
          else if (step === 2) p = 8 + (sumStep || 0);
          else if (step === 3) p = 12;
          else if (step === 4) p = 13;
          return `${p}/13`;
        })()}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="1"
            stageBadge="🌰 비"
            stageTitle="비의 숲"
            stageGoal="두 양의 관계를 비로 나타내는 방법을 알아봐요"
            accentClass="border-orange-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderSummary()}
            {step === 3 && renderRealQuiz()}
            {step === 4 && renderDone()}
          </>
        )}
      </div>
      {renderQuizModal()}
    </div>
  );
};

// ============ STAGE 2: 비율 ============
const Stage2 = ({ onHome, onComplete, onCorrect }) => {
  const [step, setStep] = useState(0);
  const [a, setA] = useState(3);
  const [b, setB] = useState(5);
  const [practiceStep, setPracticeStep] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [qIndex, setQIndex] = useState(0);
  const [qAnswers, setQAnswers] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [attempts, setAttempts] = useState(0);
  const [quizSize, setQuizSize] = useState(null);
  const [selectedQuestions, setSelectedQuestions] = useState([]);
  const [showOverview, setShowOverview] = useState(true);
  const [visitedCards, setVisitedCards] = useState(new Set());
  const [priorCheck, setPriorCheck] = useState(null);
  // 비율 lesson 내부 단계: 0 공식, 1 직사각형 비율, 2 축척
  const [lessonStep, setLessonStep] = useState(0);
  // 직사각형 비율 활동 — A와 B는 공통 비율(baseW:baseH)을 공유. 각 직사각형은 scale로 크기만 조절.
  // 기본값: A는 작게, B는 크게 — 모양은 같지만 크기 차이가 한눈에 보이도록.
  const [rectBase, setRectBase] = useState({ w: 5, h: 3 });
  const [rectScaleA, setRectScaleA] = useState(1);
  const [rectScaleB, setRectScaleB] = useState(2.5);
  const [showRectPopup, setShowRectPopup] = useState(false);
  // 축척 활동 — 문제 풀이 단계: 'calc'(1cm 거리 계산) → 'compare'(비교 질문) → 'done'(결론)
  const [scaleStep, setScaleStep] = useState('calc');
  const [scaleInputs, setScaleInputs] = useState({ park: '', forest: '', traffic: '' });
  const [scaleCalcChecked, setScaleCalcChecked] = useState(false);
  const [widerAns, setWiderAns] = useState('');

            className={`${color} text-white rounded-3xl border-b-8 btn-shadow px-12 py-7 flex flex-col items-center gap-1`}>
            <span className="font-display leading-none" style={{ fontSize: '5rem' }}>{n}</span>
            <span className="font-display text-3xl">문제</span>
            <span className="font-body text-xl opacity-90">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );

  const advanceToNext = (correct) => {
    const newAnswers = [...qAnswers, correct];
    setQAnswers(newAnswers);
    setFeedback(null);
    setAttempts(0);
    if (qIndex + 1 < selectedQuestions.length) {
      setQIndex(qIndex + 1);
    } else {
      const total = selectedQuestions.length;
      const correctCount = newAnswers.filter(Boolean).length;
      const r = correctCount / total;
      const finalStars = r >= 0.95 ? 3 : r >= 0.6 ? 2 : r > 0 ? 1 : 0;
      onComplete(finalStars);
      setShowConfetti(true);
      setStep(5);
      setTimeout(() => setShowConfetti(false), 4000);
    }
  };

  const tryAgain = () => {
    setFeedback(null);
    setAttempts(attempts + 1);
  };

  const goRelearn = () => {
    setFeedback(null);
    setAttempts(0);
    setQuizSize(null);
    setSelectedQuestions([]);
    setQIndex(0);
    setQAnswers([]);
    setStep(0);
  };

  const renderOption = (opt) => {
    if (typeof opt === 'string' && opt.includes('/') && !opt.includes(' ')) {
      const parts = opt.split('/');
      if (parts.length === 2 && parts[0].trim() && parts[1].trim()) {
        return <Fraction num={parts[0].trim()} den={parts[1].trim()} color="currentColor" size="2.6rem" />;
      }
    }
    return <span>{opt}</span>;
  };

  const renderQuiz = () => {
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    const handleAnswer = (i) => {
      const correct = i === q.answer;
      setFeedback({ correct, picked: i });
      if (correct && onCorrect) onCorrect();
    };

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-6 overflow-y-auto py-4">
        <Card className="w-full max-w-6xl p-7">
          <div className="flex justify-between items-center mb-5">
            <span className="font-display text-amber-700 text-3xl">문제 {qIndex + 1} / {quizSize}</span>
            <div className="flex gap-2 flex-wrap max-w-md justify-end">
              {[...Array(quizSize)].map((_, i) => (
                <div key={i} className={`w-5 h-5 rounded-full ${i < qIndex ? 'bg-emerald-400' : i === qIndex ? 'bg-orange-400' : 'bg-amber-200'}`} />
              ))}
            </div>
          </div>

          <p className="font-body text-stone-800 mb-4 leading-snug" style={{ fontSize: '2.8rem', lineHeight: '3.6rem', wordBreak: 'keep-all' }}>{q.q}</p>

          <div className="grid grid-cols-4 gap-4">
            {q.options.map((opt, i) => {
              const isPicked = feedback?.picked === i;
              const isCorrect = i === q.answer;
              let style = 'bg-white hover:bg-amber-50 border-amber-200 text-stone-800';
              if (feedback) {
                if (isPicked && isCorrect) style = 'bg-emerald-100 border-emerald-400 text-emerald-900';
                else if (isPicked && !isCorrect) style = 'bg-red-100 border-red-400 text-red-900 animate-shake';
                else style = 'bg-white border-amber-200 text-stone-500 opacity-60';
              }
              return (
                <button key={i}
                  onClick={() => !feedback && handleAnswer(i)}
                  disabled={!!feedback}
                  className={`font-display px-3 py-6 rounded-2xl border-2 border-b-4 transition-all flex items-center justify-center min-h-[110px] ${style}`}
                  style={{ fontSize: '2.8rem' }}>
                  {renderOption(opt)}
                </button>
              );
            })}
          </div>

          <div className="mt-5">
            <ScratchPad key={'s2-q-' + qIndex} />
          </div>
        </Card>
      </div>
    );
  };

  const renderQuizModal = () => {
    if (!feedback || step !== 4) return null;
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    if (feedback.correct) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-10 max-w-2xl w-full card-shadow border-4 border-emerald-300 text-center animate-pop-in">
            <div className="text-9xl mb-3">🎉</div>
            <h3 className="font-display text-emerald-700 mb-3" style={{ fontSize: '5rem' }}>정답이에요!</h3>
            <p className="font-body text-stone-700 text-3xl mb-6">정말 잘했어요!</p>
            <Button onClick={() => advanceToNext(true)} variant="secondary">
              {qIndex + 1 < selectedQuestions.length ? '다음 문제로 →' : '결과 보기 →'}
            </Button>
          </div>
        </div>
      );
    }

    if (attempts === 0) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-8 max-w-3xl w-full card-shadow border-4 border-orange-300 text-center animate-pop-in">
            <div className="text-8xl mb-2">😅</div>
            <h3 className="font-display text-orange-700 mb-3" style={{ fontSize: '4rem' }}>앗, 틀렸어요!</h3>
            <div className="bg-amber-50 rounded-2xl p-5 my-4 border-2 border-amber-200 text-left">
              <p className="font-display text-amber-900 text-3xl mb-2">📖 비율 다시 보기</p>
              <p className="font-body text-stone-700 text-2xl leading-relaxed" style={{ wordBreak: 'keep-all' }}>
                {(typeof q.explanation === 'string' ? q.explanation.split(/(?<=[.!?])\s+/) : [q.explanation]).map((s, i) => (
                  <React.Fragment key={i}>
                    {i > 0 ? ' ' : null}
                    <span style={{ display: 'inline-block' }}>{s}</span>
                  </React.Fragment>
                ))}
              </p>
            </div>
            <Button onClick={tryAgain} variant="primary">한 번 더 도전!</Button>
          </div>
        </div>
      );
    }

    return (
      <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
        <div className="bg-white rounded-3xl p-8 max-w-2xl w-full card-shadow border-4 border-rose-300 text-center animate-pop-in">
          <div className="text-8xl mb-2">📚</div>
          <h3 className="font-display text-rose-700 mb-3" style={{ fontSize: '4rem' }}>괜찮아요!</h3>
          <p className="font-body text-stone-700 text-3xl mb-2">처음부터 다시 차근차근 공부하고 와요!</p>
          <p className="font-body text-stone-500 text-2xl mb-6">비율을 더 잘 이해하면 쉽게 풀 수 있어요</p>
          <Button onClick={goRelearn} variant="secondary">📚 처음부터 다시 공부하기</Button>
        </div>
      </div>
    );
  };

  const renderDone = () => (
    <div className="animate-fade-up h-full flex items-center justify-center px-16 gap-10">
      <div className="text-center flex-shrink-0">
        <div className="animate-bounce-soft mb-4 inline-block"><Squirrel size={220} mood="happy" /></div>
        <div className="flex justify-center"><StarRow count={stars} size={56} /></div>
      </div>
      <Card className="flex-1 max-w-xl">
        <h2 className="font-display text-4xl text-amber-900 mb-2">멋져요! 🎉</h2>
        <p className="font-body text-stone-700 text-xl">비율의 언덕도 정복했어요!</p>
        <p className="font-body text-stone-600 text-base mt-2">{score} / 3 문제 정답</p>
        <div className="bg-amber-50 rounded-2xl p-5 mt-5 border-2 border-amber-200">
          <p className="font-display text-amber-900 mb-2 text-lg">📚 오늘 배운 것</p>
          <ul className="font-body text-stone-700 text-base space-y-1.5">
            <li>• <b>":"</b> 뒤가 <b>기준량</b>, 앞이 <b>비교하는 양</b></li>
            <li>• <b>비율 = 비교하는 양 ÷ 기준량</b></li>
            <li>• 비율은 <b>분수</b>로도, <b>소수</b>로도 나타낼 수 있어요</li>
          </ul>
        </div>
        <div className="text-right mt-5">
          <Button onClick={onHome} variant="soft">지도로 가기</Button>
        </div>
      </Card>
    </div>
  );

  return (
    <div className="w-full h-full app-bg relative flex flex-col overflow-hidden">
      {showConfetti && <Confetti />}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="📊 비율의 언덕"
        progress={showOverview ? '목차' : (() => {
          // step 0: intro(1) | step 1: lesson 3 substeps(2~4) | step 2: summary 4 substeps(5~8)
          // step 3: practice(9) | step 4: quiz(10) | step 5: done(11)
          let p = 1;
          if (step === 0) p = 1;
          else if (step === 1) p = 2 + (lessonStep || 0);
          else if (step === 2) p = 5 + (sum2Step || 0);
          else if (step === 3) p = 9;
          else if (step === 4) p = 10;
          else if (step === 5) p = 11;
          return `${p}/11`;
        })()}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="2"
            stageBadge="📊 비율"
            stageTitle="비율의 언덕"
            stageGoal="비율의 의미를 알고 분수·소수로 나타내요"
            accentClass="border-emerald-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderSummary()}
            {step === 3 && renderPractice()}
            {step === 4 && !quizSize && renderQuizSelect()}
            {step === 4 && quizSize && renderQuiz()}
            {step === 5 && renderDone()}
          </>
        )}
      </div>
      {renderQuizModal()}
    </div>
  );
};

// 빈칸 입력 컴포넌트 (백분율 연습용)
const Blank = ({ value, onChange, width = '4rem', size = '1.4rem' }) => (
  <input
    type="text"
    inputMode="decimal"
    value={value || ''}
    onChange={(e) => onChange(e.target.value)}
    className="text-center font-display rounded-lg border-2 border-b-4 px-2 py-1 mx-1 outline-none transition-colors border-amber-300 bg-white text-stone-700 focus:border-orange-400"
    style={{ width, fontSize: size }}
  />
);

// ============ STAGE 3: 백분율 ============
const Stage3 = ({ onHome, onComplete, onCorrect, rewards, progress, onDownloadNote }) => {
  const [step, setStep] = useState(0);
  const [percent, setPercent] = useState('');
  const [percentRb, setPercentRb] = useState('');
  // 백분율 변환 통분 빈칸 입력 (다람쥐/토끼) — sqJij/rbJij: 기준량 입력
  const [convData, setConvData] = useState({
    sqJij: '', sqMN: '', sqMD: '', sqRN: '', sqRD: '',
    rbJij: '', rbMN: '', rbMD: '', rbRN: '', rbRD: '',
  });
  // 핵심 정리 빈칸
  const [methodsBlanks, setMethodsBlanks] = useState({
    m1_resN: '', m1_pct: '',
    m2_pct: '',
  });
  // 변환 게임 상태 — inputA/inputB는 분수/비의 두 칸용
  const [ratioGame, setRatioGame] = useState({
    phase: 'intro', // 'intro' | 'playing' | 'done'
    stage: 1, // 1, 2, 3
    problems: [],
    curIdx: 0,
    answers: [],
    inputA: '', inputB: '', // A=분자(or 백분율 숫자), B=분모(or 비의 뒤 숫자)
    timeLeft: 120,
    timerActive: false,
    bombFlash: false,
    feedback: null, // null | 'correct' | 'wrong'
    revealed: false, // OCR 보드 사용자가 정답 직접 보기 모드
  });

  // 변환 게임 타이머
  React.useEffect(() => {
    if (!ratioGame.timerActive) return;
    const t = setInterval(() => {
      setRatioGame(p => {
        if (!p.timerActive) return p;
        if (p.timeLeft <= 1) {
          return { ...p, timeLeft: 0, timerActive: false, bombFlash: true };
        }
        return { ...p, timeLeft: p.timeLeft - 1 };
      });
    }, 1000);
    return () => clearInterval(t);
  }, [ratioGame.timerActive]);
  // 폭탄 깜빡임 자동 해제
  React.useEffect(() => {
    if (!ratioGame.bombFlash) return;
    const t = setTimeout(() => setRatioGame(p => ({ ...p, bombFlash: false })), 1500);
    return () => clearTimeout(t);
  }, [ratioGame.bombFlash]);

  // 백분율로 나타내는 방법 1·2 페이지 빈칸 (수직선 모형 — 다람쥐+토끼 동시)
  const [methodPages, setMethodPages] = useState({
    // 방법1
    m1_sq_line: '', m1_sq_fracN: '', m1_sq_pct: '',
    m1_rb_line: '', m1_rb_fracN: '', m1_rb_pct: '',
    // 방법2: 분수×100/1 → 결과 → 백분율
    m2_sq_line: '', m2_sq_calc: '', m2_sq_pct: '',
    m2_rb_line: '', m2_rb_calc: '', m2_rb_pct: '',
  });
  const [lessonStep, setLessonStep] = useState(0);
  const [methodsStep, setMethodsStep] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [qIndex, setQIndex] = useState(0);
  const [qAnswers, setQAnswers] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [blanks, setBlanks] = useState({});
  const setBlank = (key) => (v) => setBlanks(b => ({ ...b, [key]: v }));
  const blank = (key) => (blanks[key] !== undefined ? blanks[key] : '');
  const [hintMsg, setHintMsg] = useState(null);
  const [verified, setVerified] = useState({});

  const triggerCelebration = () => {
    setShowConfetti(true);
    setTimeout(() => setShowConfetti(false), 5000);
  };

  const fI = (n, d) => <Fraction num={n} den={d} color="#047857" size="0.95rem" />;
  const pageChecks = {
    disc: [
      { key: 'discA1', ans: 30, hint: <>30%는 "100칸 중 30칸"이에요. 분자 자리에 들어갈 수를 생각해 봐요.</> },
      { key: 'discA2', ans: 3000, hint: <>10,000 × {fI('30','100')}을 차근차근 계산해 봐요. {fI('30','100')}을 약분해서 곱해도 좋아요.</> },
      { key: 'discB1', ans: 0.3, tol: 0.001, hint: <>30%를 소수로 바꾸려면 30 ÷ 100을 계산해 봐요. 소수점은 어디로 옮겨갈까요?</> },
      { key: 'discB2', ans: 3000, hint: <>10,000에 0.3을 곱해 봐요. 10,000의 {fI('1','10')}은 1,000이라는 점이 도움이 될 거예요.</> },
    ],
    test: [
      { key: 'testA1', ans: 80, hint: <>분모를 25에서 100으로 만들려면 어떤 수를 곱해야 할까요? 그 수를 분자에도 똑같이 곱해 봐요.</> },
      { key: 'testA2', ans: 80, hint: <>분모가 100인 분수의 분자가 곧 백분율이에요! 위 칸에 쓴 분자를 그대로 적어 봐요.</> },
      { key: 'testB1', ans: 0.8, tol: 0.001, hint: <>20 ÷ 25를 계산해 봐요. 분수 {fI('20','25')}를 소수로 바꾼다고 생각해도 좋아요.</> },
      { key: 'testB2', ans: 80, hint: <>비율(소수)에 100을 곱하면 백분율이 돼요. 소수점이 두 자리 오른쪽으로 옮겨가요.</> },
    ],
    rain: [
      { key: 'rainA1', ans: 20, hint: <>0.2 = {fI('2','10')} → 분자·분모에 10을 곱해서 분모 100인 분수로!</> },
      { key: 'rainA2', ans: 20, hint: <>분모가 100인 분수의 분자가 곧 백분율이에요!</> },
      { key: 'rainB1', ans: 20, hint: <>0.2에 100을 곱하면 어떻게 될까요? 소수점이 두 자리 오른쪽으로 옮겨가요.</> },
    ],
    bat: [
      { key: 'batA1', ans: 60, hint: <>{fI('15','25')}의 분모를 100으로 만들려면 25에 어떤 수를 곱해야 할까요? 분자에도 같은 수를 곱해야 해요.</> },
      { key: 'batA2', ans: 60, hint: <>분모가 100인 분수의 분자가 곧 백분율이에요!</> },
      { key: 'batB1', ans: 0.6, tol: 0.001, hint: <>15 ÷ 25를 계산해 봐요. 답은 1보다 작은 소수예요.</> },
      { key: 'batB2', ans: 60, hint: <>비율(소수)에 100을 곱하면 백분율이 돼요. 소수점이 두 자리 오른쪽으로 옮겨가요.</> },
    ],
  };

  const verifyPage = (page) => {
    for (const c of pageChecks[page]) {
      const raw = blank(c.key);
      const v = Number(raw);
      const tol = c.tol || 0.001;
      if (raw === '' || isNaN(v) || Math.abs(v - c.ans) > tol) {
        setHintMsg(c.hint);
        return;
      }
    }
    setVerified(p => ({ ...p, [page]: true }));
    triggerCelebration();
  };

  // 실생활 백분율 문제 10문제
  const quizPool = [
    {
      q: '🛒 5,000원짜리 옷이 20% 할인 중이에요. 할인 금액은 얼마일까요?',
      hint: <>5,000 × {fI('20','100')}을 계산해 봐요. {fI('20','100')} = {fI('1','5')} 이에요.</>,
      options: ['500원', '1,000원', '1,500원', '2,000원'],
      answer: 1,
    },
    {
      q: '📝 25문제 중 20문제를 맞혔어요. 정답률은 몇 %일까요?',
      hint: <>{fI('20','25')}의 분모를 100으로 만들어 봐요. 25에 4를 곱하면 100이 돼요.</>,
      options: ['20%', '50%', '75%', '80%'],
      answer: 3,
    },
    {
      q: '🐶 50명 학생 중 18명이 강아지를 좋아해요. 강아지를 좋아하는 학생의 비율(%)은?',
      hint: <>{fI('18','50')}의 분모를 100으로 만들어요. 50 × 2 = 100, 18 × 2 = 36.</>,
      options: ['18%', '32%', '36%', '50%'],
      answer: 2,
    },
    {
      q: '🏃 50m 달리기 기록 측정에서 우리 반 20명 중 12명이 10초 안에 들어왔어요. 10초 안에 들어온 학생의 비율은 몇 %일까요?',
      hint: <>{fI('12','20')}의 분모를 100으로 만들어 봐요. 20에 5를 곱하면 100. 분자에도 5를 곱하기.</>,
      options: ['12%', '24%', '60%', '120%'],
      answer: 2,
    },
    {
      q: '🚲 한 마을 인구 200명 중 자전거를 가진 사람이 50명이에요. 자전거 보유율은 몇 %일까요?',
      hint: <>{fI('50','200')}의 분모를 100으로 만들어 봐요. 200을 100으로 만들려면 2로 나눠요.</>,
      options: ['10%', '25%', '50%', '75%'],
      answer: 1,
    },
    {
      q: '💰 5,000원짜리 책이 4,000원으로 할인됐어요. 할인율은 몇 %일까요?',
      hint: <>할인 금액 1,000원이 원래 가격 5,000원의 몇 %? {fI('1000','5000')} = {fI('20','100')}.</>,
      options: ['10%', '20%', '25%', '80%'],
      answer: 1,
    },
    {
      q: '📚 학교 도서관 책 1,000권 중 만화책이 150권이에요. 만화책의 비율은 몇 %일까요?',
      hint: <>{fI('150','1000')} = {fI('15','100')} 으로 약분돼요.</>,
      options: ['1.5%', '15%', '50%', '150%'],
      answer: 1,
    },
    {
      q: '🥤 음료 1L를 친구 4명과 똑같이 나누어 마실 때, 한 명이 마시는 양은 전체의 몇 %인가요?',
      hint: <>한 명이 마시는 양: {fI('1','4')} = {fI('25','100')} = ?</>,
      options: ['10%', '20%', '25%', '40%'],
      answer: 2,
    },

    const q = selectedQuestions[qIndex];
    if (!q) return null;
    const handleAnswer = (i) => {

      if (correct) {
        if (onCorrect) onCorrect();
        triggerCelebration();
        setTimeout(() => {
          const newAnswers = [...qAnswers, correct];
          setQAnswers(newAnswers);
          setFeedback(null);
          if (qIndex + 1 < selectedQuestions.length) {
            setQIndex(qIndex + 1);
          } else {
            const total = selectedQuestions.length;
            const correctCount = newAnswers.filter(Boolean).length;
            const r = correctCount / total;
            const finalStars = r >= 0.95 ? 3 : r >= 0.6 ? 2 : r > 0 ? 1 : 0;
            onComplete(finalStars);
            setStep(9);
          }
        }, 1800);
      } else {
        const attempts = (quizAttempts[qIndex] || 0) + 1;
        setQuizAttempts(p => ({ ...p, [qIndex]: attempts }));
        setTimeout(() => {
          setFeedback(null);
          if (attempts >= 2) {
            setConceptReturn(true);
          } else {
            setHintMsg(q.hint);
          }
        }, 1200);
      }
    };

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-6 overflow-y-auto py-4">
        <Card className="w-full max-w-6xl">
          <div className="flex justify-between items-center mb-5">
            <span className="font-display text-amber-700 text-2xl">문제 {qIndex + 1} / {selectedQuestions.length}</span>
            <div className="flex gap-1.5 flex-wrap max-w-xs justify-end">
              {[...Array(selectedQuestions.length)].map((_, i) => (
                <div key={i} className={`w-4 h-4 rounded-full ${i < qIndex ? 'bg-emerald-400' : i === qIndex ? 'bg-orange-400' : 'bg-amber-200'}`} />
              ))}
            </div>
          </div>
          <p className="font-body text-stone-800 mb-3 leading-relaxed" style={{ fontSize: '2.5rem', lineHeight: '3.3rem', wordBreak: 'keep-all' }}>{q.q}</p>
          <div className="grid grid-cols-4 gap-3">
            {q.options.map((opt, i) => {
              const isPicked = feedback?.picked === i;
              const isCorrect = i === q.answer;
              let style = 'bg-white hover:bg-amber-50 border-amber-200 text-stone-800';
              if (feedback) {
                if (isPicked && isCorrect) style = 'bg-emerald-100 border-emerald-400 text-emerald-900';
                else if (isPicked && !isCorrect) style = 'bg-red-100 border-red-400 text-red-900 animate-shake';
                else style = 'bg-white border-amber-200 text-stone-500 opacity-60';
              }
              return (
                <button key={i} onClick={() => !feedback && handleAnswer(i)} disabled={!!feedback}
                  className={`font-display px-4 py-5 rounded-2xl border-2 border-b-4 transition-all flex items-center justify-center ${style}`}
                  style={{ fontSize: '2.4rem' }}>
                  {opt}
                  {feedback && isPicked && (<span className="ml-2">{isCorrect ? '✓' : '✗'}</span>)}
                </button>
              );
            })}
          </div>
          {feedback && feedback.correct && (
            <div className="mt-3 p-3 rounded-2xl text-center font-body text-lg animate-pop-in bg-emerald-100 text-emerald-900">
              🎉 정답이에요!
            </div>
          )}
          <div className="mt-4">
            <ScratchPad key={'s3-q-' + qIndex} height={140} />
          </div>
        </Card>
      </div>
    );
  };

  const renderDone = () => {
    const r = rewards || { totalCorrect: 0, items: [], badges: [] };
    const earnedItems = r.items || [];
    const earnedBadges = r.badges || [];
    const totalCorrect = r.totalCorrect || 0;

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-8 py-4 gap-6">

          <div className="bg-white rounded-xl px-4 py-2 border-2 border-amber-200 text-center">

        <div className="flex-1 max-w-2xl flex flex-col gap-3">

          <Card className="!p-4">
            <div className="flex items-center justify-between mb-2">

              <span className="font-body text-stone-500 text-xs">정답 {totalCorrect}개 · 메달 {earnedBadges.length}개</span>
            </div>
            {(earnedBadges.length === 0 && earnedItems.length === 0) ? (
              <p className="font-body text-stone-500 text-base">아직 보물이 없어요. 더 많이 풀어봐요!</p>
            ) : (
              <div className="space-y-2">
                {/* 비례식 마스터 인증 — 가장 위에 강조 */}
                {(() => {
                  const cert = earnedItems.find(it => it.id === 'cert_master');
                  if (!cert) return null;
                  return (
                    <div className="bg-gradient-to-r from-amber-100 via-yellow-50 to-amber-100 rounded-xl px-3 py-2 border-2 border-amber-400 flex items-center gap-2 card-shadow">
                      <span className="text-3xl">{cert.icon}</span>

                    <p className="font-display text-rose-800 mb-1 text-sm">🏅 메달 ({earnedBadges.length})</p>
                    <div className="flex flex-wrap gap-1.5">
                      {earnedBadges.map(b => (

                {/* 보물 — 그룹별 (숲/언덕/마을) */}
                {Object.entries(TREASURE_GROUPS).map(([key, g]) => {

            <h3 className="font-display text-purple-800 text-center mb-4" style={{ fontSize: '2rem' }}>📊 두 방법 비교</h3>

                <p className="font-display text-orange-800 mb-2" style={{ fontSize: '1.4rem' }}>② 비율 × 100</p>
                <p className="font-body text-stone-700" style={{ fontSize: '1.25rem', lineHeight: '1.85rem' }}>
                  비율(분수/소수)에 <b className="text-orange-700">100을 곱하면</b> 바로 백분율이에요.
                </p>
                <div className="flex items-center justify-center gap-2 mt-2" style={{ fontSize: '1.5rem' }}>
                  <Fraction num="14" den="25" color="#C2410C" size="1.5rem" />
                  <span>× 100 = 56</span>
                  <span>➡</span>
                  <b className="text-orange-700" style={{ fontSize: '1.9rem' }}>56%</b>
                </div>
              </div>
              <p className="font-body text-stone-700 text-center bg-amber-100 rounded-xl p-3 border-2 border-amber-300" style={{ fontSize: '1.2rem' }}>
                💡 두 방법 모두 답은 같아요! 상황에 따라 편한 방법을 골라 써요.
              </p>
            </div>
            <div className="text-center mt-4">
              <Button onClick={() => setShowMethodsCompare(false)}>알겠어요!</Button>
            </div>
          </div>
        </div>
      )}
      {showCompletion && (() => {
        const allDone = progress && (progress.s1 || 0) > 0 && (progress.s2 || 0) > 0 && (progress.s3 || 0) > 0;
        const hasCert = (rewards?.items || []).find(it => it.id === 'cert_master');
        return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-6">
            <div className="bg-gradient-to-br from-amber-50 via-white to-orange-50 rounded-3xl p-7 max-w-xl w-full card-shadow border-4 border-amber-400 animate-pop-in text-center">
              <div className="animate-bounce-soft inline-block mb-1"><Squirrel size={130} mood="happy" /></div>
              <h2 className="font-display text-amber-900 text-3xl mb-1">🎉 학습 완료!</h2>
              <p className="font-body text-stone-700 text-lg mb-2">백분율 마을 학습을 모두 마쳤어요!</p>
              <div className="flex justify-center mb-3"><StarRow count={stars} size={44} /></div>

              {hasCert && (
                <div className="bg-gradient-to-r from-amber-200 via-yellow-100 to-amber-200 rounded-2xl p-4 border-4 border-amber-500 mb-3 card-shadow">
                  <p className="font-display text-amber-900" style={{ fontSize: '1.3rem' }}>🎖️ 비례식 마스터 인증 획득!</p>
                  <p className="font-body text-amber-800 text-sm">비·비율·백분율을 모두 정복했어요!</p>
                </div>
              )}

              {allDone && onDownloadNote ? (
                <div className="bg-amber-100 rounded-2xl p-4 border-2 border-amber-300 mb-3">
                  <p className="font-display text-amber-900 text-lg mb-1">📜 탐험 노트 받기</p>
                  <p className="font-body text-stone-700 text-sm mb-3">세 단계를 모두 마쳤어요! 노트를 받아서 간직해 보세요.</p>
                  <Button onClick={onDownloadNote}>탐험 노트 받기</Button>
                </div>
              ) : (
                <p className="font-body text-stone-600 text-sm mb-3">
                  💡 세 단계(비의 숲 · 비율의 언덕 · 백분율 마을)를 모두 마치면 탐험 노트를 받을 수 있어요!
                </p>
              )}

              <div className="flex justify-center">
                <Button onClick={() => { setShowCompletion(false); onHome(); }}>🗺️ 지도로 가기</Button>
              </div>
            </div>
          </div>
        );
      })()}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="💯 백분율 마을"
        progress={showOverview ? '목차' : (() => {
          // 세부 페이지 포함 — 비의 숲, 비율의 언덕, 백분율 마을 각자 자체 페이지 카운트
          // step 0: intro(1) | step 1: lesson 6 substeps(2~7) | step 2: methods 2 substeps(8~9)
          // step 3: game(10) | step 4~7: 실생활 4(11~14) | step 8: quiz(15) | step 9: done(16)
          let p = 1;
          if (step === 0) p = 1;
          else if (step === 1) p = 2 + (lessonStep || 0);
          else if (step === 2) p = 8 + (methodsStep || 0);
          else if (step === 3) p = 10;
          else if (step >= 4 && step <= 7) p = 7 + step;
          else if (step === 8) p = 15;
          else if (step === 9) p = 16;
          return `${p}/16`;
        })()}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="3"
            stageBadge="💯 백분율"
            stageTitle="백분율 마을"
            stageGoal="백분율의 의미와 구하는 방법을 알아봐요"
            accentClass="border-amber-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderMethods()}
            {step === 3 && renderRatioGame()}
            {step === 4 && renderDiscount()}
            {step === 5 && renderTest()}
            {step === 6 && renderRain()}
            {step === 7 && renderBattery()}
            {step === 8 && !quizSize && renderQuizSelect()}
            {step === 8 && quizSize && renderQuiz()}
            {step === 9 && renderDone()}
          </>
        )}
      </div>
    </div>
  );
};

// ============ MAIN APP ============
function App() {
  const [screen, setScreen] = useState('home');
  const [progress, setProgress] = useState({ s1: 0, s2: 0, s3: 0 });
  const [rewards, setRewards] = useState({ totalCorrect: 0, items: [], badges: [] });
  const [pendingRewards, setPendingRewards] = useState([]);
  const [studentName, setStudentName] = useState(null);
  const [showNameModal, setShowNameModal] = useState(false);
  const { scale, needsRotate } = useScale();

  // Load on mount
  useEffect(() => {
    try {
      const storedName = localStorage.getItem('squirrel-ratio-name');
      if (storedName) setStudentName(storedName);
      else setShowNameModal(true);
    } catch (e) { setShowNameModal(true); }

    try {
      const raw = localStorage.getItem('squirrel-ratio-data');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.progress) setProgress(data.progress);
        if (data.rewards) setRewards(data.rewards);
      }
    } catch (e) {}
  }, []);

  // Save on changes
  useEffect(() => {
    try {
      localStorage.setItem('squirrel-ratio-data', JSON.stringify({ progress, rewards }));
    } catch (e) {}
  }, [progress, rewards]);

  // Post activity to teacher's sheet (uses GET to avoid CORS preflight)
  const postEvent = (name, event, extra) => {
    if (!SCRIPT_URL || !name) return;
    try {
      const params = new URLSearchParams(Object.assign({ action: 'log', name: name, event: event }, extra || {}));
      fetch(SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    } catch (e) {}
  };

  const handleNameSelect = (name) => {
    setStudentName(name);
    setShowNameModal(false);
    try { localStorage.setItem('squirrel-ratio-name', name); } catch (e) {}
    postEvent(name, 'login');
  };

  const changeName = () => {
    setStudentName(null);
    try { localStorage.removeItem('squirrel-ratio-name'); } catch (e) {}
    setShowNameModal(true);
  };

  const updateProgress = (key, stars) => {
    const wasZero = (progress[key] || 0) === 0;
    const newProgress = { ...progress, [key]: Math.max(progress[key] || 0, stars) };
    setProgress(newProgress);
    postEvent(studentName, 'stage_complete', { stage: key, stars: String(stars) });

    if (wasZero && stars > 0) {
      const stageBadge = STAGE_BADGES[key];
      const alreadyHas = rewards.badges.find(b => b.id === stageBadge.id);
      if (!alreadyHas) {
        const newBadges = [...rewards.badges, stageBadge];
        const queue = [stageBadge];
        postEvent(studentName, 'badge', { detail: stageBadge.name });
        const allDone = (newProgress.s1 || 0) > 0 && (newProgress.s2 || 0) > 0 && (newProgress.s3 || 0) > 0;
        if (allDone && !newBadges.find(b => b.id === STAGE_BADGES.all3.id)) {
          newBadges.push(STAGE_BADGES.all3);
          queue.push(STAGE_BADGES.all3);
          postEvent(studentName, 'badge', { detail: STAGE_BADGES.all3.name });
        }
        // 비례식 마스터 인증 — 세 단계 메달 모두 + 정답 임계 이상
        setRewards(r => {
          const newItems = r.items || [];
          const hasAllStages = ['b_s1','b_s2','b_s3'].every(id => newBadges.find(b => b.id === id));
          const alreadyCert = newItems.find(it => it.id === MASTER_CERT.id);
          if (hasAllStages && (r.totalCorrect || 0) >= MASTER_CERT.threshold && !alreadyCert) {
            const updatedItems = [...newItems, MASTER_CERT];
            setPendingRewards(prev => [...prev, MASTER_CERT]);
            postEvent(studentName, 'certification', { detail: MASTER_CERT.name });
            return { ...r, badges: newBadges, items: updatedItems };
          }
          return { ...r, badges: newBadges };
        });
        setPendingRewards(prev => [...prev, ...queue]);
      }
    }
  };

  const handleCorrect = () => {
    postEvent(studentName, 'correct');
    setRewards(r => {
      const newTotal = (r.totalCorrect || 0) + 1;
      let newItems = r.items || [];
      const milestone = MILESTONES.find(m => m.count === newTotal && !newItems.find(it => it.id === m.id));
      if (milestone) {
        newItems = [...newItems, milestone];
        setPendingRewards(prev => [...prev, milestone]);
        postEvent(studentName, 'milestone', { detail: milestone.name });
      }
      return { ...r, totalCorrect: newTotal, items: newItems };
    });
  };

  const resetProgress = () => {
    setProgress({ s1: 0, s2: 0, s3: 0 });
    setRewards({ totalCorrect: 0, items: [], badges: [] });
    setPendingRewards([]);
    try { localStorage.removeItem('squirrel-ratio-data'); } catch (e) {}
  };

  const dismissReward = () => setPendingRewards(prev => prev.slice(1));

  const downloadNote = () => {
    if (!studentName) return;
    const dateStr = new Date().toLocaleDateString('ko-KR');
    const stars1 = progress.s1 || 0, stars2 = progress.s2 || 0, stars3 = progress.s3 || 0;
    const totalStars = stars1 + stars2 + stars3;
    const totalCorrect = (rewards && rewards.totalCorrect) || 0;
    const starHtml = (n) => '⭐'.repeat(n) + '☆'.repeat(3 - n);
    const itemsHtml = ((rewards && rewards.items) || []).map(it =>
      '<span class="reward-item">' + it.icon + ' ' + it.name + '</span>'
    ).join(' ');
    const badgesHtml = ((rewards && rewards.badges) || []).map(b =>
      '<span class="reward-badge">' + b.icon + ' ' + b.name + '</span>'
    ).join(' ');

    const html = '<!DOCTYPE html>\n<html lang="ko"><head><meta charset="UTF-8"><title>' + studentName + '의 비율 탐험 노트</title>\n<style>\n@import url(\'https://fonts.googleapis.com/css2?family=Jua&display=swap\');\n* { box-sizing: border-box; margin: 0; padding: 0; font-family: \'Jua\', sans-serif; }\nbody { background: #FFF6E5; color: #2D1810; padding: 40px 20px; line-height: 1.6; }\n.page { max-width: 760px; margin: 0 auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border: 4px solid #F4B942; }\nh1 { color: #92400E; font-size: 42px; text-align: center; margin-bottom: 8px; }\nh2 { color: #B45309; font-size: 28px; margin: 24px 0 12px; padding-bottom: 4px; border-bottom: 3px solid #FCD34D; }\nh3 { color: #C2410C; font-size: 22px; margin: 14px 0 6px; }\n.subtitle { text-align: center; color: #78716C; font-size: 18px; margin-bottom: 20px; }\n.banner { background: linear-gradient(135deg, #FED7AA, #FCD34D); padding: 16px 24px; border-radius: 16px; margin: 16px 0; text-align: center; font-size: 22px; }\n.stage-card { background: #FFF7ED; padding: 14px 20px; border-radius: 12px; margin: 10px 0; border: 2px solid #FED7AA; display: flex; justify-content: space-between; align-items: center; }\n.stage-name { font-size: 22px; color: #9A3412; }\n.stars { font-size: 24px; }\n.rewards { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }\n.reward-item, .reward-badge { background: #ECFDF5; padding: 8px 14px; border-radius: 999px; border: 2px solid #6EE7B7; font-size: 18px; }\n.reward-badge { background: #FEF2F2; border-color: #FCA5A5; }\n.concept { background: #FEF3C7; padding: 16px 20px; border-radius: 12px; margin: 12px 0; border-left: 6px solid #F59E0B; }\n.concept p { font-size: 18px; margin: 6px 0; }\n.example { color: #C2410C; font-weight: bold; }\n.print-btn { display: block; margin: 30px auto 0; padding: 14px 32px; background: #F59E0B; color: white; border: none; border-radius: 16px; font-size: 22px; cursor: pointer; font-family: inherit; }\n.print-btn:hover { background: #D97706; }\n@media print { body { background: white; padding: 0; } .page { box-shadow: none; border: none; } .print-btn { display: none; } }\n</style></head><body>\n<div class="page">\n  <h1>📜 비율 탐험 노트</h1>\n  <p class="subtitle">탐험가 <strong>' + studentName + '</strong> | 완료일 ' + dateStr + '</p>\n  <div class="banner">🎉 <strong>모든 단계 클리어!</strong> 🎉<br>모은 별 ' + totalStars + '개 / 정답 ' + totalCorrect + '개</div>\n  <h2>🏆 클리어 현황</h2>\n  <div class="stage-card"><span class="stage-name">🌰 비의 숲</span><span class="stars">' + starHtml(stars1) + '</span></div>\n  <div class="stage-card"><span class="stage-name">📊 비율의 언덕</span><span class="stars">' + starHtml(stars2) + '</span></div>\n  <div class="stage-card"><span class="stage-name">💯 백분율 마을</span><span class="stars">' + starHtml(stars3) + '</span></div>\n  ' + (badgesHtml || itemsHtml ? '<h2>🎁 모은 보물</h2><div class="rewards">' + badgesHtml + ' ' + itemsHtml + '</div>' : '') + '\n  <h2>📖 오늘 배운 것</h2>\n  <div class="concept"><h3>🌰 비</h3>\n    <p>두 양을 비교할 때 기호 ":" 를 써서 나타낸 것</p>\n    <p><span class="example">예) 3 : 5</span> — "삼 대 오" 또는 "3과 5의 비" 라고 읽어요</p>\n    <p>":" 앞이 비교하는 양, 뒤가 기준량</p></div>\n  <div class="concept"><h3>📊 비율</h3>\n    <p>기준량에 대한 비교하는 양의 크기</p>\n    <p><span class="example">비율 = 비교하는 양 ÷ 기준량</span></p>\n    <p>예) 3 : 5 의 비율 → 3 ÷ 5 = 0.6 (또는 분수 ⅗)</p>\n    <p>분수와 소수로 모두 나타낼 수 있어요</p></div>\n  <div class="concept"><h3>💯 백분율 (%)</h3>\n    <p>기준량을 <span class="example">100</span>으로 했을 때의 비율</p>\n    <p><span class="example">소수 × 100 = 백분율</span> &nbsp;예) 0.6 → 60%</p>\n    <p>같은 비율을 비, 분수, 소수, 백분율로 모두 표현할 수 있어요</p></div>\n  <button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button>\n</div></body></html>';

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = studentName + '_비율탐험노트_' + new Date().toISOString().slice(0, 10) + '.html';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    postEvent(studentName, 'download_note');
  };

  return (
    <>
      <style>{themeStyles}</style>
      {needsRotate ? <RotateHint /> : (
        <div className="fixed inset-0 outer-bg overflow-hidden">
          <div
            style={{
              width: CANVAS_W,
              height: CANVAS_H,
              position: 'absolute',
              top: '50%',
              left: '50%',
              transform: `translate(-50%, -50%) scale(${scale})`,
              transformOrigin: 'center center',
              borderRadius: scale < 0.98 ? 24 : 0,
              overflow: 'hidden',
              boxShadow: scale < 0.98 ? '0 20px 60px rgba(74, 44, 31, 0.25)' : 'none',
            }}
          >
            {screen === 'home' && (
              <HomeScreen progress={progress} rewards={rewards} studentName={studentName}
                onNavigate={setScreen} onReset={resetProgress}
                onDownloadNote={downloadNote} onChangeName={changeName} />
            )}
            {screen === 's1' && (
              <Stage1 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s1', stars)}
                onCorrect={handleCorrect} />
            )}
            {screen === 's2' && (
              <Stage2 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s2', stars)}
                onCorrect={handleCorrect} />
            )}
            {screen === 's3' && (
              <Stage3 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s3', stars)}
                onCorrect={handleCorrect}
                rewards={rewards} progress={progress} onDownloadNote={downloadNote} />
            )}
            {pendingRewards.length > 0 && (
              <RewardModal reward={pendingRewards[0]} onClose={dismissReward} queueRemaining={pendingRewards.length} />
            )}
            {showNameModal && <NameSelectModal onSelect={handleNameSelect} />}
          </div>
        </div>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
