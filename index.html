// ============ SCALE HOOK ============
function useScale() {
  const [state, setState] = useState({ scale: 1, needsRotate: false });
  useEffect(() => {
    const update = () => {
      const W = window.innerWidth;
      const H = window.innerHeight;
      // Phone-sized device in portrait → ask to rotate
      const needsRotate = W < H && W < 640;
      const sw = (W - 48) / CANVAS_W;
      const sh = (H - 48) / CANVAS_H;
      setState({ scale: Math.min(sw, sh), needsRotate });
    };
    update();
    window.addEventListener('resize', update);
    const orientationHandler = () => setTimeout(update, 120);
    window.addEventListener('orientationchange', orientationHandler);
    return () => {
      window.removeEventListener('resize', update);
      window.removeEventListener('orientationchange', orientationHandler);
    };
  }, []);
  return state;
}

// ============ SCRATCH PAD (계산용 손글씨 보드) ============
const ScratchPad = ({ width = 720, height = 150 }) => {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef({ x: 0, y: 0 });
  const [open, setOpen] = useState(true);
  const [color, setColor] = useState('#1f2937');

  useEffect(() => {
    if (!open) return;
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FFFCF5';
    ctx.fillRect(0, 0, c.width, c.height);
    // 가벼운 라인 (글씨 가이드)
    ctx.strokeStyle = '#FDE8B5';
    ctx.lineWidth = 1;
    for (let y = 30; y < c.height; y += 30) {
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(c.width, y);
      ctx.stroke();
    }
  }, [open]);

  const getPos = (e) => {
    const c = canvasRef.current; if (!c) return { x: 0, y: 0 };
    const rect = c.getBoundingClientRect();
    const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
    return { x: (cx - rect.left) * (c.width / rect.width), y: (cy - rect.top) * (c.height / rect.height) };
  };
  const down = (e) => { drawing.current = true; last.current = getPos(e); };
  const move = (e) => {
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const p = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = color === '#FFFCF5' ? 18 : 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const up = () => { drawing.current = false; };
  const clear = () => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FFFCF5';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.strokeStyle = '#FDE8B5';
    ctx.lineWidth = 1;
    for (let y = 30; y < c.height; y += 30) {
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(c.width, y);
      ctx.stroke();
    }
  };

  if (!open) {
    return (
      <div className="flex justify-end mb-2">
        <button onClick={() => setOpen(true)}
          className="font-display bg-amber-100 hover:bg-amber-200 text-amber-900 border-2 border-b-4 border-amber-300 rounded-xl px-4 py-2 transition-all"
          style={{ fontSize: '1.1rem' }}>
          ✏️ 계산 보드 열기
        </button>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-2xl border-2 border-amber-300 p-3 mb-3 card-shadow">
      <div className="flex items-center justify-between mb-2">
        <span className="font-display text-amber-900" style={{ fontSize: '1.1rem' }}>✏️ 계산 보드 — 여기에 풀이를 적어 보세요</span>
        <div className="flex items-center gap-2">
          <button onClick={() => setColor('#1f2937')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#1f2937' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#1f2937' }} title="검정 펜" />
          <button onClick={() => setColor('#ea580c')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#ea580c' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#ea580c' }} title="주황 펜" />
          <button onClick={() => setColor('#FFFCF5')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#FFFCF5' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#FFFCF5' }} title="지우개" />
          <button onClick={clear}
            className="font-body text-stone-500 hover:text-stone-700 underline ml-1" style={{ fontSize: '0.9rem' }}>전체 지우기</button>
          <button onClick={() => setOpen(false)}
            className="font-body text-stone-500 hover:text-stone-700 underline" style={{ fontSize: '0.9rem' }}>닫기</button>
        </div>
      </div>
      <canvas ref={canvasRef} width={width} height={height}
        className="rounded-lg border-2 border-amber-200 w-full bg-amber-50"
        style={{ touchAction: 'none', cursor: 'crosshair', height: height }}
        onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
        onTouchStart={(e) => { e.preventDefault(); down(e); }}
        onTouchMove={(e) => { e.preventDefault(); move(e); }}
        onTouchEnd={up} />
    </div>
  );
};

// 점이 다각형 안에 있는지 판정 (lasso 묶기용)
function isPointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if (((yi > point.y) !== (yj > point.y)) &&
        (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

  const getDrawPos = (e) => {
    if (!drawAreaRef.current) return null;
    const rect = drawAreaRef.current.getBoundingClientRect();
    const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
    const scaleX = 700 / rect.width;
    const scaleY = 140 / rect.height;
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };

    if (paths.length >= 2) return;

            className={`${color} text-white rounded-3xl border-b-8 btn-shadow px-12 py-7 flex flex-col items-center gap-1`}>
            <span className="font-display leading-none" style={{ fontSize: '5rem' }}>{n}</span>
            <span className="font-display text-3xl">문제</span>
            <span className="font-body text-xl opacity-90">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );

  const advanceToNext = (correct) => {
    const newAnswers = [...qAnswers, correct];
    setQAnswers(newAnswers);
    setFeedback(null);
    setAttempts(0);
    if (qIndex + 1 < selectedQuestions.length) {
      setQIndex(qIndex + 1);
    } else {
      const total = selectedQuestions.length;
      const correctCount = newAnswers.filter(Boolean).length;
      const r = correctCount / total;
      const finalStars = r >= 0.95 ? 3 : r >= 0.6 ? 2 : r > 0 ? 1 : 0;
      onComplete(finalStars);
      setShowConfetti(true);
      setStep(5);
      setTimeout(() => setShowConfetti(false), 4000);
    }
  };

  const tryAgain = () => {
    setFeedback(null);
    setAttempts(attempts + 1);
  };

  const goRelearn = () => {
    setFeedback(null);
    setAttempts(0);
    setQuizSize(null);
    setSelectedQuestions([]);
    setQIndex(0);
    setQAnswers([]);
    setStep(0);
  };

  const colorizeText = (text) => {
    if (typeof text !== 'string') return text;
    const regex = /(도토리\s*\d+\s*개?|풋사과\s*\d+\s*개?|도토리|풋사과)/g;
    const result = [];
    let lastIdx = 0;
    let key = 0;
    let m;
    while ((m = regex.exec(text)) !== null) {
      if (m.index > lastIdx) result.push(<React.Fragment key={'t' + key++}>{text.slice(lastIdx, m.index)}</React.Fragment>);
      const txt = m[0];
      if (txt.startsWith('도토리')) result.push(<b key={'a' + key++} className="text-orange-600">{txt}</b>);
      else if (txt.startsWith('풋사과')) result.push(<b key={'w' + key++} className="text-stone-800">{txt}</b>);
      lastIdx = m.index + txt.length;
    }
    if (lastIdx < text.length) result.push(<React.Fragment key={'t' + key++}>{text.slice(lastIdx)}</React.Fragment>);
    return <>{result}</>;
  };

  const renderQuiz = () => {
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    const handleAnswer = (i) => {
      const correct = i === q.answer;
      setFeedback({ correct, picked: i });
      if (correct && onCorrect) onCorrect();
    };

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-6 overflow-y-auto py-4">
        <Card className="w-full max-w-6xl p-7">
          <div className="flex justify-between items-center mb-5">
            <span className="font-display text-amber-700 text-3xl">문제 {qIndex + 1} / {quizSize}</span>
            <div className="flex gap-2 flex-wrap max-w-md justify-end">
              {[...Array(quizSize)].map((_, i) => (
                <div key={i} className={`w-5 h-5 rounded-full ${i < qIndex ? 'bg-emerald-400' : i === qIndex ? 'bg-orange-400' : 'bg-amber-200'}`} />
              ))}
            </div>
          </div>

          <p className="font-body text-stone-800 mb-5 leading-snug" style={{ fontSize: '2.8rem', lineHeight: '3.6rem', wordBreak: 'keep-all' }}>{colorizeText(q.q)}</p>

          {q.visual && (
            <div className="bg-amber-50 rounded-2xl p-4 mb-5 border-2 border-amber-200">
              <div className="flex items-center gap-3 flex-wrap mb-3">
                <span className="font-display text-orange-700 text-3xl w-28">도토리</span>
                <span className="font-display text-orange-700" style={{ fontSize: '2.4rem' }}>{q.visual.a}개</span>
                <div className="flex items-center gap-1 flex-wrap ml-2">
                  {[...Array(q.visual.a)].map((_, i) => <Acorn key={i} size={44} />)}
                </div>
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                <span className="font-display text-lime-700 text-3xl w-28">풋사과</span>
                <span className="font-display text-lime-700" style={{ fontSize: '2.4rem' }}>{q.visual.w}개</span>
                <div className="flex items-center gap-1 flex-wrap ml-2">
                  {[...Array(q.visual.w)].map((_, i) => <Walnut key={i} size={44} />)}
                </div>
              </div>
            </div>
          )}

          <div className="grid grid-cols-4 gap-4">
            {q.options.map((opt, i) => {
              const isPicked = feedback?.picked === i;
              const isCorrect = i === q.answer;
              let style = 'bg-white hover:bg-amber-50 border-amber-200 text-stone-800';
              if (feedback) {
                if (isPicked && isCorrect) style = 'bg-emerald-100 border-emerald-400 text-emerald-900';
                else if (isPicked && !isCorrect) style = 'bg-red-100 border-red-400 text-red-900 animate-shake';
                else style = 'bg-white border-amber-200 text-stone-500 opacity-60';
              }
              return (
                <button key={i}
                  onClick={() => !feedback && handleAnswer(i)}
                  disabled={!!feedback}
                  className={`font-display px-3 py-7 rounded-2xl border-2 border-b-4 transition-all ${style}`}
                  style={{ fontSize: '2.6rem' }}>
                  {opt}
                </button>
              );
            })}
          </div>

          <div className="mt-5">
            <ScratchPad key={'s1-q-' + qIndex} />
          </div>
        </Card>
      </div>
    );
  };

  const renderQuizModal = () => {
    if (!feedback || step !== 4) return null;
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    if (feedback.correct) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-10 max-w-2xl w-full card-shadow border-4 border-emerald-300 text-center animate-pop-in">
            <div className="text-9xl mb-3">🎉</div>
            <h3 className="font-display text-emerald-700 mb-3" style={{ fontSize: '5rem' }}>정답이에요!</h3>
            <p className="font-body text-stone-700 text-3xl mb-6">정말 잘했어요!</p>
            <Button onClick={() => advanceToNext(true)} variant="secondary">
              {qIndex + 1 < selectedQuestions.length ? '다음 문제로 →' : '결과 보기 →'}
            </Button>
          </div>
        </div>
      );
    }

    if (attempts === 0) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-8 max-w-3xl w-full card-shadow border-4 border-orange-300 text-center animate-pop-in">
            <div className="text-8xl mb-2">😅</div>
            <h3 className="font-display text-orange-700 mb-3" style={{ fontSize: '4rem' }}>앗, 틀렸어요!</h3>
            <div className="bg-amber-50 rounded-2xl p-5 my-4 border-2 border-amber-200 text-left">
              <p className="font-display text-amber-900 text-3xl mb-2">📖 비 다시 보기</p>
              <p className="font-body text-stone-700 text-2xl leading-relaxed" style={{ wordBreak: 'keep-all' }}>
                {(typeof q.explanation === 'string' ? q.explanation.split(/(?<=[.!?])\s+/) : [q.explanation]).map((s, i) => (
                  <React.Fragment key={i}>
                    {i > 0 ? ' ' : null}
                    <span style={{ display: 'inline-block' }}>{s}</span>
                  </React.Fragment>
                ))}
              </p>
            </div>
            <Button onClick={tryAgain} variant="primary">한 번 더 도전!</Button>
          </div>
        </div>
      );
    }

    return (
      <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
        <div className="bg-white rounded-3xl p-8 max-w-2xl w-full card-shadow border-4 border-rose-300 text-center animate-pop-in">
          <div className="text-8xl mb-2">📚</div>
          <h3 className="font-display text-rose-700 mb-3" style={{ fontSize: '4rem' }}>괜찮아요!</h3>
          <p className="font-body text-stone-700 text-3xl mb-2">처음부터 다시 차근차근 공부하고 와요!</p>
          <p className="font-body text-stone-500 text-2xl mb-6">비를 더 잘 이해하면 쉽게 풀 수 있어요</p>
          <Button onClick={goRelearn} variant="secondary">📚 처음부터 다시 공부하기</Button>
        </div>
      </div>
    );
  };

  const renderDone = () => (
    <div className="animate-fade-up h-full flex items-center justify-center px-16 gap-10">
      <div className="text-center flex-shrink-0">
        <div className="animate-bounce-soft mb-4 inline-block"><Squirrel size={220} mood="happy" /></div>
        <div className="flex justify-center"><StarRow count={stars} size={56} /></div>
      </div>
      <Card className="flex-1 max-w-xl">
        <h2 className="font-display text-amber-900 mb-2" style={{ fontSize: '3.6rem' }}>잘했어요! 🎉</h2>
        <p className="font-body text-stone-700" style={{ fontSize: '1.9rem', lineHeight: '2.6rem' }}>비의 숲을 통과했어요!</p>
        <p className="font-body text-stone-600 mt-2" style={{ fontSize: '1.25rem' }}>{score} / 3 문제 정답</p>
        <div className="bg-amber-50 rounded-2xl p-5 mt-5 border-2 border-amber-200">
          <p className="font-display text-amber-900 mb-3" style={{ fontSize: '1.7rem' }}>📚 오늘 배운 것</p>
          <ul className="font-body text-stone-700 space-y-2" style={{ fontSize: '1.35rem', lineHeight: '2rem' }}>
            <li>• 두 양을 비교할 때 <b>"3 : 5"</b> 처럼 쓴 것을 <b>비</b>라고 해요</li>
            <li>• 기호 <b>":"</b> 를 사용해요</li>
            <li>• "삼 대 오" 또는 "3과 5의 비"라고 읽어요</li>
          </ul>
        </div>
        <div className="text-right mt-5">
          <Button onClick={onHome} variant="soft">지도로 가기</Button>
        </div>
      </Card>
    </div>
  );

  return (
    <div className="w-full h-full app-bg relative flex flex-col overflow-hidden">
      {showConfetti && <Confetti />}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="🌰 비의 숲"
        progress={showOverview ? '목차' : `${step === 0 ? 1 + introStep : step === 1 ? 3 + lessonStep : step + 3}/8`}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="1"
            stageBadge="🌰 비"
            stageTitle="비의 숲"
            stageGoal="두 양의 관계를 비로 나타내는 방법을 알아봐요"
            accentClass="border-orange-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderSummary()}
            {step === 3 && renderPractice()}
            {step === 4 && !quizSize && renderQuizSelect()}
            {step === 4 && quizSize && renderQuiz()}
            {step === 5 && renderDone()}
          </>
        )}
      </div>
      {renderQuizModal()}
    </div>
  );
};

// ============ STAGE 2: 비율 ============
const Stage2 = ({ onHome, onComplete, onCorrect }) => {
  const [step, setStep] = useState(0);
  const [a, setA] = useState(3);
  const [b, setB] = useState(5);
  const [practiceStep, setPracticeStep] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [qIndex, setQIndex] = useState(0);
  const [qAnswers, setQAnswers] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [attempts, setAttempts] = useState(0);
  const [quizSize, setQuizSize] = useState(null);
  const [selectedQuestions, setSelectedQuestions] = useState([]);
  const [showOverview, setShowOverview] = useState(true);
  const [visitedCards, setVisitedCards] = useState(new Set());
  const [priorCheck, setPriorCheck] = useState(null);
  // 비율 lesson 내부 단계: 0 공식, 1 직사각형 비율, 2 축척
  const [lessonStep, setLessonStep] = useState(0);
  // 직사각형 비율 활동 — A와 B는 공통 비율(baseW:baseH)을 공유. 각 직사각형은 scale로 크기만 조절.
  // 기본값: A는 작게, B는 크게 — 모양은 같지만 크기 차이가 한눈에 보이도록.
  const [rectBase, setRectBase] = useState({ w: 5, h: 3 });
  const [rectScaleA, setRectScaleA] = useState(1);
  const [rectScaleB, setRectScaleB] = useState(2.5);
  const [showRectPopup, setShowRectPopup] = useState(false);
  // 축척 활동 — 문제 풀이 단계: 'calc'(1cm 거리 계산) → 'compare'(비교 질문) → 'done'(결론)
  const [scaleStep, setScaleStep] = useState('calc');
  const [scaleInputs, setScaleInputs] = useState({ park: '', forest: '', traffic: '' });
  const [scaleCalcChecked, setScaleCalcChecked] = useState(false);
  const [widerAns, setWiderAns] = useState('');
  const [detailAns, setDetailAns] = useState('');
  const [compareChecked, setCompareChecked] = useState(false);
  // 비율 비교 문제 (과일 가게) — 200으로 통분
  //   사과: 110/200 (이미 분모 200, 변환 불필요)
  //   감: 160/400 = ?/200 → 80 (학생 입력)
  //   winner: '사과'
  const [fruitInputs, setFruitInputs] = useState({ persimNum: '', winner: '' });
  const [fruitChecked, setFruitChecked] = useState(false);
  const [showFruitCompare, setShowFruitCompare] = useState(false);
  const [fruitRevealed, setFruitRevealed] = useState({ apple: false, persim: false });

  // 분수↔소수 변환 활동 상태 (단계별 계산)
  const [convMode, setConvMode] = useState('frac2dec'); // 'frac2dec' | 'dec2frac'
  const [convIdx, setConvIdx] = useState(0);
  // frac→dec 입력: numIn, denIn (나눗셈 식), decIn (결과)
  const [convNumIn, setConvNumIn] = useState('');
  const [convDenIn, setConvDenIn] = useState('');
  const [convDecIn, setConvDecIn] = useState('');
  // dec→frac 입력: midNum (분모 10/100의 분자), redNum/redDen (약분 결과)
  const [convMidNum, setConvMidNum] = useState('');
  const [convRedNum, setConvRedNum] = useState('');
  const [convRedDen, setConvRedDen] = useState('');
  const [convFeedback, setConvFeedback] = useState(null);
  const [convShowHint, setConvShowHint] = useState(false);

  // 변환 문제 풀
  // base: 분모를 10/100 중 어떤 것으로 만들지 — dec→frac 단계에서 사용
  const convProblemsF2D = [
    { num: 1, den: 2, dec: 0.5 },
    { num: 1, den: 4, dec: 0.25 },
    { num: 3, den: 4, dec: 0.75 },
    { num: 1, den: 5, dec: 0.2 },
    { num: 2, den: 5, dec: 0.4 },
    { num: 3, den: 5, dec: 0.6 },
    { num: 4, den: 5, dec: 0.8 },
    { num: 3, den: 10, dec: 0.3 },
    { num: 7, den: 10, dec: 0.7 },
    { num: 9, den: 20, dec: 0.45 },
  ];
  const convProblemsD2F = [
    { dec: 0.5, base: 10, baseNum: 5, num: 1, den: 2 },
    { dec: 0.2, base: 10, baseNum: 2, num: 1, den: 5 },
    { dec: 0.4, base: 10, baseNum: 4, num: 2, den: 5 },
    { dec: 0.6, base: 10, baseNum: 6, num: 3, den: 5 },
    { dec: 0.8, base: 10, baseNum: 8, num: 4, den: 5 },
    { dec: 0.3, base: 10, baseNum: 3, num: 3, den: 10 },
    { dec: 0.7, base: 10, baseNum: 7, num: 7, den: 10 },
    { dec: 0.25, base: 100, baseNum: 25, num: 1, den: 4 },
    { dec: 0.75, base: 100, baseNum: 75, num: 3, den: 4 },
    { dec: 0.45, base: 100, baseNum: 45, num: 9, den: 20 },
  ];

  const convProblems = convMode === 'frac2dec' ? convProblemsF2D : convProblemsD2F;
  const convCurrent = convProblems[convIdx % convProblems.length];

  const resetConvInput = () => {
    setConvNumIn(''); setConvDenIn(''); setConvDecIn('');
    setConvMidNum(''); setConvRedNum(''); setConvRedDen('');
    setConvFeedback(null); setConvShowHint(false);
  };

  const checkConv = () => {
    if (convMode === 'frac2dec') {
      // 단계1: num ÷ den 식이 맞는지
      const n = parseInt(convNumIn, 10);
      const d = parseInt(convDenIn, 10);
      const dec = parseFloat(convDecIn);
      const okStep1 = n === convCurrent.num && d === convCurrent.den;
      const okStep2 = !isNaN(dec) && Math.abs(dec - convCurrent.dec) < 0.0001;
      if (okStep1 && okStep2) setConvFeedback('correct');
      else setConvFeedback('wrong');
    } else {
      // 단계1: 분모 10/100인 분수
      const mid = parseInt(convMidNum, 10);
      // 단계2: 약분된 분수
      const rn = parseInt(convRedNum, 10);
      const rd = parseInt(convRedDen, 10);
      const okStep1 = mid === convCurrent.baseNum;
      const okStep2 = !isNaN(rn) && !isNaN(rd) && rd !== 0 && Math.abs(rn / rd - convCurrent.dec) < 0.0001 && rn === convCurrent.num && rd === convCurrent.den;
      if (okStep1 && okStep2) setConvFeedback('correct');
      else setConvFeedback('wrong');
    }
  };

  const nextConvProblem = () => {
    setConvIdx(i => (i + 1) % convProblems.length);
    resetConvInput();
  };

  const switchConvMode = (m) => { setConvMode(m); setConvIdx(0); resetConvInput(); };

  const overviewCards = [
    { id: 1, icon: '📖', title: '문제 상황', step: 0 },
    { id: 2, icon: '🔵', title: '개념 학습', step: 1 },
    { id: 3, icon: '✨', title: '핵심 정리', step: 2 },
    { id: 4, icon: '📝', title: '연습하기', step: 3 },
    { id: 5, icon: '⚡', title: '빠른 연산 (퀴즈)', step: 4 },
  ];

  const handleCardClick = (card) => {
    setVisitedCards(prev => new Set([...prev, card.id]));
    setShowOverview(false);
    setStep(card.step);
  };

  const goOverview = () => setShowOverview(true);

  const goBack = () => {
    if (step === 0) setShowOverview(true);
    else if (step === 1) {
      if (lessonStep > 0) setLessonStep(lessonStep - 1);
      else setStep(0);
    } else if (step === 2) { setStep(1); setLessonStep(2); }
    else if (step === 3) {
      if (practiceStep > 0) setPracticeStep(practiceStep - 1);
      else setStep(2);
    } else if (step === 4) {
      if (quizSize) { setQuizSize(null); setSelectedQuestions([]); setQIndex(0); setQAnswers([]); setFeedback(null); }
      else setStep(3);
    } else if (step === 5) setStep(4);
    else setShowOverview(true);
  };

  const ratioDecimal = Math.round((a / b) * 1000) / 1000;

  const HINT_BASE = '":" 뒤에 있는 수가 기준량, ":" 앞에 있는 수가 비교하는 양이에요. 잘 살펴봐요!';
  const HINT_FRAC = (
    <span>
      ":" <b className="text-orange-700">앞</b>이 <b className="text-orange-700">비교하는 양</b>, ":" <b className="text-emerald-700">뒤</b>가 <b className="text-emerald-700">기준량</b>이에요.
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: '0.5rem', marginLeft: '0.6rem', verticalAlign: 'middle' }}>
        <span>→ 분수로:</span>
        <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', fontSize: '0.78em', lineHeight: '1.15' }}>
          <span className="text-orange-700" style={{ padding: '0 0.35rem' }}>비교하는 양</span>
          <span style={{ borderTop: '3px solid #555', alignSelf: 'stretch', margin: '3px 0' }}></span>
          <span className="text-emerald-700" style={{ padding: '0 0.35rem' }}>기준량</span>
        </span>
      </span>
    </span>
  );
  const HINT_DEC = (
    <span>
      비율을 소수로 바꿀 때는 <b className="text-orange-700">비교하는 양</b> ÷ <b className="text-emerald-700">기준량</b>을 계산해요.
    </span>
  );
  const HINT_FRAC_FROM_DEC = (
    <span>
      소수를 분수로 바꿀 때는 분모를 <b className="text-emerald-700">100</b>으로 만들어 봐요.
      <span style={{ marginLeft: '0.4rem' }}>(소수 두 자리 → 분모 100, 한 자리 → 분모 10)</span>
      <span style={{ marginLeft: '0.4rem' }}>그 다음 약분할 수 있는지 확인해요.</span>
    </span>
  );

  // 실생활 비율 문제 10문제
  const quizPool = [

                <p className="font-body text-stone-700 text-center" style={{ fontSize: '1.5rem' }}>전체 <b>400</b>개 중 <b>160</b>개 판매</p>
                <p className="font-body text-stone-600 text-center" style={{ fontSize: '1.3rem', lineHeight: '1.8rem' }}>분모를 사과처럼 <b>200</b>으로!<br/>분모를 2로 나누면 분자도 2로 나눠요.</p>
                <div className="bg-white rounded-xl p-4 border-2 border-orange-200 flex items-center justify-center gap-2 flex-wrap">
                  <Fraction num="160" den="400" color="#EA580C" size="1.7rem" />
                  <span className="font-display text-stone-500" style={{ fontSize: '1.5rem' }}>=</span>
                  <span className="inline-flex flex-col items-center">
                    <input type="text" inputMode="numeric" value={fruitInputs.persimNum}
                      onChange={(e) => { setFruitInputs({ ...fruitInputs, persimNum: e.target.value }); setFruitChecked(false); }}
                      className={`text-center font-display border-2 border-b-4 rounded-lg outline-none ${cls(persimNumOK)}`}
                      style={{ width: '5rem', fontSize: '1.8rem' }} placeholder="?" />
                    <span style={{ borderBottom: '3px solid #EA580C', alignSelf: 'stretch', minWidth: '1.4em', margin: '5px 0' }}></span>
                    <span className="font-display text-orange-600" style={{ fontSize: '1.8rem' }}>200</span>
                  </span>
                </div>
              </Card>
            </div>

            <div className="flex justify-between items-center mt-3">
              <button onClick={() => setFruitChecked(true)}
                className={`font-display rounded-xl px-5 py-2 border-b-4 transition-all ${persimNumOK ? 'bg-emerald-500 text-white border-emerald-700' : 'bg-amber-500 text-white border-amber-700'} shadow`}
                style={{ fontSize: '1.4rem' }}
                disabled={!fruitInputs.persimNum}>📌 계산 확인 ✨</button>
              {fruitChecked && persimNumOK && (
                <Button onClick={() => { setShowFruitCompare(true); setFruitRevealed({ apple: false, persim: false }); }} variant="secondary">📊 비교하러 가기 →</Button>
              )}
              <Button onClick={() => { setQuizSize(null); setSelectedQuestions([]); setQIndex(0); setQAnswers([]); setStep(4); }}>퀴즈 풀러 가기 <ArrowRight size={22} className="inline ml-1" /></Button>
            </div>
            {fruitChecked && !persimNumOK && (
              <p className="font-body text-rose-700 text-center mt-1" style={{ fontSize: '1.15rem' }}>다시 풀어 봐요! 분모 400을 2로 나누면 200, 분자도 똑같이 2로 나눠요.</p>
            )}

            {/* 비교 팝업 */}
            {showFruitCompare && (
              <div className="absolute inset-0 z-50 flex items-center justify-center p-6 animate-fade-up" style={{ background: 'rgba(0,0,0,0.55)' }}>
                <div className="bg-emerald-50 rounded-3xl p-7 max-w-3xl w-full card-shadow border-4 border-emerald-400 animate-pop-in">
                  <h3 className="font-display text-emerald-800 text-center mb-3" style={{ fontSize: '2rem' }}>📊 두 비율 비교하기</h3>
                  <p className="font-body text-stone-700 text-center mb-3" style={{ fontSize: '1.3rem' }}>아래 과일을 눌러서 앞에서 계산한 비율을 확인해 봐요!</p>

                  <div className="grid grid-cols-2 gap-3 mb-3">
                    {/* 사과 reveal */}
                    <button onClick={() => setFruitRevealed(r => ({ ...r, apple: true }))}
                      className={`rounded-2xl border-2 border-b-4 p-4 transition-all ${fruitRevealed.apple ? 'bg-white border-red-400' : 'bg-red-500 text-white border-red-700 hover:bg-red-600'}`}>
                      <p className="font-display text-center" style={{ fontSize: '1.7rem' }}>🍎 사과</p>
                      {fruitRevealed.apple ? (
                        <div className="flex items-center justify-center gap-2 mt-2">
                          <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>비율 =</span>
                          <Fraction num="110" den="200" color="#DC2626" size="1.8rem" />
                        </div>
                      ) : (
                        <p className="font-body text-center mt-2" style={{ fontSize: '1.1rem' }}>👆 눌러서 비율 보기</p>
                      )}
                    </button>
                    {/* 감 reveal */}
                    <button onClick={() => setFruitRevealed(r => ({ ...r, persim: true }))}
                      className={`rounded-2xl border-2 border-b-4 p-4 transition-all ${fruitRevealed.persim ? 'bg-white border-orange-400' : 'bg-orange-500 text-white border-orange-700 hover:bg-orange-600'}`}>
                      <p className="font-display text-center" style={{ fontSize: '1.7rem' }}>🟠 감</p>
                      {fruitRevealed.persim ? (
                        <div className="flex items-center justify-center gap-2 mt-2">
                          <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>비율 =</span>
                          <Fraction num="80" den="200" color="#EA580C" size="1.8rem" />
                        </div>
                      ) : (
                        <p className="font-body text-center mt-2" style={{ fontSize: '1.1rem' }}>👆 눌러서 비율 보기</p>
                      )}
                    </button>
                  </div>

                  {fruitRevealed.apple && fruitRevealed.persim && (
                    <div className="bg-white rounded-2xl p-4 border-2 border-emerald-300 animate-fade-up">
                      <p className="font-body text-stone-700 mb-2 text-center" style={{ fontSize: '1.3rem' }}>
                        ✨ 분모가 모두 <b>200</b>! 이제 분자를 비교하면 돼요.<br/>
                        <span className="font-display text-stone-800" style={{ fontSize: '1.5rem' }}>110 &gt; 80</span>
                      </p>
                      <p className="font-body text-stone-700 mb-2 text-center" style={{ fontSize: '1.3rem' }}>
                        그러면 <b>판매 비율이 더 높은 과일</b>은?
                      </p>
                      <div className="flex gap-3 justify-center">
                        {['사과', '감'].map(opt => {
                          const sel = fruitInputs.winner === opt;
                          const isAns = sel && fruitChecked && opt === '사과';
                          const isWrong = sel && fruitChecked && opt !== '사과';
                          return (
                            <button key={opt} onClick={() => { setFruitInputs({ ...fruitInputs, winner: opt }); }}
                              className={`font-display rounded-xl border-2 border-b-4 px-6 py-2 transition-all ${
                                isAns ? 'bg-emerald-100 border-emerald-500 text-emerald-800 animate-pop-in' :
                                isWrong ? 'bg-rose-100 border-rose-500 text-rose-700 animate-shake' :
                                sel ? 'bg-orange-100 border-orange-400 text-orange-800' : 'bg-white border-stone-300 text-stone-700'
                              }`}
                              style={{ fontSize: '1.5rem' }}>{opt === '사과' ? '🍎 사과' : '🟠 감'}</button>
                          );
                        })}
                      </div>
                      {fruitInputs.winner && winnerOK && (
                        <p className="font-body text-emerald-800 mt-3 text-center animate-pop-in" style={{ fontSize: '1.3rem' }}>
                          🎉 정답! 판매 비율이 더 높은 과일은 <b>사과</b>예요. (110/200 &gt; 80/200)
                        </p>
                      )}
                      {fruitInputs.winner && !winnerOK && (
                        <p className="font-body text-rose-700 mt-3 text-center" style={{ fontSize: '1.2rem' }}>
                          다시 생각해 봐요. 110과 80 중 어느 쪽이 더 크죠?
                        </p>
                      )}
                    </div>
                  )}

                  <div className="text-center mt-4">
                    <Button onClick={() => setShowFruitCompare(false)} variant="soft">닫기</Button>
                  </div>
                </div>
              </div>
            )}
          </>
          );
        })()}

      </div>
    );
  };

  const startQuiz = (size) => {
    const shuffled = [...quizPool].sort(() => Math.random() - 0.5).slice(0, size);
    setSelectedQuestions(shuffled);
    setQuizSize(size);
    setQIndex(0);
    setQAnswers([]);
    setAttempts(0);
    setFeedback(null);
  };

  const renderQuizSelect = () => (
    <div className="animate-fade-up h-full flex flex-col items-center justify-center px-12 gap-5">
      <div className="animate-bounce-soft mb-1"><Squirrel size={150} mood="happy" /></div>
      <h2 className="font-display text-6xl text-amber-900 leading-none">몇 문제 풀어볼까요?</h2>
      <p className="font-body text-stone-700 text-3xl">원하는 문제 수를 골라봐요!</p>
      <div className="flex gap-6 mt-3">
        {[
          { n: 3, color: 'bg-emerald-400 hover:bg-emerald-500 border-emerald-600', label: '쉬움' },
          { n: 5, color: 'bg-orange-400 hover:bg-orange-500 border-orange-600', label: '보통' },
          { n: 10, color: 'bg-rose-400 hover:bg-rose-500 border-rose-600', label: '도전!' },
        ].map(({ n, color, label }) => (
          <button key={n} onClick={() => startQuiz(n)}
            className={`${color} text-white rounded-3xl border-b-8 btn-shadow px-12 py-7 flex flex-col items-center gap-1`}>
            <span className="font-display leading-none" style={{ fontSize: '5rem' }}>{n}</span>
            <span className="font-display text-3xl">문제</span>
            <span className="font-body text-xl opacity-90">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );

  const advanceToNext = (correct) => {
    const newAnswers = [...qAnswers, correct];
    setQAnswers(newAnswers);
    setFeedback(null);
    setAttempts(0);
    if (qIndex + 1 < selectedQuestions.length) {
      setQIndex(qIndex + 1);
    } else {
      const total = selectedQuestions.length;
      const correctCount = newAnswers.filter(Boolean).length;
      const r = correctCount / total;
      const finalStars = r >= 0.95 ? 3 : r >= 0.6 ? 2 : r > 0 ? 1 : 0;
      onComplete(finalStars);
      setShowConfetti(true);
      setStep(5);
      setTimeout(() => setShowConfetti(false), 4000);
    }
  };

  const tryAgain = () => {
    setFeedback(null);
    setAttempts(attempts + 1);
  };

  const goRelearn = () => {
    setFeedback(null);
    setAttempts(0);
    setQuizSize(null);
    setSelectedQuestions([]);
    setQIndex(0);
    setQAnswers([]);
    setStep(0);
  };

  const renderOption = (opt) => {
    if (typeof opt === 'string' && opt.includes('/') && !opt.includes(' ')) {
      const parts = opt.split('/');
      if (parts.length === 2 && parts[0].trim() && parts[1].trim()) {
        return <Fraction num={parts[0].trim()} den={parts[1].trim()} color="currentColor" size="2.6rem" />;
      }
    }
    return <span>{opt}</span>;
  };

  const renderQuiz = () => {
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    const handleAnswer = (i) => {
      const correct = i === q.answer;
      setFeedback({ correct, picked: i });
      if (correct && onCorrect) onCorrect();
    };

    return (
      <div className="animate-fade-up h-full flex items-center justify-center px-6 overflow-y-auto py-4">
        <Card className="w-full max-w-6xl p-7">
          <div className="flex justify-between items-center mb-5">
            <span className="font-display text-amber-700 text-3xl">문제 {qIndex + 1} / {quizSize}</span>
            <div className="flex gap-2 flex-wrap max-w-md justify-end">
              {[...Array(quizSize)].map((_, i) => (
                <div key={i} className={`w-5 h-5 rounded-full ${i < qIndex ? 'bg-emerald-400' : i === qIndex ? 'bg-orange-400' : 'bg-amber-200'}`} />
              ))}
            </div>
          </div>

          <p className="font-body text-stone-800 mb-4 leading-snug" style={{ fontSize: '2.8rem', lineHeight: '3.6rem', wordBreak: 'keep-all' }}>{q.q}</p>

          <div className="grid grid-cols-4 gap-4">
            {q.options.map((opt, i) => {
              const isPicked = feedback?.picked === i;
              const isCorrect = i === q.answer;
              let style = 'bg-white hover:bg-amber-50 border-amber-200 text-stone-800';
              if (feedback) {
                if (isPicked && isCorrect) style = 'bg-emerald-100 border-emerald-400 text-emerald-900';
                else if (isPicked && !isCorrect) style = 'bg-red-100 border-red-400 text-red-900 animate-shake';
                else style = 'bg-white border-amber-200 text-stone-500 opacity-60';
              }
              return (
                <button key={i}
                  onClick={() => !feedback && handleAnswer(i)}
                  disabled={!!feedback}
                  className={`font-display px-3 py-6 rounded-2xl border-2 border-b-4 transition-all flex items-center justify-center min-h-[110px] ${style}`}
                  style={{ fontSize: '2.8rem' }}>
                  {renderOption(opt)}
                </button>
              );
            })}
          </div>

          <div className="mt-5">
            <ScratchPad key={'s2-q-' + qIndex} />
          </div>
        </Card>
      </div>
    );
  };

  const renderQuizModal = () => {
    if (!feedback || step !== 4) return null;
    const q = selectedQuestions[qIndex];
    if (!q) return null;

    if (feedback.correct) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-10 max-w-2xl w-full card-shadow border-4 border-emerald-300 text-center animate-pop-in">
            <div className="text-9xl mb-3">🎉</div>
            <h3 className="font-display text-emerald-700 mb-3" style={{ fontSize: '5rem' }}>정답이에요!</h3>
            <p className="font-body text-stone-700 text-3xl mb-6">정말 잘했어요!</p>
            <Button onClick={() => advanceToNext(true)} variant="secondary">
              {qIndex + 1 < selectedQuestions.length ? '다음 문제로 →' : '결과 보기 →'}
            </Button>
          </div>
        </div>
      );
    }

    if (attempts === 0) {
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
          <div className="bg-white rounded-3xl p-8 max-w-3xl w-full card-shadow border-4 border-orange-300 text-center animate-pop-in">
            <div className="text-8xl mb-2">😅</div>
            <h3 className="font-display text-orange-700 mb-3" style={{ fontSize: '4rem' }}>앗, 틀렸어요!</h3>
            <div className="bg-amber-50 rounded-2xl p-5 my-4 border-2 border-amber-200 text-left">
              <p className="font-display text-amber-900 text-3xl mb-2">📖 비율 다시 보기</p>
              <p className="font-body text-stone-700 text-2xl leading-relaxed" style={{ wordBreak: 'keep-all' }}>
                {(typeof q.explanation === 'string' ? q.explanation.split(/(?<=[.!?])\s+/) : [q.explanation]).map((s, i) => (
                  <React.Fragment key={i}>
                    {i > 0 ? ' ' : null}
                    <span style={{ display: 'inline-block' }}>{s}</span>
                  </React.Fragment>
                ))}
              </p>
            </div>
            <Button onClick={tryAgain} variant="primary">한 번 더 도전!</Button>
          </div>
        </div>
      );
    }

    return (
      <div className="absolute inset-0 z-50 flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.55)' }}>
        <div className="bg-white rounded-3xl p-8 max-w-2xl w-full card-shadow border-4 border-rose-300 text-center animate-pop-in">
          <div className="text-8xl mb-2">📚</div>
          <h3 className="font-display text-rose-700 mb-3" style={{ fontSize: '4rem' }}>괜찮아요!</h3>
          <p className="font-body text-stone-700 text-3xl mb-2">처음부터 다시 차근차근 공부하고 와요!</p>
          <p className="font-body text-stone-500 text-2xl mb-6">비율을 더 잘 이해하면 쉽게 풀 수 있어요</p>
          <Button onClick={goRelearn} variant="secondary">📚 처음부터 다시 공부하기</Button>
        </div>
      </div>
    );
  };

  const renderDone = () => (
    <div className="animate-fade-up h-full flex items-center justify-center px-16 gap-10">
      <div className="text-center flex-shrink-0">
        <div className="animate-bounce-soft mb-4 inline-block"><Squirrel size={220} mood="happy" /></div>
        <div className="flex justify-center"><StarRow count={stars} size={56} /></div>
      </div>
      <Card className="flex-1 max-w-xl">
        <h2 className="font-display text-4xl text-amber-900 mb-2">멋져요! 🎉</h2>
        <p className="font-body text-stone-700 text-xl">비율의 언덕도 정복했어요!</p>
        <p className="font-body text-stone-600 text-base mt-2">{score} / 3 문제 정답</p>
        <div className="bg-amber-50 rounded-2xl p-5 mt-5 border-2 border-amber-200">
          <p className="font-display text-amber-900 mb-2 text-lg">📚 오늘 배운 것</p>
          <ul className="font-body text-stone-700 text-base space-y-1.5">
            <li>• <b>":"</b> 뒤가 <b>기준량</b>, 앞이 <b>비교하는 양</b></li>
            <li>• <b>비율 = 비교하는 양 ÷ 기준량</b></li>
            <li>• 비율은 <b>분수</b>로도, <b>소수</b>로도 나타낼 수 있어요</li>
          </ul>
        </div>
        <div className="text-right mt-5">
          <Button onClick={onHome} variant="soft">지도로 가기</Button>
        </div>
      </Card>
    </div>
  );

  return (
    <div className="w-full h-full app-bg relative flex flex-col overflow-hidden">
      {showConfetti && <Confetti />}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="📊 비율의 언덕"
        progress={showOverview ? '목차' : `${Math.min(step + 1, 6)}/6`}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="2"
            stageBadge="📊 비율"
            stageTitle="비율의 언덕"
            stageGoal="비율의 의미를 알고 분수·소수로 나타내요"
            accentClass="border-emerald-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderSummary()}
            {step === 3 && renderPractice()}
            {step === 4 && !quizSize && renderQuizSelect()}
            {step === 4 && quizSize && renderQuiz()}
            {step === 5 && renderDone()}
          </>
        )}
      </div>
      {renderQuizModal()}
    </div>
  );
};

// 빈칸 입력 컴포넌트 (백분율 연습용)
const Blank = ({ value, onChange, width = '4rem', size = '1.4rem' }) => (
  <input
    type="text"
    inputMode="decimal"
    value={value || ''}
    onChange={(e) => onChange(e.target.value)}
    className="text-center font-display rounded-lg border-2 border-b-4 px-2 py-1 mx-1 outline-none transition-colors border-amber-300 bg-white text-stone-700 focus:border-orange-400"
    style={{ width, fontSize: size }}
  />
);

// ============ STAGE 3: 백분율 ============
const Stage3 = ({ onHome, onComplete, onCorrect, rewards, progress, onDownloadNote }) => {
  const [step, setStep] = useState(0);
  const [percent, setPercent] = useState(30);
  const [lessonStep, setLessonStep] = useState(0);
  const [methodsStep, setMethodsStep] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [qIndex, setQIndex] = useState(0);
  const [qAnswers, setQAnswers] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [blanks, setBlanks] = useState({});
  const setBlank = (key) => (v) => setBlanks(b => ({ ...b, [key]: v }));
  const blank = (key) => (blanks[key] !== undefined ? blanks[key] : '');
  const [hintMsg, setHintMsg] = useState(null);
  const [verified, setVerified] = useState({});

  const triggerCelebration = () => {
    setShowConfetti(true);
    setTimeout(() => setShowConfetti(false), 5000);
  };

  const fI = (n, d) => <Fraction num={n} den={d} color="#047857" size="0.95rem" />;
  const pageChecks = {
    disc: [
      { key: 'discA1', ans: 30, hint: <>30%는 "100칸 중 30칸"이에요. 분자 자리에 들어갈 수를 생각해 봐요.</> },
      { key: 'discA2', ans: 3000, hint: <>10,000 × {fI('30','100')}을 차근차근 계산해 봐요. {fI('30','100')}을 약분해서 곱해도 좋아요.</> },
      { key: 'discB1', ans: 0.3, tol: 0.001, hint: <>30%를 소수로 바꾸려면 30 ÷ 100을 계산해 봐요. 소수점은 어디로 옮겨갈까요?</> },
      { key: 'discB2', ans: 3000, hint: <>10,000에 0.3을 곱해 봐요. 10,000의 {fI('1','10')}은 1,000이라는 점이 도움이 될 거예요.</> },
    ],
    test: [
      { key: 'testA1', ans: 80, hint: <>분모를 25에서 100으로 만들려면 어떤 수를 곱해야 할까요? 그 수를 분자에도 똑같이 곱해 봐요.</> },
      { key: 'testA2', ans: 80, hint: <>분모가 100인 분수의 분자가 곧 백분율이에요! 위 칸에 쓴 분자를 그대로 적어 봐요.</> },
      { key: 'testB1', ans: 0.8, tol: 0.001, hint: <>20 ÷ 25를 계산해 봐요. 분수 {fI('20','25')}를 소수로 바꾼다고 생각해도 좋아요.</> },
      { key: 'testB2', ans: 80, hint: <>비율(소수)에 100을 곱하면 백분율이 돼요. 소수점이 두 자리 오른쪽으로 옮겨가요.</> },

            setStep(8);

  };

  return (
    <div className="w-full h-full app-bg relative flex flex-col overflow-hidden">
      {showConfetti && <Confetti />}
      {hintMsg && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-6" onClick={() => setHintMsg(null)}>
          <div className="bg-white rounded-3xl p-6 max-w-md card-shadow border-4 border-amber-300 animate-pop-in text-center" onClick={e => e.stopPropagation()}>
            <div className="inline-block mb-2"><Squirrel size={90} mood="thinking" /></div>
            <p className="font-display text-amber-900 text-2xl mb-2">💡 힌트</p>
            <p className="font-body text-stone-700 text-base leading-relaxed">{hintMsg}</p>
            <div className="mt-4 flex justify-center">
              <Button onClick={() => setHintMsg(null)}>다시 풀어볼게요!</Button>
            </div>
          </div>
        </div>
      )}
      {conceptReturn && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-6">
          <div className="bg-white rounded-3xl p-6 max-w-md card-shadow border-4 border-orange-400 animate-pop-in text-center">
            <div className="inline-block mb-2"><Squirrel size={100} mood="thinking" /></div>
            <p className="font-display text-orange-700 text-2xl mb-2">📚 개념을 다시 공부해요!</p>
            <p className="font-body text-stone-700 text-base leading-relaxed">
              두 번 틀렸어요. 백분율로 바꾸는 두 가지 방법을 다시 한번 살펴보고 와요!
            </p>
            <div className="mt-4 flex justify-center">
              <Button onClick={() => {
                setConceptReturn(false);
                setQuizAttempts(p => ({ ...p, [qIndex]: 0 }));
                setStep(2);
              }}>학습 페이지로 가기</Button>
            </div>
          </div>
        </div>
      )}
      {showLevelGuide && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-6" onClick={() => setShowLevelGuide(false)}>
          <div className="bg-white rounded-3xl p-6 max-w-2xl w-full card-shadow border-4 border-amber-300 animate-pop-in text-center" onClick={e => e.stopPropagation()}>
            <p className="font-display text-amber-900 text-2xl mb-1">📊 레벨 안내</p>
            <p className="font-body text-stone-600 text-sm mb-4">정답을 모으면 다음과 같은 보상을 받을 수 있어요!</p>
            <div className="grid grid-cols-2 gap-2">
              {MILESTONES.map(m => {
                const reached = (rewards?.totalCorrect || 0) >= m.count;
                return (
                  <div key={m.id} className={`rounded-xl px-3 py-2 border-2 flex items-center gap-2 ${reached ? 'bg-emerald-50 border-emerald-300' : 'bg-stone-50 border-stone-200 opacity-70'}`}>
                    <span className="text-2xl">{m.icon}</span>
                    <div>
                      <p className={`font-display text-base ${reached ? 'text-emerald-800' : 'text-stone-500'}`}>{m.name}</p>
                      <p className="font-body text-stone-500 text-xs">{m.count}문제 정답</p>
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="font-body text-amber-700 text-sm mt-3 text-center">
              현재 정답 수: <b>{rewards?.totalCorrect || 0}</b>개
            </p>
            <div className="mt-4 flex justify-center">
              <Button onClick={() => setShowLevelGuide(false)} variant="soft">닫기</Button>
            </div>
          </div>
        </div>
      )}
      {showMethodsCompare && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-6">
          <div className="bg-purple-50 rounded-3xl p-7 max-w-3xl w-full card-shadow border-4 border-purple-400 animate-pop-in">
            <h3 className="font-display text-purple-800 text-center mb-4" style={{ fontSize: '2rem' }}>📊 두 방법 비교</h3>
            <div className="space-y-3">
              <div className="bg-white rounded-2xl p-4 border-2 border-emerald-300">
                <p className="font-display text-emerald-800 mb-2" style={{ fontSize: '1.4rem' }}>① 분모를 100으로 바꾸기</p>
                <p className="font-body text-stone-700" style={{ fontSize: '1.25rem', lineHeight: '1.85rem' }}>
                  분수의 <b>분모를 100으로</b> 바꾸면, <b className="text-orange-700">분자가 곧 백분율</b>이에요.
                </p>
                <div className="flex items-center justify-center gap-2 mt-2" style={{ fontSize: '1.5rem' }}>
                  <Fraction num="14" den="25" color="#047857" size="1.5rem" />
                  <span>=</span>
                  <Fraction num="56" den="100" color="#047857" size="1.5rem" />
                  <span>➡</span>
                  <b className="text-orange-700" style={{ fontSize: '1.9rem' }}>56%</b>
                </div>
              </div>
              <div className="bg-white rounded-2xl p-4 border-2 border-orange-300">
                <p className="font-display text-orange-800 mb-2" style={{ fontSize: '1.4rem' }}>② 비율 × 100</p>
                <p className="font-body text-stone-700" style={{ fontSize: '1.25rem', lineHeight: '1.85rem' }}>
                  비율(분수/소수)에 <b className="text-orange-700">100을 곱하면</b> 바로 백분율이에요.
                </p>
                <div className="flex items-center justify-center gap-2 mt-2" style={{ fontSize: '1.5rem' }}>
                  <Fraction num="14" den="25" color="#C2410C" size="1.5rem" />
                  <span>× 100 = 56</span>
                  <span>➡</span>
                  <b className="text-orange-700" style={{ fontSize: '1.9rem' }}>56%</b>
                </div>
              </div>
              <p className="font-body text-stone-700 text-center bg-amber-100 rounded-xl p-3 border-2 border-amber-300" style={{ fontSize: '1.2rem' }}>
                💡 두 방법 모두 답은 같아요! 상황에 따라 편한 방법을 골라 써요.
              </p>
            </div>
            <div className="text-center mt-4">
              <Button onClick={() => setShowMethodsCompare(false)}>알겠어요!</Button>
            </div>
          </div>
        </div>
      )}
      {showCompletion && (() => {
        const allDone = progress && (progress.s1 || 0) > 0 && (progress.s2 || 0) > 0 && (progress.s3 || 0) > 0;
        return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-6">
            <div className="bg-gradient-to-br from-amber-50 via-white to-orange-50 rounded-3xl p-8 max-w-xl w-full card-shadow border-4 border-amber-400 animate-pop-in text-center">
              <div className="animate-bounce-soft inline-block mb-2"><Squirrel size={150} mood="happy" /></div>
              <h2 className="font-display text-amber-900 text-3xl mb-1">🎉 학습 완료!</h2>
              <p className="font-body text-stone-700 text-lg mb-3">백분율 마을 학습을 모두 마쳤어요!</p>
              <div className="flex justify-center mb-4"><StarRow count={stars} size={44} /></div>

              {allDone && onDownloadNote ? (
                <div className="bg-amber-100 rounded-2xl p-4 border-2 border-amber-300 mb-4">
                  <p className="font-display text-amber-900 text-lg mb-1">📜 탐험 노트 받기</p>
                  <p className="font-body text-stone-700 text-sm mb-3">세 단계를 모두 마쳤어요! 노트를 받아서 간직해 보세요.</p>
                  <Button onClick={onDownloadNote}>탐험 노트 받기</Button>
                </div>
              ) : (
                <p className="font-body text-stone-600 text-sm mb-4">
                  💡 세 단계(비의 숲 · 비율의 언덕 · 백분율 마을)를 모두 마치면 탐험 노트를 받을 수 있어요!
                </p>
              )}

              <div className="flex justify-center">
                <Button onClick={() => { setShowCompletion(false); onHome(); }}>🗺️ 지도로 가기</Button>
              </div>
            </div>
          </div>
        );
      })()}
      <TopBar
        onHome={onHome}
        onBack={!showOverview ? goBack : null}
        title="💯 백분율 마을"
        progress={showOverview ? '목차' : `${Math.min(step + 1, 9)}/9`}
      />
      <div className="flex-1 overflow-hidden">
        {showOverview ? (
          <StageOverview
            stageNumber="3"
            stageBadge="💯 백분율"
            stageTitle="백분율 마을"
            stageGoal="백분율의 의미와 구하는 방법을 알아봐요"
            accentClass="border-amber-400"
            cards={overviewCards}
            visitedCards={visitedCards}
            onCardClick={handleCardClick}
          />
        ) : (
          <>
            {step === 0 && renderIntro()}
            {step === 1 && renderLesson()}
            {step === 2 && renderMethods()}
            {step === 3 && renderDiscount()}
            {step === 4 && renderTest()}
            {step === 5 && renderRain()}
            {step === 6 && renderBattery()}
            {step === 7 && !quizSize && renderQuizSelect()}
            {step === 7 && quizSize && renderQuiz()}
            {step === 8 && renderDone()}
          </>
        )}
      </div>
    </div>
  );
};

// ============ ROTATE HINT ============
const RotateHint = () => (
  <div className="fixed inset-0 outer-bg flex items-center justify-center p-8">
    <div className="bg-white rounded-3xl p-8 card-shadow border-2 border-amber-200 text-center max-w-xs">
      <div className="text-7xl mb-4 animate-wiggle">📱</div>
      <p className="font-display text-amber-900 text-2xl mb-2" style={{ fontFamily: "'Jua', sans-serif" }}>
        기기를 돌려주세요!
      </p>
      <p className="font-body text-stone-600 text-base" style={{ fontFamily: "'Gowun Dodum', sans-serif" }}>
        가로 모드에서 가장 잘 보여요 🐿️
      </p>
    </div>
  </div>
);

// ============ MAIN APP ============
function App() {
  const [screen, setScreen] = useState('home');
  const [progress, setProgress] = useState({ s1: 0, s2: 0, s3: 0 });
  const [rewards, setRewards] = useState({ totalCorrect: 0, items: [], badges: [] });
  const [pendingRewards, setPendingRewards] = useState([]);
  const [studentName, setStudentName] = useState(null);
  const [showNameModal, setShowNameModal] = useState(false);
  const { scale, needsRotate } = useScale();

  // Load on mount
  useEffect(() => {
    try {
      const storedName = localStorage.getItem('squirrel-ratio-name');
      if (storedName) setStudentName(storedName);
      else setShowNameModal(true);
    } catch (e) { setShowNameModal(true); }

    try {
      const raw = localStorage.getItem('squirrel-ratio-data');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.progress) setProgress(data.progress);
        if (data.rewards) setRewards(data.rewards);
      }
    } catch (e) {}
  }, []);

  // Save on changes
  useEffect(() => {
    try {
      localStorage.setItem('squirrel-ratio-data', JSON.stringify({ progress, rewards }));
    } catch (e) {}
  }, [progress, rewards]);

  // Post activity to teacher's sheet (uses GET to avoid CORS preflight)
  const postEvent = (name, event, extra) => {
    if (!SCRIPT_URL || !name) return;
    try {
      const params = new URLSearchParams(Object.assign({ action: 'log', name: name, event: event }, extra || {}));
      fetch(SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    } catch (e) {}
  };

  const handleNameSelect = (name) => {
    setStudentName(name);
    setShowNameModal(false);
    try { localStorage.setItem('squirrel-ratio-name', name); } catch (e) {}
    postEvent(name, 'login');
  };

  const changeName = () => {
    setStudentName(null);
    try { localStorage.removeItem('squirrel-ratio-name'); } catch (e) {}
    setShowNameModal(true);
  };

  const updateProgress = (key, stars) => {
    const wasZero = (progress[key] || 0) === 0;
    const newProgress = { ...progress, [key]: Math.max(progress[key] || 0, stars) };
    setProgress(newProgress);
    postEvent(studentName, 'stage_complete', { stage: key, stars: String(stars) });

    if (wasZero && stars > 0) {
      const stageBadge = STAGE_BADGES[key];
      const alreadyHas = rewards.badges.find(b => b.id === stageBadge.id);
      if (!alreadyHas) {
        const newBadges = [...rewards.badges, stageBadge];
        const queue = [stageBadge];
        postEvent(studentName, 'badge', { detail: stageBadge.name });
        const allDone = (newProgress.s1 || 0) > 0 && (newProgress.s2 || 0) > 0 && (newProgress.s3 || 0) > 0;
        if (allDone && !newBadges.find(b => b.id === STAGE_BADGES.all3.id)) {
          newBadges.push(STAGE_BADGES.all3);
          queue.push(STAGE_BADGES.all3);
          postEvent(studentName, 'badge', { detail: STAGE_BADGES.all3.name });
        }
        setRewards(r => ({ ...r, badges: newBadges }));
        setPendingRewards(prev => [...prev, ...queue]);
      }
    }
  };

  const handleCorrect = () => {
    postEvent(studentName, 'correct');
    setRewards(r => {
      const newTotal = (r.totalCorrect || 0) + 1;
      let newItems = r.items || [];
      const milestone = MILESTONES.find(m => m.count === newTotal && !newItems.find(it => it.id === m.id));
      if (milestone) {
        newItems = [...newItems, milestone];
        setPendingRewards(prev => [...prev, milestone]);
        postEvent(studentName, 'milestone', { detail: milestone.name });
      }
      return { ...r, totalCorrect: newTotal, items: newItems };
    });
  };

  const resetProgress = () => {
    setProgress({ s1: 0, s2: 0, s3: 0 });
    setRewards({ totalCorrect: 0, items: [], badges: [] });
    setPendingRewards([]);
    try { localStorage.removeItem('squirrel-ratio-data'); } catch (e) {}
  };

  const dismissReward = () => setPendingRewards(prev => prev.slice(1));

  const downloadNote = () => {
    if (!studentName) return;
    const dateStr = new Date().toLocaleDateString('ko-KR');
    const stars1 = progress.s1 || 0, stars2 = progress.s2 || 0, stars3 = progress.s3 || 0;
    const totalStars = stars1 + stars2 + stars3;
    const totalCorrect = (rewards && rewards.totalCorrect) || 0;
    const starHtml = (n) => '⭐'.repeat(n) + '☆'.repeat(3 - n);
    const itemsHtml = ((rewards && rewards.items) || []).map(it =>
      '<span class="reward-item">' + it.icon + ' ' + it.name + '</span>'
    ).join(' ');
    const badgesHtml = ((rewards && rewards.badges) || []).map(b =>
      '<span class="reward-badge">' + b.icon + ' ' + b.name + '</span>'
    ).join(' ');

    const html = '<!DOCTYPE html>\n<html lang="ko"><head><meta charset="UTF-8"><title>' + studentName + '의 비율 탐험 노트</title>\n<style>\n@import url(\'https://fonts.googleapis.com/css2?family=Jua&display=swap\');\n* { box-sizing: border-box; margin: 0; padding: 0; font-family: \'Jua\', sans-serif; }\nbody { background: #FFF6E5; color: #2D1810; padding: 40px 20px; line-height: 1.6; }\n.page { max-width: 760px; margin: 0 auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border: 4px solid #F4B942; }\nh1 { color: #92400E; font-size: 42px; text-align: center; margin-bottom: 8px; }\nh2 { color: #B45309; font-size: 28px; margin: 24px 0 12px; padding-bottom: 4px; border-bottom: 3px solid #FCD34D; }\nh3 { color: #C2410C; font-size: 22px; margin: 14px 0 6px; }\n.subtitle { text-align: center; color: #78716C; font-size: 18px; margin-bottom: 20px; }\n.banner { background: linear-gradient(135deg, #FED7AA, #FCD34D); padding: 16px 24px; border-radius: 16px; margin: 16px 0; text-align: center; font-size: 22px; }\n.stage-card { background: #FFF7ED; padding: 14px 20px; border-radius: 12px; margin: 10px 0; border: 2px solid #FED7AA; display: flex; justify-content: space-between; align-items: center; }\n.stage-name { font-size: 22px; color: #9A3412; }\n.stars { font-size: 24px; }\n.rewards { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }\n.reward-item, .reward-badge { background: #ECFDF5; padding: 8px 14px; border-radius: 999px; border: 2px solid #6EE7B7; font-size: 18px; }\n.reward-badge { background: #FEF2F2; border-color: #FCA5A5; }\n.concept { background: #FEF3C7; padding: 16px 20px; border-radius: 12px; margin: 12px 0; border-left: 6px solid #F59E0B; }\n.concept p { font-size: 18px; margin: 6px 0; }\n.example { color: #C2410C; font-weight: bold; }\n.print-btn { display: block; margin: 30px auto 0; padding: 14px 32px; background: #F59E0B; color: white; border: none; border-radius: 16px; font-size: 22px; cursor: pointer; font-family: inherit; }\n.print-btn:hover { background: #D97706; }\n@media print { body { background: white; padding: 0; } .page { box-shadow: none; border: none; } .print-btn { display: none; } }\n</style></head><body>\n<div class="page">\n  <h1>📜 비율 탐험 노트</h1>\n  <p class="subtitle">탐험가 <strong>' + studentName + '</strong> | 완료일 ' + dateStr + '</p>\n  <div class="banner">🎉 <strong>모든 단계 클리어!</strong> 🎉<br>모은 별 ' + totalStars + '개 / 정답 ' + totalCorrect + '개</div>\n  <h2>🏆 클리어 현황</h2>\n  <div class="stage-card"><span class="stage-name">🌰 비의 숲</span><span class="stars">' + starHtml(stars1) + '</span></div>\n  <div class="stage-card"><span class="stage-name">📊 비율의 언덕</span><span class="stars">' + starHtml(stars2) + '</span></div>\n  <div class="stage-card"><span class="stage-name">💯 백분율 마을</span><span class="stars">' + starHtml(stars3) + '</span></div>\n  ' + (badgesHtml || itemsHtml ? '<h2>🎁 모은 보물</h2><div class="rewards">' + badgesHtml + ' ' + itemsHtml + '</div>' : '') + '\n  <h2>📖 오늘 배운 것</h2>\n  <div class="concept"><h3>🌰 비 (比)</h3>\n    <p>두 양을 비교할 때 기호 ":" 를 써서 나타낸 것</p>\n    <p><span class="example">예) 3 : 5</span> — "삼 대 오" 또는 "3과 5의 비" 라고 읽어요</p>\n    <p>":" 앞이 비교하는 양, 뒤가 기준량</p></div>\n  <div class="concept"><h3>📊 비율</h3>\n    <p>기준량에 대한 비교하는 양의 크기</p>\n    <p><span class="example">비율 = 비교하는 양 ÷ 기준량</span></p>\n    <p>예) 3 : 5 의 비율 → 3 ÷ 5 = 0.6 (또는 분수 3/5)</p>\n    <p>분수와 소수로 모두 나타낼 수 있어요</p></div>\n  <div class="concept"><h3>💯 백분율 (%)</h3>\n    <p>기준량을 <span class="example">100</span>으로 했을 때의 비율</p>\n    <p><span class="example">소수 × 100 = 백분율</span> &nbsp;예) 0.6 → 60%</p>\n    <p>같은 비율을 비, 분수, 소수, 백분율로 모두 표현할 수 있어요</p></div>\n  <button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button>\n</div></body></html>';

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = studentName + '_비율탐험노트_' + new Date().toISOString().slice(0, 10) + '.html';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    postEvent(studentName, 'download_note');
  };

  return (
    <>
      <style>{themeStyles}</style>
      {needsRotate ? <RotateHint /> : (
        <div className="fixed inset-0 outer-bg overflow-hidden">
          <div
            style={{
              width: CANVAS_W,
              height: CANVAS_H,
              position: 'absolute',
              top: '50%',
              left: '50%',
              transform: `translate(-50%, -50%) scale(${scale})`,
              transformOrigin: 'center center',
              borderRadius: scale < 0.98 ? 24 : 0,
              overflow: 'hidden',
              boxShadow: scale < 0.98 ? '0 20px 60px rgba(74, 44, 31, 0.25)' : 'none',
            }}
          >
            {screen === 'home' && (
              <HomeScreen progress={progress} rewards={rewards} studentName={studentName}
                onNavigate={setScreen} onReset={resetProgress}
                onDownloadNote={downloadNote} onChangeName={changeName} />
            )}
            {screen === 's1' && (
              <Stage1 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s1', stars)}
                onCorrect={handleCorrect} />
            )}
            {screen === 's2' && (
              <Stage2 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s2', stars)}
                onCorrect={handleCorrect} />
            )}
            {screen === 's3' && (
              <Stage3 onHome={() => setScreen('home')}
                onComplete={(stars) => updateProgress('s3', stars)}
                onCorrect={handleCorrect}
                rewards={rewards} progress={progress} onDownloadNote={downloadNote} />
            )}
            {pendingRewards.length > 0 && (
              <RewardModal reward={pendingRewards[0]} onClose={dismissReward} queueRemaining={pendingRewards.length} />
            )}
            {showNameModal && <NameSelectModal onSelect={handleNameSelect} />}
          </div>
        </div>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
