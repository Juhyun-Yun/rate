// ============ SCALE HOOK ============
function useScale() {
  const [state, setState] = useState({ scale: 1, needsRotate: false });
  useEffect(() => {
    const update = () => {
      const W = window.innerWidth;
      const H = window.innerHeight;
      // Phone-sized device in portrait → ask to rotate
      const needsRotate = W < H && W < 640;
      const sw = (W - 48) / CANVAS_W;
      const sh = (H - 48) / CANVAS_H;
      setState({ scale: Math.min(sw, sh), needsRotate });
    };
    update();
    window.addEventListener('resize', update);
    const orientationHandler = () => setTimeout(update, 120);
    window.addEventListener('orientationchange', orientationHandler);
    return () => {
      window.removeEventListener('resize', update);
      window.removeEventListener('orientationchange', orientationHandler);
    };
  }, []);
  return state;
}

// ============ SCRATCH PAD (계산용 손글씨 보드) ============
const ScratchPad = ({ width = 720, height = 150 }) => {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef({ x: 0, y: 0 });
  const [open, setOpen] = useState(true);
  const [color, setColor] = useState('#1f2937');

  useEffect(() => {
    if (!open) return;
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FFFCF5';
    ctx.fillRect(0, 0, c.width, c.height);
    // 가벼운 라인 (글씨 가이드)
    ctx.strokeStyle = '#FDE8B5';
    ctx.lineWidth = 1;
    for (let y = 30; y < c.height; y += 30) {
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(c.width, y);
      ctx.stroke();
    }
  }, [open]);

  const getPos = (e) => {
    const c = canvasRef.current; if (!c) return { x: 0, y: 0 };
    const rect = c.getBoundingClientRect();
    const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
    return { x: (cx - rect.left) * (c.width / rect.width), y: (cy - rect.top) * (c.height / rect.height) };
  };
  const down = (e) => { drawing.current = true; last.current = getPos(e); };
  const move = (e) => {
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const p = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = color === '#FFFCF5' ? 18 : 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const up = () => { drawing.current = false; };
  const clear = () => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FFFCF5';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.strokeStyle = '#FDE8B5';
    ctx.lineWidth = 1;
    for (let y = 30; y < c.height; y += 30) {
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(c.width, y);
      ctx.stroke();
    }
  };

  if (!open) {
    return (
      <div className="flex justify-end mb-2">
        <button onClick={() => setOpen(true)}
          className="font-display bg-amber-100 hover:bg-amber-200 text-amber-900 border-2 border-b-4 border-amber-300 rounded-xl px-4 py-2 transition-all"
          style={{ fontSize: '1.1rem' }}>
          ✏️ 계산 보드 열기
        </button>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-2xl border-2 border-amber-300 p-3 mb-3 card-shadow">
      <div className="flex items-center justify-between mb-2">
        <span className="font-display text-amber-900" style={{ fontSize: '1.1rem' }}>✏️ 계산 보드 — 여기에 풀이를 적어 보세요</span>
        <div className="flex items-center gap-2">
          <button onClick={() => setColor('#1f2937')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#1f2937' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#1f2937' }} title="검정 펜" />
          <button onClick={() => setColor('#ea580c')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#ea580c' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#ea580c' }} title="주황 펜" />
          <button onClick={() => setColor('#FFFCF5')}
            className={`w-7 h-7 rounded-full border-2 ${color === '#FFFCF5' ? 'border-amber-600 ring-2 ring-amber-300' : 'border-stone-300'}`}
            style={{ background: '#FFFCF5' }} title="지우개" />
          <button onClick={clear}
            className="font-body text-stone-500 hover:text-stone-700 underline ml-1" style={{ fontSize: '0.9rem' }}>전체 지우기</button>
          <button onClick={() => setOpen(false)}
            className="font-body text-stone-500 hover:text-stone-700 underline" style={{ fontSize: '0.9rem' }}>닫기</button>
        </div>
      </div>
      <canvas ref={canvasRef} width={width} height={height}
        className="rounded-lg border-2 border-amber-200 w-full bg-amber-50"
        style={{ touchAction: 'none', cursor: 'crosshair', height: height }}
        onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
        onTouchStart={(e) => { e.preventDefault(); down(e); }}
        onTouchMove={(e) => { e.preventDefault(); move(e); }}
        onTouchEnd={up} />
    </div>
  );
};

const NameSelectModal = ({ onSelect }) => {
  const [names, setNames] = useState([]);
  const [selected, setSelected] = useState('');
  const [manualName, setManualName] = useState('');
  const [mode, setMode] = useState('loading');

  useEffect(() => {
    if (!SCRIPT_URL) {
      setMode('manual');
      return;
    }
    let cancelled = false;
    fetch(SCRIPT_URL + '?action=list')
      .then((r) => r.json())
      .then((data) => {
        if (cancelled) return;
        if (data && data.names && data.names.length > 0) {
          setNames(data.names);
          setMode('dropdown');
        } else {
          setMode('manual');
        }
      })
      .catch(() => { if (!cancelled) setMode('manual'); });
    return () => { cancelled = true; };
  }, []);

  const handleStart = () => {
    const name = mode === 'dropdown' ? selected : manualName.trim();
    if (name) onSelect(name);
  };

  const ready = mode === 'dropdown' ? !!selected : !!manualName.trim();

  return (
    <div className="absolute inset-0 z-[100] flex items-center justify-center p-6 animate-fade-up" style={{ background: 'rgba(0,0,0,0.7)' }}>
      <div className="bg-white rounded-3xl p-10 max-w-2xl w-full card-shadow border-4 border-amber-400 text-center animate-pop-in">

        <p className="font-body text-stone-700 text-2xl mb-5">이름을 골라주면 모험을 시작할게!</p>

        {mode === 'loading' && (
          <p className="font-body text-stone-500 text-2xl py-4">학생 명단 불러오는 중...</p>
        )}

        {mode === 'dropdown' && (
          <select value={selected} onChange={(e) => setSelected(e.target.value)}
            className="w-full p-4 text-3xl font-display border-4 rounded-2xl mb-5 border-amber-300 bg-amber-50 text-amber-900">
            <option value="">— 이름 선택 —</option>
            {names.map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
        )}

        {mode === 'manual' && (
          <>
            <p className="font-body text-amber-700 text-base mb-2">
              📋 선생님이 학생 명단 시트를 아직 연결하지 않았어요. 임시로 이름을 입력해 주세요.

      </div>

  );
};

// 점이 다각형 안에 있는지 판정 (lasso 묶기용)
function isPointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if (((yi > point.y) !== (yj > point.y)) &&
        (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {

            filt.frequency.exponentialRampToValueAtTime(200, now + 0.5);

                    onChange={(e) => { setPI('halfNum', e.target.value); setPeanutChecked(p => ({ ...p, half: false })); }}
                    className={`text-center font-display border-2 rounded-md outline-none ${peanutCls('half', okPHalf)}`}
                    style={{ width: '2.5rem', height: '1.6rem', fontSize: '1.15rem' }} placeholder="?" />
                  <span style={{ width: '2.7rem', height: '2.5px', background: '#4A2C1F', margin: '2px 0', borderRadius: '2px' }}></span>
                  <input type="text" inputMode="numeric" value={peanutInputs.halfDen}
                    onChange={(e) => { setPI('halfDen', e.target.value); setPeanutChecked(p => ({ ...p, half: false })); }}
                    className={`text-center font-display border-2 rounded-md outline-none ${peanutCls('half', okPHalf)}`}
                    style={{ width: '2.5rem', height: '1.6rem', fontSize: '1.15rem' }} placeholder="?" />
                </span>
                <b>배</b>
              </p>
            </div>
          </div>
        </Card>

        <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
          <Button onClick={() => setStep(1)} variant="secondary" disabled={!allOkP}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
        </div>
      </div>
    );
  };

  const renderLesson = () => {
    // ============ LESSON 0: 원래의 ①②③ + 비의 뜻 / 6:3 팝업 ============
    if (lessonStep === 0) {
      const setLI = (k, v) => setLessonInputs(p => ({ ...p, [k]: v }));
      const lesCls = (k, ok) => {
        if (k === 'half') {
          if (!lessonInputs.halfNum || !lessonInputs.halfDen) return 'border-amber-300 focus:border-amber-500';
          return ok ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50';
        }
        if (!lessonInputs[k]) return 'border-amber-300 focus:border-amber-500';
        return ok ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50';
      };
      const lTimes = parseInt(lessonInputs.times, 10);
      const lHalfN = parseInt(lessonInputs.halfNum, 10);
      const lHalfD = parseInt(lessonInputs.halfDen, 10);
      const lBiA = parseInt(lessonInputs.biA, 10);
      const lBiB = parseInt(lessonInputs.biB, 10);
      const okLTimes = lTimes === 2;
      const okLHalf = Number.isFinite(lHalfN) && Number.isFinite(lHalfD) && lHalfD > 0 && lHalfN * 2 === lHalfD;
      const okBi = lBiA === 6 && lBiB === 3;

      return (
        <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
          <div className="text-center">
            <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>'비'를 알아보자! 📖</h2>
            <p className="font-body text-stone-700" style={{ fontSize: '1.4rem' }}>두 양을 비교하는 간단한 방법</p>
          </div>

          <Card className="w-full max-w-6xl !p-3 flex-1 flex flex-col space-y-2 min-h-0">
            <div className="bg-amber-50 rounded-xl p-3 border-2 border-amber-200 space-y-3">
              <div className="flex items-center gap-4 justify-center">
                <span className="font-display text-orange-700 w-24 text-right" style={{ fontSize: '1.85rem' }}>도토리</span>
                <div className="flex gap-2.5">{[...Array(6)].map((_,i) => <Acorn key={i} size={80} />)}</div>
              </div>
              <div className="flex items-center gap-4 justify-center">
                <span className="font-display text-lime-700 w-24 text-right" style={{ fontSize: '1.85rem' }}>풋사과</span>
                <div className="flex gap-2.5">{[...Array(3)].map((_,i) => <Walnut key={i} size={80} />)}</div>
              </div>
            </div>

            <div className="flex flex-col gap-1.5">
              <div className="bg-orange-50 rounded-xl p-3 border-2 border-orange-200">
                <p className="font-body text-stone-800" style={{ fontSize: '1.55rem', lineHeight: '2.3rem' }}>
                  ① <b className="text-orange-700">도토리</b>는 <b className="text-lime-700">풋사과</b>의 몇 <b className="text-purple-700">배</b>인가요? &nbsp;
                  <input type="text" inputMode="numeric" value={lessonInputs.times}
                    onChange={(e) => setLI('times', e.target.value)}
                    className={`text-center font-display border-2 border-b-4 rounded-lg outline-none mx-1 ${lesCls('times', okLTimes)}`}
                    style={{ width: '3.8rem', fontSize: '1.65rem' }} placeholder="?" />
                  <b>배</b>
                </p>
              </div>

              <div className="bg-emerald-50 rounded-xl p-3 border-2 border-emerald-200">
                <p className="font-body text-stone-800" style={{ fontSize: '1.55rem', lineHeight: '3rem' }}>
                  ② <b className="text-lime-700">풋사과</b>는 <b className="text-orange-700">도토리</b>의 몇 <b className="text-purple-700">배</b>인가요? &nbsp;
                  <span className="inline-flex flex-col items-center mx-1" style={{ verticalAlign: 'middle' }}>
                    <input type="text" inputMode="numeric" value={lessonInputs.halfNum}
                      onChange={(e) => setLI('halfNum', e.target.value)}
                      className={`text-center font-display border-2 rounded-md outline-none ${lesCls('half', okLHalf)}`}
                      style={{ width: '3rem', height: '2rem', fontSize: '1.45rem' }} placeholder="?" />
                    <span style={{ width: '3.2rem', height: '2.5px', background: '#4A2C1F', margin: '2px 0', borderRadius: '2px' }}></span>
                    <input type="text" inputMode="numeric" value={lessonInputs.halfDen}
                      onChange={(e) => setLI('halfDen', e.target.value)}
                      className={`text-center font-display border-2 rounded-md outline-none ${lesCls('half', okLHalf)}`}
                      style={{ width: '3rem', height: '2rem', fontSize: '1.45rem' }} placeholder="?" />
                  </span>
                  <b>배</b>
                </p>
              </div>

              <div className="bg-rose-50 rounded-xl p-3 border-2 border-rose-200">
                <p className="font-body text-stone-800 flex items-center flex-wrap gap-2" style={{ fontSize: '1.55rem', lineHeight: '2.3rem' }}>
                  ③ 이 방법은 어떤 방법으로 표현한 것인가요?
                  {!showQ3Answer && (
                    <button onClick={() => setShowQ3Answer(true)} className="bg-rose-500 hover:bg-rose-600 text-white px-3 py-1 rounded-lg border-b-2 border-rose-700 font-body" style={{ fontSize: '1.2rem' }}>👀 정답 보기</button>
                  )}
                </p>
                {showQ3Answer && (
                  <div className="bg-white rounded-lg p-2 border-2 border-rose-200 mt-1 animate-pop-in flex items-center flex-wrap gap-2">
                    <p className="font-body text-stone-700 flex-1" style={{ fontSize: '1.4rem', lineHeight: '2.1rem', minWidth: '20rem' }}>
                      👉 <b className="text-rose-700">곱셈(나눗셈)</b>을 사용하여 한 양이 다른 양의 <b className="text-rose-700">몇 배</b>인지 구했습니다.
                    </p>
                    <button onClick={() => setShowBiDefPopup(true)} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg border-b-2 border-amber-700 font-body whitespace-nowrap" style={{ fontSize: '1.3rem' }}>📖 비의 뜻 보기</button>
                  </div>
                )}
              </div>
            </div>
          </Card>

          <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
            <Button onClick={() => setLessonStep(1)} variant="secondary" disabled={!(okLTimes && okLHalf && lessonChecked.popupDone)}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
          </div>

          {(showBiDefPopup || showBiInputPopup) && (
            <>
              <div className="absolute inset-0 z-40" style={{ background: 'rgba(0,0,0,0.45)' }} onClick={() => { setShowBiDefPopup(false); setShowBiInputPopup(false); }} />
              <div className="absolute z-50 flex items-stretch justify-center gap-3 px-4 animate-fade-up" style={{ top: '46%', bottom: '4%', left: 0, right: 0 }}>
                {showBiDefPopup && (
                  <div className="bg-amber-50 rounded-3xl p-4 card-shadow border-4 border-amber-400 text-center animate-pop-in flex flex-col relative" style={{ width: '48%', maxWidth: '34rem' }}>
                    <button onClick={() => setShowBiDefPopup(false)} className="absolute top-2 right-3 text-stone-500 hover:text-stone-800 font-bold z-10" style={{ fontSize: '1.5rem' }} aria-label="닫기">✕</button>
                    <p className="font-display text-amber-900 mb-1" style={{ fontSize: '1.9rem' }}>📖 비의 뜻</p>
                    <p className="font-body text-stone-800 flex-1 flex items-center justify-center" style={{ fontSize: '1.5rem', lineHeight: '2.3rem' }}>
                      <span>
                        한 양을 <b className="text-emerald-700">기준</b>으로<br/>
                        다른 양이 <b className="text-orange-700">몇 배</b>가 되는지<br/>
                        비교하기 위해<br/>
                        기호 <span className="font-display text-orange-700 mx-1" style={{ fontSize: '2.1rem' }}>:</span>를 사용하여<br/>
                        나타낸 것
                      </span>
                    </p>
                    {!showBiInputPopup && (
                      <div className="mt-2 flex items-center justify-center">
                        <Button onClick={() => setShowBiInputPopup(true)}>그림을 비로 나타내기 <ArrowRight size={22} className="inline ml-1" /></Button>
                      </div>
                    )}
                  </div>
                )}

                {showBiInputPopup && (
                  <div className="bg-purple-50 rounded-3xl p-4 card-shadow border-4 border-purple-400 text-center animate-pop-in flex flex-col relative" style={{ width: '48%', maxWidth: '34rem' }}>
                    <button onClick={() => setShowBiInputPopup(false)} className="absolute top-2 right-3 text-stone-500 hover:text-stone-800 font-bold z-10" style={{ fontSize: '1.5rem' }} aria-label="닫기">✕</button>
                    <p className="font-display text-purple-900 mb-2" style={{ fontSize: '1.9rem' }}>✨ 그림을 비로 나타내기</p>
                    <p className="font-body text-stone-800 mb-2 whitespace-nowrap" style={{ fontSize: '1.4rem', lineHeight: '2rem' }}>
                      "<b className="text-orange-700">도토리</b>와 <b className="text-lime-700">풋사과</b>의 비"를 <b className="text-purple-700">기호</b>로 직접 써 봐요!
                    </p>
                    <div className="flex-1 flex flex-col items-center justify-center gap-2">
                      <div className="flex items-center justify-center gap-3">
                        <input type="text" inputMode="numeric" value={lessonInputs.biA}
                          onChange={(e) => setLI('biA', e.target.value)}
                          className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${!lessonInputs.biA ? 'border-orange-500 bg-white focus:border-orange-700' : (lBiA === 6 ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50')}`}
                          style={{ width: '6.5rem', height: '6.5rem', fontSize: '4.2rem' }} placeholder="?" />
                        <span className="font-display text-stone-800" style={{ fontSize: '4.4rem' }}>:</span>
                        <input type="text" inputMode="numeric" value={lessonInputs.biB}
                          onChange={(e) => setLI('biB', e.target.value)}
                          className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${!lessonInputs.biB ? 'border-lime-500 bg-white focus:border-lime-700' : (lBiB === 3 ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50')}`}
                          style={{ width: '6.5rem', height: '6.5rem', fontSize: '4.2rem' }} placeholder="?" />
                      </div>
                      {lessonInputs.biA && lessonInputs.biB && (
                        <div className="flex items-center justify-center gap-3 animate-fade-up">
                          <span className="font-display text-center text-orange-900" style={{ width: '6.5rem', fontSize: '1.35rem', backgroundImage: 'linear-gradient(transparent 55%, rgba(253,186,116,0.75) 55%)', padding: '0 0.2rem' }}>비교하는 양</span>
                          <span style={{ width: '1.6rem' }}></span>
                          <span className="font-display text-center text-lime-900" style={{ width: '6.5rem', fontSize: '1.35rem', backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.2rem' }}>기준량</span>
                        </div>
                      )}
                    </div>
                    {okBi && (
                      <div className="mt-2 flex items-center justify-end animate-fade-up">
                        <button onClick={() => { setShowBiDefPopup(false); setShowBiInputPopup(false); setLessonStep(1); }} className="bg-emerald-500 hover:bg-emerald-600 text-white font-display rounded-xl px-4 py-2 border-b-4 border-emerald-700 btn-shadow" style={{ fontSize: '1.2rem' }}>다음 <ArrowRight size={20} className="inline ml-1" /></button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    }

    // ============ LESSON 1: 비를 읽는 방법은 여러 가지 — 다람쥐와 밤(1:4) ============
    if (lessonStep === 1) {
      const setLI1 = (k, v) => setLessonInputs(p => ({ ...p, [k]: v }));
      const l1A = parseInt(lessonInputs.l1A, 10);
      const l1B = parseInt(lessonInputs.l1B, 10);
      const ratioDone = l1A === 1 && l1B === 4;
      const baseClicked = !!lessonChecked.baseClicked;       // 4 클릭
      const compareClicked = !!lessonChecked.compareClicked; // 1 클릭
      const leftDone = ratioDone && baseClicked && compareClicked;
      const l1Readings = lessonChecked.l1Readings || {};
      const readingsDone = [0, 1, 2, 3].every(i => l1Readings[i] === 'correct');
      const allDone = leftDone && readingsDone;

      const readings14 = [
        { idx: '①', parts: ['1', '대', '4'], baseIdx: 2 },
        { idx: '②', parts: ['1', '과', '4', '의 비'], baseIdx: 2 },
        { idx: '③', parts: ['1', '의', '4', '에 대한 비'], baseIdx: 2 },
        { idx: '④', parts: ['4', '에 대한', '1', '의 비'], baseIdx: 0 },
      ];

      const handleNumberClick = (val) => {
        if (!ratioDone) return;
        if (!baseClicked) {
          // 첫 단계: 기준량(4) 찾기
          if (val === '4') setLessonChecked(p => ({ ...p, baseClicked: true }));
          // 1을 누르면 무시 (틀림 피드백 없이 무반응)
          return;
        }
        if (baseClicked && !compareClicked) {
          // 두 번째 단계: 비교하는 양(1) 찾기
          if (val === '1') setLessonChecked(p => ({ ...p, compareClicked: true }));
        }
      };

      const handleL1ReadingClick = (rIdx, pIdx, val) => {
        if (l1Readings[rIdx] === 'correct') return;
        const r = readings14[rIdx];
        if (val === '4' && pIdx === r.baseIdx) {
          setLessonChecked(p => ({ ...p, l1Readings: { ...(p.l1Readings || {}), [rIdx]: 'correct' } }));
        } else {
          setLessonChecked(p => ({ ...p, l1Readings: { ...(p.l1Readings || {}), [rIdx]: 'wrong' } }));
          setTimeout(() => setLessonChecked(p => {
            const cur = { ...(p.l1Readings || {}) };
            if (cur[rIdx] === 'wrong') delete cur[rIdx];
            return { ...p, l1Readings: cur };
          }), 800);
        }
      };

      // 입력칸 색깔 헬퍼
      const ratioInputCls = (v, ok) => {
        if (!v) return 'border-amber-300 focus:border-amber-500';
        return ok ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50';
      };

      // 숫자 표시 컴포넌트 — 처음에는 plain 텍스트, 정답 클릭 시 버튼처럼
      const numDisplay = (val, role) => {
        // role: 'compare' (1) or 'base' (4)
        const isClicked = role === 'base' ? baseClicked : compareClicked;
        const color = role === 'compare'
          ? (isClicked ? 'bg-orange-500 text-white border-orange-700 shadow-lg' : 'text-stone-800')
          : (isClicked ? 'bg-lime-500 text-white border-lime-700 shadow-lg' : 'text-stone-800');
        const border = isClicked ? 'rounded-2xl border-b-8' : '';
        return (
          <button onClick={() => handleNumberClick(val)} disabled={!ratioDone || (role === 'base' && baseClicked) || (role === 'compare' && compareClicked)}
            className={`font-display ${color} ${border} transition-transform ${!isClicked && ratioDone ? 'hover:scale-110 cursor-pointer' : ''}`}
            style={{ width: '6.5rem', height: '6.5rem', fontSize: '5rem', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            {val}
          </button>
        );
      };

      return (
        <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
          <div className="text-center">
            <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>비를 읽는 방법은 여러 가지가 있어요</h2>
            <p className="font-display text-amber-700" style={{ fontSize: '1.5rem' }}>🐿️ 다람쥐와 🌰 밤의 비</p>
          </div>

          <Card className="w-full max-w-6xl !p-3 flex-1 flex flex-row gap-3 min-h-0">
            {/* LEFT — 스토리 + 비 입력 → 클릭하여 기준량/비교하는 양 찾기 */}
            <div className="bg-purple-50 rounded-xl p-4 border-2 border-purple-200 w-1/2 flex flex-col items-center justify-around">
              <p className="font-body text-stone-800 text-center" style={{ fontSize: '1.7rem', lineHeight: '2.6rem' }}>
                🐿️ <b>다람쥐 한 마리</b>가 🌰 <b>밤 네 개</b>를 주웠어요.<br/>
                이것을 <b className="text-purple-700">비</b>로 나타내어 보아요.
              </p>

              {/* 비 입력 or 클릭 display */}
              {!ratioDone ? (
                <div className="flex items-center justify-center gap-4">
                  <input type="text" inputMode="numeric" value={lessonInputs.l1A}
                    onChange={(e) => setLI1('l1A', e.target.value)}
                    className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${ratioInputCls(lessonInputs.l1A, l1A === 1)}`}
                    style={{ width: '6.5rem', height: '6.5rem', fontSize: '4.6rem' }} placeholder="?" />
                  <span className="font-display text-stone-800" style={{ fontSize: '4.6rem' }}>:</span>
                  <input type="text" inputMode="numeric" value={lessonInputs.l1B}
                    onChange={(e) => setLI1('l1B', e.target.value)}
                    className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${ratioInputCls(lessonInputs.l1B, l1B === 4)}`}
                    style={{ width: '6.5rem', height: '6.5rem', fontSize: '4.6rem' }} placeholder="?" />
                </div>
              ) : (
                <div className="flex items-center justify-center gap-4">
                  <div className="flex flex-col items-center gap-2" style={{ minHeight: '10rem' }}>
                    {numDisplay('1', 'compare')}
                    <span className="font-display text-orange-900" style={{ fontSize: '1.4rem', backgroundImage: compareClicked ? 'linear-gradient(transparent 55%, rgba(253,186,116,0.75) 55%)' : 'none', padding: '0 0.4rem', visibility: compareClicked ? 'visible' : 'hidden' }}>비교하는 양</span>
                  </div>
                  <span className="font-display text-stone-800" style={{ fontSize: '4.6rem' }}>:</span>
                  <div className="flex flex-col items-center gap-2" style={{ minHeight: '10rem' }}>
                    {numDisplay('4', 'base')}
                    <span className="font-display text-lime-900" style={{ fontSize: '1.4rem', backgroundImage: baseClicked ? 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)' : 'none', padding: '0 0.4rem', visibility: baseClicked ? 'visible' : 'hidden' }}>기준량</span>
                  </div>
                </div>
              )}

              {/* 순차적 안내 */}
              <div className="bg-white rounded-xl p-3 border-2 border-purple-200 flex items-center justify-center w-full" style={{ minHeight: '4rem' }}>
                {!ratioDone && (
                  <p className="font-body text-stone-700 text-center animate-fade-up" style={{ fontSize: '1.35rem' }}>✏️ 다람쥐 수와 밤 수의 <b className="text-purple-700">비</b>를 써 봐요</p>
                )}
                {ratioDone && !baseClicked && (
                  <p className="font-body text-stone-700 text-center animate-fade-up" style={{ fontSize: '1.35rem' }}>👆 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.2rem' }}><b className="text-lime-800">기준량</b></span>의 숫자를 눌러보세요</p>
                )}
                {ratioDone && baseClicked && !compareClicked && (
                  <p className="font-body text-stone-700 text-center animate-fade-up" style={{ fontSize: '1.35rem' }}>👆 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(253,186,116,0.75) 55%)', padding: '0 0.2rem' }}><b className="text-orange-900">비교하는 양</b></span>의 숫자를 눌러 보세요</p>
                )}
                {leftDone && (
                  <p className="font-body text-emerald-700 text-center animate-fade-up" style={{ fontSize: '1.35rem' }}>🎉 잘했어요! 오른쪽도 살펴봐요 →</p>
                )}
              </div>
            </div>

            {/* RIGHT — 4가지 읽는 방법 (왼쪽 완료 후 표시) */}
            <div className={`rounded-xl p-4 border-2 w-1/2 flex flex-col ${leftDone ? 'bg-emerald-50 border-emerald-300' : 'bg-stone-100 border-stone-200 opacity-50'}`}>
              {!leftDone ? (
                <div className="flex-1 flex items-center justify-center">
                  <p className="font-body text-stone-500 text-center" style={{ fontSize: '1.4rem' }}>👈 먼저 왼쪽 활동을 해보세요</p>
                </div>
              ) : (
                <>
                  <p className="font-display text-emerald-800 text-center" style={{ fontSize: '2.1rem' }}>비는 이렇게 읽을 수 있어요</p>
                  <p className="font-body text-stone-700 text-center mb-1" style={{ fontSize: '1.55rem' }}>각 표현에서 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.15rem' }}><b className="text-lime-800">기준량(4)</b></span>을 클릭해서 확인해요!</p>
                  <div className="flex-1 flex flex-col justify-around gap-2">
                    {readings14.map((r, rIdx) => {
                      const status = l1Readings[rIdx];
                      const isDone = status === 'correct';
                      const isWrong = status === 'wrong';
                      return (
                        <div key={rIdx} className={`rounded-xl px-3 py-2.5 border-2 transition-colors ${isDone ? 'bg-emerald-100 border-emerald-400' : isWrong ? 'bg-rose-50 border-rose-400' : 'bg-white border-emerald-200'}`}>
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-display text-emerald-700" style={{ fontSize: '1.7rem' }}>{r.idx}</span>
                            {r.parts.map((part, pIdx) => {
                              const isNumber = part === '1' || part === '4';
                              if (!isNumber) {
                                return <span key={pIdx} className="font-display text-stone-800" style={{ fontSize: '1.65rem' }}>{part}</span>;
                              }
                              const isBaseHere = pIdx === r.baseIdx && isDone;
                              if (isBaseHere) {
                                return (
                                  <span key={pIdx} className="inline-flex items-center justify-center text-white bg-lime-500 rounded-lg font-display border-b-2 border-lime-700 shadow-sm ring-4 ring-lime-300"
                                    style={{ width: '2.6rem', height: '2.6rem', fontSize: '1.7rem' }}>{part}</span>
                                );
                              }
                              return (
                                <button key={pIdx} onClick={() => handleL1ReadingClick(rIdx, pIdx, part)}
                                  className="font-display text-stone-800 hover:scale-110 transition-transform cursor-pointer"
                                  style={{ fontSize: '1.85rem', padding: '0 0.3rem' }}>{part}</button>
                              );
                            })}
                            {isDone && <span className="font-display text-lime-900 ml-auto" style={{ fontSize: '1.2rem', backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.3rem' }}>기준량 ✓</span>}
                            {isWrong && <span className="font-display text-rose-700 ml-auto" style={{ fontSize: '1.15rem' }}>다시!</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </div>
          </Card>

          <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
            <Button onClick={() => setLessonStep(2)} variant="secondary" disabled={!allDone}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
          </div>
        </div>
      );
    }

    // ============ LESSON 2: 빠른 기준량 찾기 게임 (60문제 풀, 3단계: 10/20/30점/문제) ============
    if (lessonStep === 2) {
      const roundConfig = [
        { time: 20, label: '1단계', desc: '20초 안에 10개', pts: 10, count: 10 },
        { time: 15, label: '2단계', desc: '15초 안에 10개', pts: 20, count: 10 },
        { time: 10, label: '3단계', desc: '10초 안에 10개', pts: 30, count: 10 },
      ];

      // 사운드 — Web Audio API로 즉석 생성
      const playTick = () => {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          window._bAudio = window._bAudio || new AC();
          const ctx = window._bAudio;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'square';
          osc.frequency.value = 1100;
          osc.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.18, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.start();
          osc.stop(ctx.currentTime + 0.09);
        } catch (e) {}
      };
      const playBoom = () => {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          window._bAudio = window._bAudio || new AC();
          const ctx = window._bAudio;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(35, ctx.currentTime + 0.55);
          osc.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.45, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
          osc.start();
          osc.stop(ctx.currentTime + 0.75);
        } catch (e) {}
      };

      const makeProblems = () => {
        // 10 문제 — 네 가지 reading type을 균등하게 배분 (각 2-3개씩)
        const readingsFor = (a, b) => [
          `${a} 대 ${b}`,
          `${a}과 ${b}의 비`,
          `${a}의 ${b}에 대한 비`,
          `${b}에 대한 ${a}의 비`,
        ];
        // 8자리: 각 타입 2개씩 보장 + 나머지 2자리: 랜덤
        const types = [0, 0, 1, 1, 2, 2, 3, 3, Math.floor(Math.random() * 4), Math.floor(Math.random() * 4)];
        // shuffle 순서
        for (let i = types.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [types[i], types[j]] = [types[j], types[i]];
        }
        // 60개 비 풀 (서로 다른 두 수 쌍)에서 매번 다른 쌍을 뽑아 reading type 적용
        const usedPairs = new Set();
        const out = [];
        for (const t of types) {
          let a, b, key;
          let guard = 0;
          do {
            a = Math.floor(Math.random() * 9) + 1;
            b = Math.floor(Math.random() * 9) + 1;
            while (b === a) b = Math.floor(Math.random() * 9) + 1;
            key = `${a}-${b}`;
            guard++;
          } while (usedPairs.has(key) && guard < 60);
          usedPairs.add(key);
          out.push({ a, b, reading: readingsFor(a, b)[t], base: b });
        }
        return out;
      };

      const startRound = (roundIdx) => {
        setGameRound(roundIdx);
        setGameIdx(0);
        setGameScore(0);
        setGameTime(roundConfig[roundIdx].time);
        setGameProblems(makeProblems());
        setGameBoom(false);
        setGameBoomFlash(false);
        setGameFeedback(null);
        setGameState('playing');
      };

      const handleAnswer = (clicked) => {
        if (gameState !== 'playing' || gameFeedback) return;
        const prob = gameProblems[gameIdx];
        if (!prob) return;
        const isCorrect = clicked === prob.base;
        setGameFeedback({ idx: gameIdx, type: isCorrect ? 'correct' : 'wrong', clicked });
        if (isCorrect) {
          setGameScore(s => s + 1);
          if (onCorrect) onCorrect();
        }
        setTimeout(() => {
          setGameFeedback(null);
          const nextIdx = gameIdx + 1;
          if (nextIdx >= gameProblems.length) {
            // 라운드 종료
            const cfg = roundConfig[gameRound];
            const usedTime = Math.max(0, cfg.time - gameTime);
            const correctCount = isCorrect ? gameScore + 1 : gameScore;
            const passed = correctCount === cfg.count && !gameBoom;
            const points = correctCount * cfg.pts;
            const newScores = [...gameRoundScores];
            const prev = newScores[gameRound];
            // best score 유지
            if (!prev || points > (prev.points || 0)) {
              newScores[gameRound] = { correct: correctCount, time: usedTime, passed, points };
              setGameRoundScores(newScores);
            }
            if (passed && (!prev || !prev.passed)) {
              setGameAcorns(a => {
                const next = a + 1;
                if (next >= 3) setGameBigReward(true);
                return next;
              });
            }
            setGameState('roundEnd');
          } else {
            setGameIdx(nextIdx);
          }
        }, 450);
      };

      // ====== INTRO ======
      if (gameState === 'intro') {
        const totalPoints = gameRoundScores.reduce((sum, s) => sum + (s?.points || 0), 0);
        return (
          <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
            <div className="text-center">
              <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>🎯 빠른 기준량 찾기 게임</h2>
            </div>
            <Card className="w-full max-w-6xl !p-4 flex-1 flex flex-col justify-around items-center">
              <p className="font-display text-amber-900 text-center" style={{ fontSize: '1.85rem' }}>💣 폭탄이 터지기 전에 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.3rem' }}><b className="text-lime-800">기준량</b></span>을 빠르게 클릭!</p>

              {/* 단계 선택 카드 — 클릭하면 바로 시작 */}
              <div className="grid grid-cols-3 gap-4 w-full max-w-5xl">
                {roundConfig.map((r, i) => {
                  const score = gameRoundScores[i];
                  return (
                    <button key={i} onClick={() => startRound(i)}
                      className={`rounded-2xl p-4 border-4 text-center transition-transform hover:scale-105 ${score?.passed ? 'bg-emerald-50 border-emerald-400' : 'bg-amber-50 border-amber-300 hover:bg-amber-100'}`}>
                      <p className="font-display text-amber-900" style={{ fontSize: '1.85rem' }}>{r.label}</p>
                      <p className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>{r.desc}</p>
                      <p className="font-display text-orange-700 mt-1" style={{ fontSize: '1.2rem' }}>문제당 <b>{r.pts}점</b></p>
                      {score ? (
                        <p className="font-body mt-2" style={{ fontSize: '1.2rem' }}>
                          {score.passed ? <span className="text-emerald-700 font-display">🏆 통과! · {score.points}점</span> : <span className="text-stone-500">{score.correct}/{r.count} · {score.points}점</span>}
                        </p>
                      ) : (
                        <p className="font-body text-stone-500 mt-2" style={{ fontSize: '1.1rem' }}>👆 클릭해서 시작</p>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* 보상 — 도토리 + 점수 */}
              <div className="flex items-center gap-6 bg-amber-50 rounded-2xl px-5 py-3 border-2 border-amber-300">
                <div className="flex items-center gap-3">
                  <span className="font-display text-amber-900" style={{ fontSize: '1.4rem' }}>모은 도토리:</span>
                  <div className="flex gap-2">
                    {[0,1,2].map(i => (
                      <div key={i} style={{ opacity: i < gameAcorns ? 1 : 0.2 }}>
                        <DotoriReward size={52} />
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="font-display text-stone-700" style={{ fontSize: '1.4rem' }}>총점:</span>
                  <span className="font-display text-orange-700" style={{ fontSize: '1.8rem' }}>{totalPoints}점</span>
                </div>
                {gameBigReward && <span className="font-display text-amber-700" style={{ fontSize: '1.5rem' }}>🏆 큰 보상!</span>}
              </div>
            </Card>
            <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
              <Button onClick={() => setLessonStep(3)} variant="secondary" disabled={gameAcorns === 0}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
            </div>
          </div>
        );
      }

      // ====== PLAYING ======
      if (gameState === 'playing') {
        const prob = gameProblems[gameIdx];
        if (!prob) {
          return <div></div>;
        }

        // 문장의 숫자를 inline 클릭 버튼으로 분리해서 렌더
        const renderInlineReading = () => {
          const parts = prob.reading.split(/(\d+)/);
          return parts.map((part, idx) => {
            if (/^\d+$/.test(part)) {
              const val = parseInt(part, 10);
              const isFeedback = gameFeedback && gameFeedback.clicked === val;
              const isCorrectAnswer = isFeedback && gameFeedback.type === 'correct';
              const isWrongAnswer = isFeedback && gameFeedback.type === 'wrong';
              return (
                <button key={idx} onClick={() => handleAnswer(val)} disabled={!!gameFeedback}
                  className={`relative inline-flex items-center justify-center font-display text-white rounded-2xl border-b-8 shadow-lg transition-transform mx-1 align-middle ${isCorrectAnswer ? 'bg-emerald-500 border-emerald-700 scale-110' : isWrongAnswer ? 'bg-rose-500 border-rose-700 scale-95' : 'bg-amber-500 border-amber-700 hover:scale-110 cursor-pointer'}`}
                  style={{ width: '5.5rem', height: '5.5rem', fontSize: '3.8rem', verticalAlign: 'middle' }}>
                  {part}
                  {isCorrectAnswer && <span className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ fontSize: '5.5rem', color: 'rgba(16,185,129,0.9)' }}>○</span>}
                  {isWrongAnswer && <span className="absolute inset-0 flex items-center justify-center pointer-events-none font-display" style={{ fontSize: '4rem', color: 'rgba(225,29,72,0.95)' }}>✕</span>}
                </button>
              );
            }
            return <span key={idx} className="font-display text-amber-900 align-middle" style={{ fontSize: '3.2rem' }}>{part}</span>;
          });
        };

        const cfg = roundConfig[gameRound];
        const pulseClass = gameTime > 0 && gameTime <= 5 ? 'animate-pulse-soft' : '';

        return (
          <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2 relative">
            {/* 상단: 단계 + 폭탄 타이머 + 점수 */}
            <div className="w-full max-w-6xl flex items-center justify-between gap-3">
              <div className="font-display text-amber-900" style={{ fontSize: '1.7rem' }}>
                {cfg.label} <span className="text-orange-700">({cfg.pts}점/문제)</span>
              </div>
              <div className={`flex items-center gap-2 ${pulseClass}`}>
                <span style={{ fontSize: '2.4rem' }}>{gameBoom ? '💥' : '💣'}</span>
                <span className={`font-display ${gameBoom ? 'text-rose-600' : gameTime <= 5 ? 'text-rose-600' : gameTime <= 10 ? 'text-orange-700' : 'text-amber-900'}`} style={{ fontSize: '2.4rem' }}>
                  {gameBoom ? '터짐!' : `${gameTime}초`}
                </span>
              </div>
              <div className="font-display text-emerald-700" style={{ fontSize: '1.7rem' }}>
                {gameScore}/{cfg.count} · <span className="text-orange-700">{gameScore * cfg.pts}점</span>
              </div>
            </div>

            <Card className="w-full max-w-6xl !p-4 flex-1 flex flex-col items-center justify-around">
              <p className="font-body text-stone-600 text-center" style={{ fontSize: '1.5rem' }}>👇 문장에서 <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.3rem' }}><b className="text-lime-800">기준량</b></span>의 숫자를 빠르게 클릭!</p>
              <div className="bg-amber-50 rounded-2xl px-8 py-6 border-4 border-amber-300 text-center" style={{ minWidth: '32rem' }}>
                <p className="leading-relaxed">{renderInlineReading()}</p>
              </div>
              <p className="font-body text-stone-500" style={{ fontSize: '1.3rem' }}>문제 {gameIdx + 1} / {cfg.count}</p>
            </Card>

            {/* 폭탄 터질 때 전체 화면 효과 — 1.5초 뒤 사라짐 */}
            {gameBoomFlash && (
              <div className="absolute inset-0 z-40 pointer-events-none flex items-center justify-center animate-fade-out-explosion" style={{ background: 'radial-gradient(circle, rgba(225,29,72,0.4), rgba(0,0,0,0.2))' }}>
                <span style={{ fontSize: '14rem', filter: 'drop-shadow(0 0 20px rgba(225,29,72,0.6))' }}>💥</span>
              </div>
            )}
          </div>
        );
      }

      // ====== ROUND END ======
      if (gameState === 'roundEnd') {
        const result = gameRoundScores[gameRound];
        const isPass = result && result.passed;
        const hasNextRound = gameRound < 2;
        const cfg = roundConfig[gameRound];
        const earnedPoints = result?.points ?? 0;
        return (
          <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
            <div className="text-center">
              <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>{cfg.label} 결과</h2>
            </div>
            <Card className="w-full max-w-6xl !p-4 flex-1 flex flex-col items-center justify-around">
              <div style={{ fontSize: '6.5rem' }}>{isPass ? '🎉' : gameBoom ? '💥' : '💪'}</div>
              <div className="text-center space-y-1">
                <p className="font-display text-stone-800" style={{ fontSize: '2.4rem' }}>
                  {result?.correct ?? 0} <span className="text-stone-500" style={{ fontSize: '1.6rem' }}>/ {cfg.count} 맞춤</span>
                </p>
                <p className="font-display text-orange-700" style={{ fontSize: '2rem' }}>+ {earnedPoints}점 <span className="text-stone-500" style={{ fontSize: '1.25rem' }}>(문제당 {cfg.pts}점)</span></p>
              </div>
              <p className="font-body text-stone-700 text-center" style={{ fontSize: '1.4rem' }}>{gameBoom ? '⏰ 시간 초과!' : `걸린 시간: ${result?.time ?? 0}초`}</p>
              {isPass ? (
                <div className="bg-emerald-50 rounded-2xl px-6 py-3 border-4 border-emerald-300 text-center flex items-center gap-3">
                  <DotoriReward size={60} />
                  <p className="font-display text-emerald-800" style={{ fontSize: '1.7rem' }}>도토리 1개 획득!</p>
                </div>
              ) : (
                <p className="font-body text-stone-600 text-center" style={{ fontSize: '1.3rem' }}>{gameBoom ? '⏰ 시간 초과! 다시 도전해 봐요' : '👍 다시 도전해서 통과해 봐요'}</p>
              )}
              <div className="flex gap-3 flex-wrap justify-center">
                <Button onClick={() => startRound(gameRound)} variant="soft">🔄 다시 도전</Button>
                {hasNextRound && isPass && (
                  <Button onClick={() => startRound(gameRound + 1)} variant="secondary">다음 단계 <ArrowRight size={22} className="inline ml-1" /></Button>
                )}
                <Button onClick={() => setGameState('intro')} variant="ghost">단계 선택으로</Button>
              </div>
            </Card>
            <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
              <Button onClick={() => setLessonStep(3)} variant="secondary" disabled={gameAcorns === 0}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
            </div>
          </div>
        );
      }

      return null;
    }

    // ============ LESSON 3: 교실 물건으로 비 만들기 ============
    const itemList = [
      { name: '연필', emoji: '✏️', unit: '자루' },
      { name: '지우개', emoji: '🧽', unit: '개' },
      { name: '책', emoji: '📕', unit: '권' },
      { name: '공책', emoji: '📓', unit: '권' },
      { name: '자', emoji: '📏', unit: '개' },
      { name: '가위', emoji: '✂️', unit: '개' },
      { name: '풀', emoji: '🩹', unit: '개' },
      { name: '의자', emoji: '🪑', unit: '개' },
    ];

    // ===== 학생 picker — classroomItem이 null이면 직접 정하는 화면 =====
    if (!classroomItem) {
      const { aIdx, aCount, bIdx, bCount } = classroomPicker;
      const aNum = parseInt(aCount, 10);
      const bNum = parseInt(bCount, 10);
      const validA = aIdx !== null && Number.isFinite(aNum) && aNum > 0;
      const validB = bIdx !== null && Number.isFinite(bNum) && bNum > 0 && bIdx !== aIdx;
      const canConfirm = validA && validB;

      const confirmPick = () => {
        const a = itemList[aIdx];
        const b = itemList[bIdx];
        setClassroomItem({ a: a.name, aUnit: a.unit, aEmoji: a.emoji, aCount: aNum, b: b.name, bUnit: b.unit, bEmoji: b.emoji, bCount: bNum });
      };

      return (
        <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
          <div className="text-center">
            <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>🎒 교실 물건으로 비 만들기</h2>
            <p className="font-body text-stone-700" style={{ fontSize: '1.35rem' }}>비교할 물건 두 가지를 골라 갯수도 직접 정해 봐요!</p>
          </div>

          <Card className="w-full max-w-6xl !p-4 flex-1 flex flex-col justify-around min-h-0">
            <div className="grid grid-cols-2 gap-4">
              {/* 첫째 물건 */}
              <div className="bg-orange-50 rounded-2xl p-4 border-4 border-orange-200">
                <p className="font-display text-orange-800 text-center mb-2" style={{ fontSize: '1.55rem' }}>첫째 물건</p>
                <div className="grid grid-cols-4 gap-2 mb-3">
                  {itemList.map((it, i) => (
                    <button key={i} onClick={() => setClassroomPicker(p => ({ ...p, aIdx: i }))}
                      className={`rounded-xl p-2 border-2 transition-transform hover:scale-105 ${aIdx === i ? 'bg-orange-200 border-orange-500 scale-105' : 'bg-white border-amber-300'}`}>
                      <div style={{ fontSize: '1.8rem' }}>{it.emoji}</div>
                      <div className="font-display text-stone-800" style={{ fontSize: '1.05rem' }}>{it.name}</div>
                    </button>
                  ))}
                </div>
                <div className="flex items-center justify-center gap-2">
                  <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>갯수:</span>
                  <input type="text" inputMode="numeric" value={aCount}
                    onChange={(e) => setClassroomPicker(p => ({ ...p, aCount: e.target.value }))}
                    className="text-center font-display border-2 border-b-4 rounded-lg outline-none border-orange-400 bg-white"
                    style={{ width: '4.5rem', height: '3rem', fontSize: '1.6rem' }} placeholder="?" />
                  <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>{aIdx !== null ? itemList[aIdx].unit : ''}</span>
                </div>
              </div>

              {/* 둘째 물건 */}
              <div className="bg-lime-50 rounded-2xl p-4 border-4 border-lime-200">
                <p className="font-display text-lime-800 text-center mb-2" style={{ fontSize: '1.55rem' }}>둘째 물건</p>
                <div className="grid grid-cols-4 gap-2 mb-3">
                  {itemList.map((it, i) => (
                    <button key={i} onClick={() => i !== aIdx && setClassroomPicker(p => ({ ...p, bIdx: i }))}
                      disabled={i === aIdx}
                      className={`rounded-xl p-2 border-2 transition-transform ${i === aIdx ? 'opacity-30 cursor-not-allowed' : 'hover:scale-105'} ${bIdx === i ? 'bg-lime-200 border-lime-500 scale-105' : 'bg-white border-amber-300'}`}>
                      <div style={{ fontSize: '1.8rem' }}>{it.emoji}</div>
                      <div className="font-display text-stone-800" style={{ fontSize: '1.05rem' }}>{it.name}</div>
                    </button>
                  ))}
                </div>
                <div className="flex items-center justify-center gap-2">
                  <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>갯수:</span>
                  <input type="text" inputMode="numeric" value={bCount}
                    onChange={(e) => setClassroomPicker(p => ({ ...p, bCount: e.target.value }))}
                    className="text-center font-display border-2 border-b-4 rounded-lg outline-none border-lime-400 bg-white"
                    style={{ width: '4.5rem', height: '3rem', fontSize: '1.6rem' }} placeholder="?" />
                  <span className="font-body text-stone-700" style={{ fontSize: '1.3rem' }}>{bIdx !== null ? itemList[bIdx].unit : ''}</span>
                </div>
              </div>
            </div>

            {canConfirm && (
              <div className="bg-amber-50 rounded-2xl p-3 border-2 border-amber-300 text-center animate-fade-up">
                <p className="font-body text-stone-800" style={{ fontSize: '1.4rem' }}>
                  📚 교실에는 <b className="text-orange-700">{itemList[aIdx].name}</b> <b>{aNum}{itemList[aIdx].unit}</b>와 <b className="text-lime-700">{itemList[bIdx].name}</b> <b>{bNum}{itemList[bIdx].unit}</b>가 있어요.
                </p>
              </div>
            )}
          </Card>

          <div className="w-full max-w-6xl flex items-center justify-end gap-3 flex-wrap pr-2">
            <Button onClick={confirmPick} variant="secondary" disabled={!canConfirm}>시작! <ArrowRight size={22} className="inline ml-1" /></Button>
          </div>
        </div>
      );
    }

    // ===== 본 활동 — classroomItem이 정해진 후 =====
    const item = classroomItem;
    const itemBaseDone = classroomBaseChoice === 'b';

    const setRD = (k, v) => setClassroomReadings(p => ({ ...p, [k]: v }));

    // 읽기 패턴 매칭 — 공백 제거 후 비교, 와/과 둘 다 허용
    const matchReading = (input) => {
      if (!input) return -1;
      const s = input.replace(/\s+/g, '');
      const a = item.aCount, b = item.bCount;
      if (s === `${a}대${b}`) return 0;
      if (s === `${a}과${b}의비` || s === `${a}와${b}의비`) return 1;
      if (s === `${a}의${b}에대한비`) return 2;
      if (s === `${b}에대한${a}의비`) return 3;
      return -1;
    };
    const matches = ['r1', 'r2', 'r3', 'r4'].map(k => matchReading(classroomReadings[k]));
    const distinctValid = new Set(matches.filter(m => m !== -1));
    const allReadingsOk = distinctValid.size === 4;
    const allClassDone = allReadingsOk && itemBaseDone;
    const readCls = (val, m) => {
      if (!val) return 'border-amber-300';
      if (m === -1) return 'border-rose-500 bg-rose-50';
      return 'border-emerald-500 bg-emerald-50';
    };

    return (
      <div className="animate-fade-up h-full flex flex-col items-center px-6 pt-2 pb-3 gap-2">
        <div className="text-center">
          <h2 className="font-display text-amber-900" style={{ fontSize: '2.1rem' }}>🎒 교실 물건으로 비 만들기</h2>
        </div>

        <Card className="w-full max-w-6xl !p-3 flex-1 flex flex-row gap-3 min-h-0">
          {/* LEFT: 비의 뜻 + 4가지 읽기 방법 (학생이 보고 따라 쓰는 참고용) */}
          <div className="bg-amber-50 rounded-xl p-4 border-2 border-amber-300 w-2/5 flex flex-col gap-3">
            <p className="font-display text-amber-900 text-center" style={{ fontSize: '2rem' }}>📖 비의 뜻</p>
            <div className="bg-white rounded-xl p-4 border-2 border-amber-200">
              <p className="font-body text-stone-800" style={{ fontSize: '2rem', lineHeight: '2.9rem' }}>
                한 양을 <b className="text-emerald-700">기준</b>으로 다른 양이 <b className="text-orange-700">몇 배</b>가 되는지 비교하기 위해 기호 <b className="text-orange-700">:</b> 을 사용하여 나타낸 것을 <b className="text-purple-700">비</b>라고 합니다.
              </p>
            </div>
            <div className="bg-white rounded-xl p-4 border-2 border-amber-200 flex-1 flex flex-col justify-around">
              <p className="font-display text-amber-900 text-center mb-2" style={{ fontSize: '1.45rem' }}>비를 읽는 여러 가지 방법</p>
              <p className="font-body text-stone-800" style={{ fontSize: '1.35rem', lineHeight: '2.4rem' }}>
                ① <b className="text-orange-700">앞 수</b> 대 <b className="text-lime-700">뒤 수</b>
              </p>
              <p className="font-body text-stone-800" style={{ fontSize: '1.35rem', lineHeight: '2.4rem' }}>
                ② <b className="text-orange-700">앞 수</b>와 <b className="text-lime-700">뒤 수</b>의 비
              </p>
              <p className="font-body text-stone-800" style={{ fontSize: '1.35rem', lineHeight: '2.4rem' }}>
                ③ <b className="text-orange-700">앞 수</b>의 <b className="text-lime-700">뒤 수</b>에 대한 비
              </p>
              <p className="font-body text-stone-800" style={{ fontSize: '1.35rem', lineHeight: '2.4rem' }}>
                ④ <b className="text-lime-700">뒤 수</b>에 대한 <b className="text-orange-700">앞 수</b>의 비
              </p>
            </div>
          </div>

          {/* RIGHT: 상황 → 1. 기준 → 2. 4가지로 읽기 (순서 무관, 4가지 다 채우면 정답) */}
          <div className="flex-1 flex flex-col justify-around gap-2 min-h-0">
            {/* 상황 문장 */}
            <div className="bg-amber-50 rounded-xl p-3 border-2 border-amber-200 text-center">
              <p className="font-body text-stone-800" style={{ fontSize: '1.55rem', lineHeight: '2.2rem' }}>
                📚 교실에는 <b className="text-orange-700">{item.a}</b> <b>{item.aCount}{item.aUnit}</b>와 <b className="text-lime-700">{item.b}</b> <b>{item.bCount}{item.bUnit}</b>가 있어요.
              </p>
            </div>

            {/* 1. 기준 선택 */}
            <div className="bg-emerald-50 rounded-xl p-3 border-2 border-emerald-300">
              <p className="font-body text-stone-800" style={{ fontSize: '1.4rem', lineHeight: '2.1rem' }}>
                <b className="text-emerald-800">1.</b> <span style={{ backgroundImage: 'linear-gradient(transparent 55%, rgba(190,242,100,0.85) 55%)', padding: '0 0.2rem' }}><b className="text-lime-800">기준량</b></span>이 되는 물건을 골라요:
              </p>
              <div className="flex gap-3 mt-2">
                <button onClick={() => setClassroomBaseChoice('a')}
                  className={`flex-1 px-4 py-2.5 rounded-lg font-display border-b-4 ${classroomBaseChoice === 'a' ? 'bg-rose-200 text-rose-900 border-rose-500' : 'bg-white border-amber-300 hover:bg-amber-50'}`}
                  style={{ fontSize: '1.4rem' }}>{item.a} ({item.aCount}{item.aUnit})</button>
                <button onClick={() => setClassroomBaseChoice('b')}
                  className={`flex-1 px-4 py-2.5 rounded-lg font-display border-b-4 ${classroomBaseChoice === 'b' ? 'bg-lime-200 text-lime-900 border-lime-500' : 'bg-white border-amber-300 hover:bg-amber-50'}`}
                  style={{ fontSize: '1.4rem' }}>{item.b} ({item.bCount}{item.bUnit})</button>
              </div>
              {classroomBaseChoice && (
                <p className="font-body mt-2" style={{ fontSize: '1.15rem' }}>
                  {itemBaseDone
                    ? <span className="text-emerald-700">🎉 정답! "{item.b}에 대한 {item.a}의 비" 형태예요.</span>
                    : <span className="text-rose-700">💭 "{item.a}와 {item.b}의 비" 표현에서 뒤에 오는 양이 기준량이에요.</span>}
                </p>
              )}
            </div>

            {/* 2. 비 읽는 방법 쓰기 */}
            <div className="bg-purple-50 rounded-xl p-3 border-2 border-purple-300 flex-1 flex flex-col justify-around min-h-0">
              <p className="font-body text-stone-800" style={{ fontSize: '1.4rem', lineHeight: '2.1rem' }}><b className="text-purple-800">2.</b> 왼쪽 <b className="text-amber-700">비의 뜻</b>을 보고 <b className="text-purple-700">{item.aCount}:{item.bCount}</b>을 4가지 방법으로 읽어 봐요 <span className="text-stone-500" style={{ fontSize: '1.1rem' }}>(순서 상관 없음)</span></p>
              {['r1', 'r2', 'r3', 'r4'].map((key, i) => (
                <div key={key} className="flex items-center gap-2">
                  <span className="font-display text-purple-700" style={{ fontSize: '1.45rem' }}>{['①','②','③','④'][i]}</span>
                  <input type="text" value={classroomReadings[key]}
                    onChange={(e) => setRD(key, e.target.value)}
                    className={`flex-1 font-display border-2 border-b-4 rounded-lg outline-none ${readCls(classroomReadings[key], matches[i])}`}
                    style={{ fontSize: '1.4rem', padding: '0.5rem 0.75rem' }}
                    placeholder="여기에 써 봐요" />
                </div>
              ))}
            </div>
          </div>
        </Card>

        <div className="w-full max-w-6xl flex items-center justify-between gap-3 flex-wrap pr-2">
          <Button onClick={() => { setClassroomItem(null); setClassroomBaseChoice(null); setClassroomReadings({ r1: '', r2: '', r3: '', r4: '' }); setClassroomPicker({ aIdx: null, aCount: '', bIdx: null, bCount: '' }); }} variant="soft">🔄 다시 정하기</Button>
          <Button onClick={() => setStep(2)} variant="secondary" disabled={!allClassDone}>다음 <ArrowRight size={22} className="inline ml-1" /></Button>
        </div>
      </div>
    );
  };

  const renderSummary = () => {
    // 페이지별 콘텐츠
    const isCorrect = !!sumCorrect[sumStep];
    const isLastPage = sumStep === 3;

    const showFeedback = (title, body) => setSumFeedback({ title, body });

    // ============ 페이지 1: 비란? (기호 선택) ============
    const page1 = () => {
      const symbols = [
        { s: '+', color: 'text-emerald-600' },
        { s: '-', color: 'text-rose-600' },
        { s: '×', color: 'text-purple-600' },
        { s: ':', color: 'text-orange-600' },
      ];
      return (
        <>
          <p className="font-display text-orange-900 text-center" style={{ fontSize: '2rem' }}>1. 비란?</p>
          <div className="bg-white rounded-2xl p-5 border-4 border-orange-300">
            <p className="font-body text-stone-800 text-center" style={{ fontSize: '1.65rem', lineHeight: '2.5rem' }}>
              두 양을 비교할 때, 두 수 사이에 <br/><b className="text-orange-700">어떤 기호</b>를 써서 나타낸 것일까요?
            </p>
          </div>
          <div className="grid grid-cols-4 gap-3">
            {symbols.map(({ s, color }) => {
              const correctChosen = isCorrect && s === ':';
              return (
                <button key={s}
                  disabled={isCorrect}
                  onClick={() => {
                    if (s === ':') {
                      setSumCorrect(p => ({ ...p, [sumStep]: true }));
                    } else {
                      showFeedback('📖 비란?', (
                        <>
                          <p style={{ fontSize: '1.4rem', lineHeight: '2.1rem' }}>두 양을 비교할 때 두 수 사이에 <b className="text-orange-700" style={{ fontSize: '1.8rem' }}>:</b> (콜론) 기호를 써서 나타낸 것을 <b className="text-purple-700">비</b>라고 해요.</p>
                          <p className="mt-2" style={{ fontSize: '1.3rem', lineHeight: '2rem' }}>예) 도토리 <b className="text-orange-700">6</b>개와 풋사과 <b className="text-lime-700">3</b>개 → <b className="font-display" style={{ fontSize: '1.8rem' }}>6 : 3</b></p>
                          <p className="mt-1 text-stone-600" style={{ fontSize: '1.2rem' }}>+, -, ×, ÷ 같은 계산 기호가 아니에요!</p>
                        </>
                      ));
                    }
                  }}
                  className={`font-display rounded-2xl border-4 border-b-8 shadow-lg transition-transform py-4 ${correctChosen ? 'bg-emerald-100 border-emerald-500 text-emerald-700 ring-4 ring-emerald-300' : `bg-white border-amber-400 ${color} hover:scale-105`}`}
                  style={{ fontSize: '3.5rem' }}>{s}</button>
              );
            })}
          </div>
          {isCorrect && (
            <p className="font-display text-emerald-700 text-center animate-pop-in" style={{ fontSize: '1.5rem' }}>🎉 정답! 비는 <b>":"</b> 기호로 나타내요</p>
          )}
        </>
      );
    };

    // ============ 페이지 2: 어떻게 쓸까? (순서) ============
    const page2 = () => {
      const a = parseInt(sumInputs.p2a, 10);
      const b = parseInt(sumInputs.p2b, 10);
      const tried = !!sumCheckTried[sumStep];
      const cls = (v, ok) => {
        if (!v) return 'border-amber-300';
        if (ok) return 'border-emerald-500 bg-emerald-50';
        return tried ? 'border-rose-500 bg-rose-50' : 'border-amber-500 bg-amber-50';
      };
      return (
        <>
          <p className="font-display text-emerald-900 text-center" style={{ fontSize: '2rem' }}>2. 비를 쓰는 순서</p>
          <div className="bg-white rounded-2xl p-5 border-4 border-emerald-300">
            <p className="font-body text-stone-800 text-center" style={{ fontSize: '1.55rem', lineHeight: '2.3rem' }}>
              도토리 <b className="text-orange-700">6개</b>와 풋사과 <b className="text-lime-700">3개</b>가 있어요.<br/>
              "<b className="text-orange-700">도토리</b>와 <b className="text-lime-700">풋사과</b>의 비"는 어떻게 쓸까요?
            </p>
          </div>
          <div className="flex items-center justify-center gap-3">
            <input type="text" inputMode="numeric" value={sumInputs.p2a}
              onChange={(e) => setSumInputs(p => ({ ...p, p2a: e.target.value }))}
              disabled={isCorrect}
              className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${cls(sumInputs.p2a, a === 6)}`}
              style={{ width: '6rem', height: '6rem', fontSize: '4rem' }} placeholder="?" />
            <span className="font-display text-stone-800" style={{ fontSize: '4rem' }}>:</span>
            <input type="text" inputMode="numeric" value={sumInputs.p2b}
              onChange={(e) => setSumInputs(p => ({ ...p, p2b: e.target.value }))}
              disabled={isCorrect}
              className={`text-center font-display rounded-2xl border-4 border-b-8 shadow-lg outline-none ${cls(sumInputs.p2b, b === 3)}`}
              style={{ width: '6rem', height: '6rem', fontSize: '4rem' }} placeholder="?" />
          </div>
          {!isCorrect && (
            <div className="flex justify-center">
              <Button onClick={() => {
                setSumCheckTried(p => ({ ...p, [sumStep]: true }));
                if (a === 6 && b === 3) {
                  setSumCorrect(p => ({ ...p, [sumStep]: true }));
                } else {
                  showFeedback('📖 비를 쓰는 순서', (
                    <>
                      <p style={{ fontSize: '1.4rem', lineHeight: '2.1rem' }}>문제에서 <b className="text-orange-700">먼저 말한 양</b>이 콜론(:) <b>앞</b>에 와요.</p>
                      <p className="mt-2" style={{ fontSize: '1.3rem', lineHeight: '2rem' }}>"<b className="text-orange-700">도토리</b>와 <b className="text-lime-700">풋사과</b>의 비" → <b className="text-orange-700">도토리</b>가 먼저 말해졌으므로</p>
                      <p className="mt-1 text-center font-display text-amber-900" style={{ fontSize: '2.2rem' }}>
                        <span className="text-orange-700">6</span> : <span className="text-lime-700">3</span>
                      </p>
                      <p className="mt-2 text-stone-600" style={{ fontSize: '1.2rem' }}>(도토리 6 → 앞, 풋사과 3 → 뒤)</p>
                    </>
                  ));
                }
              }}>정답 확인 ✨</Button>
            </div>
          )}
          {isCorrect && (
            <p className="font-display text-emerald-700 text-center animate-pop-in" style={{ fontSize: '1.5rem' }}>🎉 정답! 먼저 말한 양이 앞에 와요</p>
          )}
        </>
      );
    };

    // ============ 페이지 (4가지 읽기) ============
    const pageReadings = () => {
      const matchR35 = (s) => {
        if (!s) return -1;
        const t = s.replace(/\s+/g, '');
        if (t === '3대5') return 0;
        if (t === '3과5의비' || t === '3와5의비') return 1;
        if (t === '3의5에대한비') return 2;
        if (t === '5에대한3의비') return 3;
        return -1;
      };
      const matches = sumInputs.p3.map(matchR35);
      const tried = !!sumCheckTried[sumStep];
      const cls = (v, m) => {
        if (!v) return 'border-amber-300';
        if (m !== -1) return 'border-emerald-500 bg-emerald-50';
        return tried ? 'border-rose-500 bg-rose-50' : 'border-amber-500 bg-amber-50';
      };
      const setR = (i, v) => setSumInputs(p => ({ ...p, p3: p.p3.map((x, j) => j === i ? v : x) }));
      return (
        <>
          <p className="font-display text-amber-900 text-center" style={{ fontSize: '2rem' }}>4. 비를 읽는 4가지 방법</p>
          <div className="bg-white rounded-2xl p-4 border-4 border-amber-300 text-center">
            <p className="font-body text-stone-800" style={{ fontSize: '1.4rem' }}>
              <b className="font-display" style={{ fontSize: '2.2rem' }}>
                <span className="text-orange-700">3</span> : <span className="text-lime-700">5</span>
              </b> 를 <b>네 가지 방법</b>으로 읽어 보세요.
            </p>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {[0, 1, 2, 3].map((i) => (
              <div key={i} className="flex items-center gap-2">
                <span className="font-display text-amber-700" style={{ fontSize: '1.5rem' }}>{['①','②','③','④'][i]}</span>
                <input type="text" value={sumInputs.p3[i]}
                  onChange={(e) => setR(i, e.target.value)}
                  disabled={isCorrect}
                  className={`flex-1 font-display border-2 border-b-4 rounded-lg outline-none ${cls(sumInputs.p3[i], matches[i])}`}
                  style={{ fontSize: '1.35rem', padding: '0.5rem 0.75rem' }}
                  placeholder="여기에 써 봐요" />
              </div>
            ))}
          </div>
          {!isCorrect && (
            <div className="flex justify-center">
              <Button onClick={() => {
                setSumCheckTried(p => ({ ...p, [sumStep]: true }));
                const distinct = new Set(matches.filter(m => m !== -1));
                if (distinct.size === 4) {
                  setSumCorrect(p => ({ ...p, [sumStep]: true }));
                } else {
                  showFeedback('📖 비를 읽는 4가지 방법', (
                    <>
                      <p style={{ fontSize: '1.35rem', lineHeight: '2rem' }}>비 <b className="font-display" style={{ fontSize: '1.7rem' }}><span className="text-orange-700">3</span>:<span className="text-lime-700">5</span></b> 는 네 가지로 읽을 수 있어요:</p>
                      <div className="bg-amber-50 rounded-xl p-3 mt-2 border-2 border-amber-300">
                        <p className="font-display text-amber-900" style={{ fontSize: '1.3rem', lineHeight: '2.2rem' }}>① <b className="text-orange-700">3</b> 대 <b className="text-lime-700">5</b></p>
                        <p className="font-display text-amber-900" style={{ fontSize: '1.3rem', lineHeight: '2.2rem' }}>② <b className="text-orange-700">3</b>과 <b className="text-lime-700">5</b>의 비</p>
                        <p className="font-display text-amber-900" style={{ fontSize: '1.3rem', lineHeight: '2.2rem' }}>③ <b className="text-orange-700">3</b>의 <b className="text-lime-700">5</b>에 대한 비</p>
                        <p className="font-display text-amber-900" style={{ fontSize: '1.3rem', lineHeight: '2.2rem' }}>④ <b className="text-lime-700">5</b>에 대한 <b className="text-orange-700">3</b>의 비</p>
                      </div>
                      <p className="mt-2 text-stone-600" style={{ fontSize: '1.15rem' }}>네 가지를 모두(순서 상관없이) 써야 정답이에요.</p>
                    </>
                  ));
                }
              }}>정답 확인 ✨</Button>
            </div>
          )}
          {isCorrect && (
            <p className="font-display text-emerald-700 text-center animate-pop-in" style={{ fontSize: '1.5rem' }}>🎉 정답! 네 가지 방법을 모두 알고 있네요</p>
          )}
        </>
      );
    };

    // ============ 페이지 (~에 대한 = 기준!) ============

        )}
      </>
    );

    // 페이지 순서: 1) 비란? → 2) 어떻게 쓸까? → 3) ~에 대한 = 기준 → 4) 4가지 읽기
    const pageFns = [page1, page2, pageBase, pageReadings];
    const accentBg = ['bg-orange-50', 'bg-emerald-50', 'bg-rose-50', 'bg-amber-50'];
    const accentBorder = ['border-orange-300', 'border-emerald-300', 'border-rose-300', 'border-amber-300'];

    return (

        </div>

            variant="secondary" disabled={!isCorrect}>
            {isLastPage ? '실생활 퀴즈로 →' : '다음'} <ArrowRight size={22} className="inline ml-1" />
          </Button>
        </div>

        {/* 전문 팝업 피드백 */}
        {sumFeedback && (
          <div className="absolute inset-0 z-50 flex items-center justify-center p-4 animate-fade-up" style={{ background: 'rgba(0,0,0,0.55)' }} onClick={() => setSumFeedback(null)}>
            <div className="bg-amber-50 rounded-3xl p-6 max-w-2xl w-full card-shadow border-4 border-rose-400 animate-pop-in relative" onClick={(e) => e.stopPropagation()}>
              <button onClick={() => setSumFeedback(null)} className="absolute top-2 right-3 text-stone-500 hover:text-stone-800 font-bold z-10" style={{ fontSize: '1.5rem' }} aria-label="닫기">✕</button>

              <p className="font-display text-amber-900 text-center mb-3" style={{ fontSize: '1.85rem' }}>{sumFeedback.title}</p>

              </div>

        )}

  };

  const renderPractice = () => {
    const koNum = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
    const ready = acornCount > 0 && walnutCount > 0;
    const isFreeStyle = practiceStep === 0;
    const isLast = practiceStep === 2;
    const correct = practiceFeedback === 'correct';

    const resetActivity = () => {
      setAcornCount(0);
      setWalnutCount(0);
      setPracticeInputA('');
      setPracticeInputB('');
      setPracticeFeedback(null);
      setReadsShown({});
      setReadsInput({});
      setReadsCheckedAt(0);
    };

    const checkAnswer = () => {
      if (Number(practiceInputA) === acornCount && Number(practiceInputB) === walnutCount) {
        setPracticeFeedback('correct');
      } else {
        setPracticeFeedback('wrong');
      }
    };

    const goNextActivity = () => {
      resetActivity();
      if (isLast) {
        setQuizSize(null);
        setSelectedQuestions([]);
        setQIndex(0);
        setQAnswers([]);
        setStep(4);
      } else {
        setPracticeStep(practiceStep + 1);
      }
    };

    const toggleRead = (n) => setReadsShown(p => ({ ...p, [n]: !p[n] }));
    const a = acornCount, b = walnutCount;
    const setRI = (k, v) => setReadsInput(p => ({ ...p, [k]: v }));
    const checkRead = (got, expect) => {
      const s = String(got || '').trim();
      const e = String(expect).trim();
      return s === e || s === koNum[expect];
    };
    const readsChecks = {
      r1a: checkRead(readsInput.r1a, a), r1b: checkRead(readsInput.r1b, b),
      r2a: checkRead(readsInput.r2a, a), r2b: checkRead(readsInput.r2b, b),
      r3a: checkRead(readsInput.r3a, a), r3b: checkRead(readsInput.r3b, b),
      r4a: checkRead(readsInput.r4a, b), r4b: checkRead(readsInput.r4b, a),
    };
    const allReadsCorrect = Object.values(readsChecks).every(Boolean);

        <div className="text-center mb-1">
          <h2 className="font-display text-amber-900" style={{ fontSize: '2.5rem' }}>

          </h2>
          <p className="font-body text-stone-600" style={{ fontSize: '1.5rem' }}>

            {practiceStep === 1 && '도토리와 풋사과를 놓은 다음, 비를 직접 써 보세요'}

          </p>
        </div>

        <div className="flex-1 grid grid-cols-2 gap-4 min-h-0">
          {/* 좌측: 도토리/풋사과 +/- */}

              <div className="relative flex-1 min-h-0">
                <div className="h-full flex flex-wrap gap-1 justify-center items-center px-3 py-1 content-center">

              </div>
            </div>
            <div className="bg-amber-50 rounded-2xl p-4 border-2 border-amber-300 flex-1 flex flex-col min-h-0">

                <span className="font-display text-lime-700 bg-white rounded-full w-16 h-16 flex items-center justify-center border-2 border-lime-300" style={{ fontSize: '2.2rem' }}>{walnutCount}</span>
              </div>
              <div className="relative flex-1 min-h-0">
                <div className="h-full flex flex-wrap gap-1 justify-center items-center px-3 py-1 content-center">

                    <div key={i} className="animate-pop-in -mx-1"><Walnut size={48} /></div>

                </div>
              </div>

                <button onClick={() => { if (walnutCount < 9) { setWalnutCount(walnutCount + 1); setPracticeFeedback(null); setReadsShown({}); setReadsInput({}); } }}

              </div>
            </div>

          {/* 우측: 결과 / 입력 */}

                  <b className="text-orange-700">도토리</b>와 <b className="text-lime-700">풋사과</b>의 <b>비</b>를 써 봐요!
                </p>
                <div className="flex items-center justify-center gap-2 mb-4">
                  <input type="text" inputMode="numeric" value={practiceInputA}
                    onChange={(e) => setPracticeInputA(e.target.value)}

                    style={{ fontSize: '2.4rem' }} placeholder="?" />
                  <span className="font-display text-stone-700" style={{ fontSize: '2.4rem' }}>:</span>

                </div>
                <Button onClick={checkAnswer} disabled={!practiceInputA || !practiceInputB}>확인 ✨</Button>
                {practiceFeedback === 'wrong' && (

                    💪 다시! <b>도토리</b>는 ":" 앞, <b>풋사과</b>는 ":" 뒤
                  </p>

            {showResult && (
              <div className="bg-emerald-50 rounded-2xl p-4 border-2 border-emerald-300 w-full text-center animate-pop-in">
                {practiceStep !== 0 && (
                  <p className="font-display text-emerald-800 mb-1" style={{ fontSize: '1.7rem' }}>🎉 정답!</p>
                )}
                <p className="font-body text-stone-700" style={{ fontSize: '1.5rem' }}>도토리와 풋사과의 비</p>
